    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎖️</text></svg>" />
    
    <style>
        /* ─── RESET & BASE ───────────────────────────────────────────── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a12;
            font-family: 'Courier New', monospace;
            touch-action: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #gameContainer {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 10px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), inset 0 0 0 2px #2a2a3e, inset 0 0 0 4px #0e0e1a;
            position: relative;
            max-width: 620px;
            width: 100%;
            max-height: 98vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ─── КНОПКА УСТАНОВКИ ──────────────────────────────────────── */
        #installBtnFixed {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #2a4a3a;
            border: none;
            border-radius: 10px;
            padding: 6px 14px;
            color: #b0f0b0;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            box-shadow: 0 3px 0 #142a1a;
            transition: all 0.08s;
            touch-action: manipulation;
            z-index: 30;
            display: none;
            align-items: center;
            gap: 6px;
        }
        #installBtnFixed.show {
            display: flex;
        }
        #installBtnFixed:active {
            transform: translateY(3px);
            box-shadow: 0 0px 0 #142a1a;
        }
        #installBtnFixed .icon-install {
            font-size: 16px;
        }
        #installBtnFixed.installed {
            display: none !important;
        }

        /* ─── HUD ──────────────────────────────────────────────────── */
        #hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 3px 6px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px 10px 0 0;
            border-bottom: 2px solid #3a5a3a;
            font-size: 10px;
            color: #8fca8f;
            text-shadow: 0 0 8px rgba(80, 200, 80, 0.3);
            flex-wrap: wrap;
            gap: 2px 4px;
            flex-shrink: 0;
            min-height: 26px;
            padding-right: 70px;
        }
        .hud-item {
            display: flex;
            align-items: center;
            gap: 2px;
            background: rgba(0, 0, 0, 0.3);
            padding: 1px 5px 1px 4px;
            border-radius: 10px;
            border: 1px solid #2a4a2a;
        }
        .hud-item .icon { font-size: 10px; opacity: 0.8; }
        .hud-item .value { font-weight: bold; font-size: 10px; color: #b0f0b0; min-width: 14px; }
        .hud-item .label { color: #6a9a6a; font-size: 7px; text-transform: uppercase; letter-spacing: 0.5px; }
        .hud-tank {
            background: rgba(0, 0, 0, 0.3);
            padding: 1px 6px 1px 4px;
            border-radius: 10px;
            border: 1px solid #3a5a3a;
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 9px;
            color: #8fca8f;
        }
        .hud-tank .tname { color: #c0f0c0; font-weight: bold; }
        #bossHud { border-color: #cc4444; display: none; }
        #bossHud .value { color: #ff6666; }

        /* ─── CANVAS ────────────────────────────────────────────────── */
        #canvasWrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #0a0a12;
            min-height: 0;
            border-radius: 4px;
        }
        #gameCanvas {
            display: block;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            image-rendering: pixelated;
            touch-action: none;
            cursor: none;
            background: #1a2a1a;
            border-radius: 4px;
        }

        /* ─── CONTROLS ───────────────────────────────────────────────── */
        #controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 8px 10px 8px;
            background: rgba(0, 0, 0, 0.5);
            border-top: 2px solid #3a5a3a;
            gap: 6px;
            flex-shrink: 0;
            flex-wrap: nowrap;
            border-radius: 0 0 10px 10px;
            touch-action: none;
        }
        .ctrl-group {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-shrink: 0;
        }

        .ctrl-btn {
            background: #3a3a52;
            border: none;
            border-radius: 12px;
            padding: 0;
            font-size: 20px;
            color: #b0b0d0;
            box-shadow: 0 4px 0 #1a1a2a, inset 0 1px 0 rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.06s ease;
            touch-action: manipulation;
            width: 54px;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            line-height: 1;
            outline: none;
            -webkit-touch-callout: none;
            flex-shrink: 0;
        }
        .ctrl-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #1a1a2a;
        }

        .ctrl-btn.fire {
            background: #6a2a2a;
            color: #ff8888;
            box-shadow: 0 4px 0 #3a1212, inset 0 1px 0 rgba(255, 100, 100, 0.2);
            width: 72px;
            height: 64px;
            font-size: 28px;
            border-radius: 14px;
        }
        .ctrl-btn.fire:active { background: #8a3a3a; }

        .ctrl-btn.shop-btn {
            background: #2a4a3a;
            color: #8fca8f;
            box-shadow: 0 4px 0 #142a1a, inset 0 1px 0 rgba(100, 255, 100, 0.1);
            font-size: 18px;
        }
        .ctrl-btn.shop-btn:active { background: #3a5a4a; }

        .ctrl-btn.pause-btn {
            background: #4a3a2a;
            color: #f0d080;
            box-shadow: 0 4px 0 #2a1a0a;
            font-size: 18px;
        }
        .ctrl-btn.pause-btn:active { background: #5a4a3a; }

        .ctrl-btn.barrel {
            background: #3a3a4a;
            color: #a0b0d0;
            box-shadow: 0 4px 0 #1a1a2a;
            font-size: 18px;
            width: 48px;
        }
        .ctrl-btn.barrel:active { background: #4a4a5a; }

        .ctrl-btn.restart-btn {
            background: #4a2a2a;
            color: #ff8888;
            box-shadow: 0 4px 0 #2a1212;
            font-size: 18px;
        }
        .ctrl-btn.restart-btn:active { background: #5a3a3a; }

        .ctrl-btn.fullscreen-btn {
            background: #2a3a4a;
            color: #8fcaf0;
            box-shadow: 0 4px 0 #1a2a3a;
            font-size: 20px;
        }
        .ctrl-btn.fullscreen-btn:active { background: #3a4a5a; }

        .ctrl-btn:disabled {
            opacity: 0.4;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #1a1a2a;
            pointer-events: none;
        }

        .dpad {
            display: grid;
            grid-template-columns: 54px 54px 54px;
            grid-template-rows: 54px 54px 54px;
            gap: 4px;
            justify-items: center;
            align-items: center;
            flex-shrink: 0;
        }
        .dpad .ctrl-btn {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            font-size: 24px;
            box-shadow: 0 4px 0 #1a1a2a, inset 0 1px 0 rgba(255, 255, 255, 0.1);
            background: #3a3a52;
            color: #b0b0d0;
        }
        .dpad .ctrl-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #1a1a2a;
        }
        #btnUp { grid-column: 2; grid-row: 1; }
        #btnLeft { grid-column: 1; grid-row: 2; }
        #btnDown { grid-column: 2; grid-row: 3; }
        #btnRight { grid-column: 3; grid-row: 2; }
        .dpad-center {
            grid-column: 2;
            grid-row: 2;
            width: 100%;
            height: 100%;
            background: transparent;
            pointer-events: none;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            padding: 16px;
            border-radius: 20px;
        }
        .overlay.active { display: flex; }
        .overlay-box {
            background: #1a1a2a;
            border-radius: 16px;
            padding: 18px 22px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            border: 2px solid #3a6a3a;
            box-shadow: 0 0 40px rgba(0, 40, 0, 0.4);
            color: #b0f0b0;
        }
        .overlay-box h1 {
            font-size: 24px;
            letter-spacing: 3px;
            margin-bottom: 4px;
            color: #ff6666;
        }
        .overlay-box .sub {
            color: #8a8aaa;
            font-size: 12px;
            margin-bottom: 10px;
        }
        .overlay-box .final-score {
            color: #f0c040;
            font-size: 18px;
            margin-bottom: 12px;
        }
        .overlay-box .time {
            font-size: 14px;
            color: #8fca8f;
            margin-bottom: 10px;
        }
        .overlay-btn {
            background: #2a4a3a;
            border: none;
            border-radius: 10px;
            padding: 8px 22px;
            color: #8fca8f;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 3px 0 #142a1a;
            transition: all 0.08s;
            touch-action: manipulation;
            letter-spacing: 1px;
            margin-top: 6px;
            width: 100%;
            max-width: 180px;
        }
        .overlay-btn:active {
            transform: translateY(3px);
            box-shadow: 0 0px 0 #142a1a;
        }

        .shop-panel {
            background: #1e2a1e;
            border-radius: 16px;
            padding: 14px 16px 16px 16px;
            max-width: 420px;
            width: 100%;
            max-height: 75vh;
            overflow-y: auto;
            border: 2px solid #3a6a3a;
            box-shadow: 0 0 40px rgba(0, 40, 0, 0.5);
        }
        .shop-panel::-webkit-scrollbar { width: 4px; }
        .shop-panel::-webkit-scrollbar-track { background: #0a1a0a; border-radius: 4px; }
        .shop-panel::-webkit-scrollbar-thumb { background: #3a6a3a; border-radius: 4px; }
        .shop-title {
            font-size: 16px;
            color: #8fca8f;
            text-align: center;
            margin-bottom: 6px;
            letter-spacing: 2px;
            border-bottom: 2px solid #2a4a2a;
            padding-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .shop-title span { font-size: 12px; color: #f0c040; }
        .shop-list { display: flex; flex-direction: column; gap: 4px; }
        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid #2a4a2a;
            gap: 3px;
            flex-wrap: wrap;
            cursor: default;
        }
        .shop-item.owned { border-color: #4a7a4a; background: rgba(30, 60, 30, 0.3); }
        .shop-item.current { border-color: #f0c040; background: rgba(60, 50, 20, 0.3); box-shadow: 0 0 16px rgba(240, 192, 64, 0.1); }
        .shop-item .s-name { color: #b0e0b0; font-weight: bold; font-size: 11px; min-width: 40px; }
        .shop-item .s-stats { color: #6a9a6a; font-size: 7px; display: flex; gap: 3px; flex-wrap: wrap; }
        .shop-item .s-stats span { background: rgba(0, 0, 0, 0.3); padding: 1px 3px; border-radius: 3px; }
        .shop-item .s-price { color: #f0c040; font-weight: bold; font-size: 11px; min-width: 34px; text-align: right; }
        .shop-item .s-action {
            background: #2a4a3a;
            border: none;
            border-radius: 5px;
            padding: 2px 10px;
            color: #8fca8f;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 9px;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 2px 0 #142a1a;
            touch-action: manipulation;
        }
        .shop-item .s-action:active { transform: translateY(2px); box-shadow: 0 0px 0 #142a1a; }
        .shop-item .s-action:disabled { opacity: 0.4; transform: translateY(1px); box-shadow: 0 1px 0 #142a1a; pointer-events: none; }
        .shop-item .s-action.buy { background: #3a5a2a; color: #b0f0a0; }
        .shop-item .s-action.select { background: #4a4a2a; color: #f0e080; }
        .shop-item .s-action.equipped { background: #2a3a2a; color: #6a9a6a; box-shadow: 0 1px 0 #1a2a1a; cursor: default; }
        .shop-close {
            margin-top: 8px;
            background: #4a2a2a;
            border: none;
            border-radius: 10px;
            padding: 6px 0;
            width: 100%;
            color: #ff8888;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            box-shadow: 0 3px 0 #2a1212;
            transition: all 0.08s;
            touch-action: manipulation;
            letter-spacing: 1px;
        }
        .shop-close:active { transform: translateY(3px); box-shadow: 0 0px 0 #2a1212; }

        /* Скрываем кнопку установки в установленном приложении */
        @media (display-mode: standalone) {
            #installBtnFixed {
                display: none !important;
            }
        }

        @media (max-width: 500px) {
            #gameContainer { padding: 6px; max-width: 100%; border-radius: 14px; }
            #installBtnFixed { font-size: 10px; padding: 4px 10px; top: 8px; right: 8px; }
            #hud { padding-right: 60px; }
            .ctrl-btn {
                width: 46px;
                height: 46px;
                font-size: 17px;
                border-radius: 10px;
            }
            .ctrl-btn.fire {
                width: 60px;
                height: 54px;
                font-size: 24px;
            }
            .ctrl-btn.barrel { width: 40px; font-size: 15px; }
            .ctrl-btn.fullscreen-btn { font-size: 17px; }
            .dpad {
                grid-template-columns: 46px 46px 46px;
                grid-template-rows: 46px 46px 46px;
                gap: 3px;
            }
            .dpad .ctrl-btn { font-size: 20px; }
            #controls { padding: 4px 6px 8px 6px; gap: 4px; }
            .ctrl-group { gap: 4px; }
            #hud { font-size: 8px; padding: 2px 4px; min-height: 22px; }
            .hud-item .value { font-size: 8px; min-width: 12px; }
            .hud-item .label { font-size: 6px; }
            .hud-tank { font-size: 7px; padding: 1px 4px; }
            .overlay-box { padding: 14px 16px; }
            .overlay-box h1 { font-size: 20px; }
            .shop-panel { padding: 10px 12px 12px 12px; }
            .shop-title { font-size: 14px; }
            .shop-item .s-name { font-size: 10px; min-width: 32px; }
            .shop-item .s-stats { font-size: 6px; }
            .shop-item .s-price { font-size: 10px; min-width: 28px; }
            .shop-item .s-action { font-size: 8px; padding: 1px 8px; }
        }
        @media (max-width: 400px) {
            .ctrl-btn {
                width: 40px;
                height: 40px;
                font-size: 14px;
                border-radius: 8px;
            }
            .ctrl-btn.fire {
                width: 52px;
                height: 46px;
                font-size: 20px;
            }
            .ctrl-btn.barrel { width: 36px; font-size: 13px; }
            .ctrl-btn.fullscreen-btn { font-size: 15px; }
            .dpad {
                grid-template-columns: 40px 40px 40px;
                grid-template-rows: 40px 40px 40px;
                gap: 3px;
            }
            .dpad .ctrl-btn { font-size: 17px; }
            #controls { padding: 3px 4px 6px 4px; }
            .ctrl-group { gap: 3px; }
            #hud { font-size: 7px; min-height: 20px; padding-right: 50px; }
            .hud-item { padding: 0px 3px; }
            .hud-item .value { font-size: 7px; min-width: 10px; }
            .hud-tank { font-size: 6px; }
        }
        @media (orientation: landscape) and (max-height: 450px) {
            #gameContainer { max-height: 96vh; padding: 4px; }
            #hud { font-size: 7px; min-height: 18px; padding: 1px 3px; padding-right: 60px; }
            #controls { padding: 2px 4px 6px 4px; }
            .ctrl-btn {
                width: 38px;
                height: 38px;
                font-size: 13px;
                border-radius: 8px;
            }
            .ctrl-btn.fire {
                width: 48px;
                height: 42px;
                font-size: 18px;
            }
            .ctrl-btn.barrel { width: 34px; font-size: 12px; }
            .ctrl-btn.fullscreen-btn { font-size: 14px; }
            .dpad {
                grid-template-columns: 38px 38px 38px;
                grid-template-rows: 38px 38px 38px;
                gap: 2px;
            }
            .dpad .ctrl-btn { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <!-- HUD -->
        <div id="hud">
            <div class="hud-item">
                <span class="icon">⭐</span>
                <span class="label">Счёт</span>
                <span class="value" id="scoreDisplay">0</span>
            </div>
            <div class="hud-item">
                <span class="icon">💰</span>
                <span class="label">Деньги</span>
                <span class="value" id="moneyDisplay">0</span>
            </div>
            <div class="hud-tank">
                <span>🚀</span>
                <span class="tname" id="tankNameDisplay">Т-26</span>
                <span style="color:#6a9a6a;font-size:8px;" id="tankHealthDisplay">❤️ 3/3</span>
            </div>
            <div class="hud-item">
                <span class="icon">🎯</span>
                <span class="label">Ур.</span>
                <span class="value" id="levelDisplay">1</span>
            </div>
            <div class="hud-item">
                <span class="icon">⏱️</span>
                <span class="label">Время</span>
                <span class="value" id="timeDisplay">00:00</span>
            </div>
            <div class="hud-item" id="bossHud" style="display:none; border-color:#cc4444;">
                <span class="icon">👹</span>
                <span class="label">БОСС</span>
                <span class="value" id="bossHpDisplay">1000</span>
            </div>
        </div>

        <!-- Кнопка установки приложения -->
        <button id="installBtnFixed" class="show">
            <span class="icon-install">⬇️</span> Установить
        </button>

        <!-- Canvas -->
        <div id="canvasWrapper">
            <canvas id="gameCanvas"></canvas>
        </div>

        <!-- Управление -->
        <div id="controls">
            <div class="ctrl-group">
                <div class="dpad">
                    <button class="ctrl-btn" id="btnUp">▲</button>
                    <button class="ctrl-btn" id="btnLeft">◀</button>
                    <button class="ctrl-btn" id="btnDown">▼</button>
                    <button class="ctrl-btn" id="btnRight">▶</button>
                    <div class="dpad-center"></div>
                </div>
            </div>
            <div class="ctrl-group">
                <button class="ctrl-btn pause-btn" id="btnPause">⏸️</button>
                <button class="ctrl-btn shop-btn" id="btnShop">🏪</button>
                <button class="ctrl-btn restart-btn" id="btnRestart">🔄</button>
                <button class="ctrl-btn fullscreen-btn" id="btnFullscreen">⛶</button>
            </div>
            <div class="ctrl-group">
                <button class="ctrl-btn barrel" id="btnBarrelUp">↗</button>
                <button class="ctrl-btn barrel" id="btnBarrelDown">↘</button>
                <button class="ctrl-btn fire" id="btnFire">🔥</button>
            </div>
        </div>

        <!-- Оверлеи -->
        <div class="overlay" id="shopOverlay">
            <div class="shop-panel">
                <div class="shop-title">
                    <span>🏪 МАГАЗИН ТАНКОВ</span>
                    <span id="shopMoney">💰 0</span>
                </div>
                <div class="shop-list" id="shopList"></div>
                <button class="shop-close" id="shopClose">✕ ЗАКРЫТЬ</button>
            </div>
        </div>
        <div class="overlay" id="pauseOverlay">
            <div class="overlay-box">
                <h1 style="color:#b0f0b0;font-size:24px;">⏸ ПАУЗА</h1>
                <div class="time" id="pauseTime">00:00</div>
                <button class="overlay-btn" id="resumeBtn">▶ ПРОДОЛЖИТЬ</button>
            </div>
        </div>
        <div class="overlay" id="gameoverOverlay">
            <div class="overlay-box">
                <h1>☠️ ПОДБИТ</h1>
                <div class="sub">Ваш танк уничтожен</div>
                <div class="final-score">⭐ Счёт: <span id="finalScore">0</span></div>
                <button class="overlay-btn" id="restartBtn">🔄 НОВЫЙ БОЙ</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ─── PWA INSTALL ────────────────────────────────────────────
            let deferredPrompt = null;
            const installBtn = document.getElementById('installBtnFixed');
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches || 
                               window.navigator.standalone === true;

            // Если уже установлено как приложение — скрываем кнопку
            if (isStandalone) {
                installBtn.classList.remove('show');
                installBtn.classList.add('installed');
            }

            // Обработчик события установки
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                // Показываем кнопку только если не в standalone режиме
                if (!isStandalone) {
                    installBtn.classList.add('show');
                    installBtn.classList.remove('installed');
                }
            });

            // Обработчик нажатия на кнопку установки
            installBtn.addEventListener('click', async () => {
                if (deferredPrompt) {
                    try {
                        // Показываем диалог установки
                        deferredPrompt.prompt();
                        const result = await deferredPrompt.userChoice;
                        if (result.outcome === 'accepted') {
                            // Успешная установка
                            installBtn.classList.remove('show');
                            installBtn.classList.add('installed');
                            // Показываем уведомление об успешной установке
                            setTimeout(() => {
                                alert('Игра успешно установлена! Найдите её на рабочем столе.');
                            }, 500);
                        } else {
                            // Пользователь отменил установку
                            console.log('Установка отменена');
                        }
                        deferredPrompt = null;
                    } catch (err) {
                        console.log('Ошибка установки:', err);
                        // Показываем инструкцию, если установка не удалась
                        alert('Для установки приложения нажмите кнопку "Установить" в адресной строке браузера');
                    }
                } else {
                    // Если deferredPrompt отсутствует, пробуем альтернативный способ
                    // Для некоторых браузеров или при повторном открытии
                    if (window.navigator.standalone !== true) {
                        // Проверяем, поддерживается ли установка
                        if ('BeforeInstallPromptEvent' in window) {
                            alert('Пожалуйста, обновите страницу и попробуйте снова.');
                        } else {
                            // Для Safari на iOS — инструкция по установке
                            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
                            if (isIOS) {
                                alert('Для установки на iPhone/iPad:\n1. Нажмите кнопку "Поделиться"\n2. Выберите "На экран «Домой»"');
                            } else {
                                alert('Для установки приложения нажмите кнопку "Установить" в адресной строке браузера');
                            }
                        }
                    }
                }
            });

            // Событие успешной установки
            window.addEventListener('appinstalled', () => {
                installBtn.classList.remove('show');
                installBtn.classList.add('installed');
                deferredPrompt = null;
                // Показываем уведомление
                setTimeout(() => {
                    alert('Игра успешно установлена! Найдите её на рабочем столе.');
                }, 300);
            });

            // Дополнительная обработка для iOS
            if (window.navigator.standalone === true) {
                installBtn.classList.remove('show');
                installBtn.classList.add('installed');
            }

            // ─── FULLSCREEN TOGGLE ─────────────────────────────────────
            const fullscreenBtn = document.getElementById('btnFullscreen');
            const container = document.getElementById('gameContainer');

            function toggleFullscreen() {
                if (!document.fullscreenElement) {
                    if (container.requestFullscreen) {
                        container.requestFullscreen().catch(() => {});
                    } else if (container.webkitRequestFullscreen) {
                        container.webkitRequestFullscreen();
                    } else if (container.msRequestFullscreen) {
                        container.msRequestFullscreen();
                    }
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    } else if (document.webkitExitFullscreen) {
                        document.webkitExitFullscreen();
                    } else if (document.msExitFullscreen) {
                        document.msExitFullscreen();
                    }
                }
            }
            fullscreenBtn.addEventListener('click', toggleFullscreen);

            // ─── CANVAS ───────────────────────────────────────────────────
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const wrapper = document.getElementById('canvasWrapper');
            const GAME_W = 480;
            const GAME_H = 270;

            function resizeCanvas() {
                const rect = wrapper.getBoundingClientRect();
                const w = rect.width;
                const h = rect.height;
                const ratio = GAME_W / GAME_H;
                let displayW = w;
                let displayH = w / ratio;
                if (displayH > h) {
                    displayH = h;
                    displayW = h * ratio;
                }
                canvas.width = GAME_W;
                canvas.height = GAME_H;
                canvas.style.width = displayW + 'px';
                canvas.style.height = displayH + 'px';
                canvas.style.position = 'absolute';
                canvas.style.left = '50%';
                canvas.style.top = '50%';
                canvas.style.transform = 'translate(-50%, -50%)';
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // ─── DOM ЭЛЕМЕНТЫ ──────────────────────────────────────────
            const scoreDisplay = document.getElementById('scoreDisplay');
            const moneyDisplay = document.getElementById('moneyDisplay');
            const tankNameDisplay = document.getElementById('tankNameDisplay');
            const tankHealthDisplay = document.getElementById('tankHealthDisplay');
            const levelDisplay = document.getElementById('levelDisplay');
            const timeDisplay = document.getElementById('timeDisplay');
            const finalScore = document.getElementById('finalScore');
            const shopOverlay = document.getElementById('shopOverlay');
            const shopList = document.getElementById('shopList');
            const shopMoney = document.getElementById('shopMoney');
            const gameoverOverlay = document.getElementById('gameoverOverlay');
            const pauseOverlay = document.getElementById('pauseOverlay');
            const pauseTime = document.getElementById('pauseTime');
            const bossHud = document.getElementById('bossHud');
            const bossHpDisplay = document.getElementById('bossHpDisplay');

            // ─── ОПРЕДЕЛЕНИЯ ТАНКОВ ────────────────────────────────────
            const TANK_DEFS = {
                't26': { id: 't26', name: 'Т-26', cost: 0, speed: 2.2, fireRate: 30, damage: 1, health: 3,
                    bulletSpeed: 4.2, color: '#5a7a3a', trackColor: '#3a4a2a', turretColor: '#6a8a4a', star: true },
                'bt7': { id: 'bt7', name: 'БТ-7', cost: 50, speed: 3.4, fireRate: 24, damage: 1, health: 3,
                    bulletSpeed: 4.6, color: '#6a8a4a', trackColor: '#4a5a3a', turretColor: '#7a9a5a', star: true },
                't34': { id: 't34', name: 'Т-34', cost: 100, speed: 2.8, fireRate: 20, damage: 2, health: 5,
                    bulletSpeed: 5.0, color: '#4a7a3a', trackColor: '#2a4a2a', turretColor: '#5a8a4a', star: true },
                'kv1': { id: 'kv1', name: 'КВ-1', cost: 180, speed: 1.8, fireRate: 24, damage: 2, health: 8,
                    bulletSpeed: 4.4, color: '#3a6a3a', trackColor: '#2a3a2a', turretColor: '#4a7a4a', star: true },
                'is2': { id: 'is2', name: 'ИС-2', cost: 280, speed: 2.0, fireRate: 26, damage: 3, health: 7,
                    bulletSpeed: 4.8, color: '#2a5a2a', trackColor: '#1a3a1a', turretColor: '#3a6a3a', star: true },
                't54': { id: 't54', name: 'Т-54', cost: 450, speed: 3.8, fireRate: 16, damage: 3, health: 6,
                    bulletSpeed: 5.4, color: '#4a7a5a', trackColor: '#2a4a3a', turretColor: '#5a8a6a', star: true },
                't62': { id: 't62', name: 'Т-62', cost: 650, speed: 3.6, fireRate: 14, damage: 4, health: 8,
                    bulletSpeed: 5.6, color: '#4a6a5a', trackColor: '#2a4a3a', turretColor: '#5a7a6a', star: true }
            };

            // ─── СОСТОЯНИЕ ИГРЫ ──────────────────────────────────────
            const state = {
                player: {
                    x: 55,
                    y: 140,
                    w: 30,
                    h: 17,
                    health: 3,
                    maxHealth: 3,
                    speed: 2.2,
                    fireRate: 30,
                    damage: 1,
                    bulletSpeed: 4.2,
                    fireCooldown: 0,
                    alive: true,
                    invincible: 0,
                    trackOffset: 0,
                    barrelAngle: 0
                },
                bullets: [],
                enemyBullets: [],
                enemies: [],
                coins: [],
                explosions: [],
                money: 0,
                score: 0,
                level: 1,
                spawnTimer: 0,
                spawnInterval: 130,
                maxEnemies: 2,
                gameOver: false,
                shopOpen: false,
                paused: false,
                frame: 0,
                timeSeconds: 0,
                ownedTanks: ['t26'],
                currentTankId: 't26',
                enemiesKilled: 0,
                boss: null,
                bossSpawned: false,
                bossDefeated: false,
                buildings: [],
                roadPoints: []
            };

            // ─── ГЕНЕРАЦИЯ КАРТЫ ──────────────────────────────────────
            function generateMap() {
                state.buildings = [];
                for (let i = 0; i < 6; i++) {
                    let x = 50 + i * 70 + Math.random() * 25;
                    let y = 8 + Math.random() * 55;
                    let w = 20 + Math.random() * 28;
                    let h = 25 + Math.random() * 35;
                    if (x + w > GAME_W) break;
                    state.buildings.push({
                        x: x,
                        y: y,
                        w: w,
                        h: h,
                        destroyed: Math.random() > 0.4,
                        color: `hsl(${30 + Math.random()*20}, 20%, ${35 + Math.random()*15}%)`
                    });
                }
                state.roadPoints = [];
                for (let i = 0; i <= 16; i++) {
                    let x = i * (GAME_W / 16);
                    let y = GAME_H - 16 + Math.sin(i * 0.5) * 3 + Math.sin(i * 1.3 + 1) * 2.5;
                    state.roadPoints.push({ x, y });
                }
            }
            generateMap();

            // ─── ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ──────────────────────────────
            function rand(min, max) { return Math.random() * (max - min) + min; }
            function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
            function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
            function getTankDef(id) { return TANK_DEFS[id] || TANK_DEFS['t26']; }
            function getPlayerTankDef() { return getTankDef(state.currentTankId); }

            // ─── ОБНОВИТЬ HUD ──────────────────────────────────────────
            function updateHUD() {
                const def = getPlayerTankDef();
                scoreDisplay.textContent = state.score;
                moneyDisplay.textContent = state.money;
                tankNameDisplay.textContent = def.name;
                const hp = state.player.health;
                const maxHp = state.player.maxHealth;
                tankHealthDisplay.textContent = '❤️ ' + hp + '/' + maxHp;
                levelDisplay.textContent = state.level;
                const mins = Math.floor(state.timeSeconds / 60);
                const secs = Math.floor(state.timeSeconds % 60);
                timeDisplay.textContent = String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
                if (state.paused) {
                    pauseTime.textContent = timeDisplay.textContent;
                }
                if (state.boss && state.boss.alive) {
                    bossHud.style.display = 'flex';
                    bossHpDisplay.textContent = Math.ceil(state.boss.health);
                } else {
                    bossHud.style.display = 'none';
                }
            }

            // ─── СПАВН ВРАГА ──────────────────────────────────────────
            function spawnEnemy() {
                if (state.enemies.length >= state.maxEnemies || state.gameOver || state.paused) return;

                const r = Math.random();
                let enemyType = r < 0.6 ? 'light' : (r < 0.85 ? 'medium' : 'heavy');
                let health, speed, w, h, color, turretColor, trackColor, damage, bulletSpeed, fireRate;
                const baseSpeed = 0.4 + state.level * 0.02;
                const enemyDamage = 1;

                if (enemyType === 'light') {
                    health = 1;
                    speed = baseSpeed * 1.3;
                    w = 20;
                    h = 12;
                    color = '#5a6a4a';
                    turretColor = '#6a7a5a';
                    trackColor = '#3a4a2a';
                    damage = enemyDamage;
                    bulletSpeed = 1.3 + state.level * 0.03;
                    fireRate = 75 - Math.min(state.level, 15);
                } else if (enemyType === 'medium') {
                    health = 2;
                    speed = baseSpeed * 1.0;
                    w = 25;
                    h = 15;
                    color = '#6a5a3a';
                    turretColor = '#7a6a4a';
                    trackColor = '#4a3a2a';
                    damage = enemyDamage;
                    bulletSpeed = 1.5 + state.level * 0.03;
                    fireRate = 65 - Math.min(state.level, 12);
                } else {
                    health = 3;
                    speed = baseSpeed * 0.7;
                    w = 30;
                    h = 18;
                    color = '#4a4a3a';
                    turretColor = '#5a5a4a';
                    trackColor = '#2a2a1a';
                    damage = enemyDamage;
                    bulletSpeed = 1.4 + state.level * 0.025;
                    fireRate = 55 - Math.min(state.level, 10);
                }

                state.enemies.push({
                    x: GAME_W + 10,
                    y: 30 + rand(0, GAME_H - 55 - h),
                    w: w,
                    h: h,
                    health: health,
                    maxHealth: health,
                    speed: Math.max(0.12, speed),
                    color: color,
                    turretColor: turretColor,
                    trackColor: trackColor,
                    damage: damage,
                    bulletSpeed: Math.max(1.1, bulletSpeed),
                    fireRate: Math.max(32, fireRate),
                    fireCooldown: randInt(20, 50),
                    reward: 5,
                    alive: true,
                    hitFlash: 0,
                    trackOffset: rand(0, 100)
                });
            }

            // ─── СПАВН БОССА ──────────────────────────────────────────
            function spawnBoss() {
                if (state.bossSpawned || state.gameOver) return;
                state.bossSpawned = true;
                state.boss = {
                    x: GAME_W + 16,
                    y: GAME_H / 2 - 24,
                    w: 50,
                    h: 34,
                    health: 1000,
                    maxHealth: 1000,
                    speed: 0.18,
                    damage: 1,
                    bulletSpeed: 1.6,
                    fireRate: 240,
                    fireCooldown: randInt(0, 50),
                    color: '#4a2a2a',
                    turretColor: '#6a3a3a',
                    trackColor: '#2a1a1a',
                    alive: true,
                    hitFlash: 0,
                    trackOffset: rand(0, 100),
                    star: true
                };
                for (let i = 0; i < 12; i++) {
                    state.explosions.push({
                        x: state.boss.x + rand(0, state.boss.w),
                        y: state.boss.y + rand(0, state.boss.h),
                        r: rand(3, 8),
                        life: randInt(12, 22),
                        maxLife: 22,
                        color: ['#ff6644', '#ffaa44', '#ffdd66', '#ff8844'][randInt(0, 3)],
                        vx: rand(-1.2, 1.2),
                        vy: rand(-2, 0),
                        gravity: 0.04
                    });
                }
                updateHUD();
            }

            // ─── ВЫСТРЕЛ ИГРОКА ──────────────────────────────────────
            function playerShoot() {
                if (state.gameOver || state.paused) return;
                const p = state.player;
                if (!p.alive || p.fireCooldown > 0) return;
                const def = getPlayerTankDef();
                p.fireCooldown = def.fireRate;
                const angle = p.barrelAngle;
                state.bullets.push({
                    x: p.x + p.w - 2,
                    y: p.y + p.h / 2 - 2,
                    w: 6,
                    h: 3,
                    vx: Math.cos(angle) * def.bulletSpeed,
                    vy: Math.sin(angle) * def.bulletSpeed,
                    damage: def.damage,
                    friendly: true
                });
                state.explosions.push({
                    x: p.x + p.w - 5,
                    y: p.y + p.h / 2 - 3,
                    r: 4,
                    life: 5,
                    maxLife: 5,
                    color: '#ffdd44'
                });
            }

            // ─── ВЫСТРЕЛ ВРАГА ──────────────────────────────────────
            function enemyShoot(enemy) {
                if (enemy.fireCooldown > 0 || !enemy.alive) return;
                const p = state.player;
                if (!p.alive) return;
                enemy.fireCooldown = enemy.fireRate;
                const angle = Math.PI + rand(-0.15, 0.15);
                const speed = enemy.bulletSpeed * 0.5;
                state.enemyBullets.push({
                    x: enemy.x - 3,
                    y: enemy.y + enemy.h / 2 - 2,
                    w: 4,
                    h: 3,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    damage: enemy.damage
                });
            }

            // ─── ВЗРЫВ ────────────────────────────────────────────────
            function createExplosion(x, y, size, color) {
                const count = Math.min(5 + randInt(0, 4), 8);
                for (let i = 0; i < count; i++) {
                    const angle = rand(0, Math.PI * 2);
                    const speed = rand(0.3, 1.6 + size * 0.3);
                    const life = randInt(7, 14);
                    state.explosions.push({
                        x: x + rand(-3, 3),
                        y: y + rand(-3, 3),
                        r: rand(2, 4 + size * 1.2),
                        life: life,
                        maxLife: life,
                        color: color || ['#ff6644', '#ffaa44', '#ff8844', '#ff5533'][randInt(0, 3)],
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 0.3,
                        gravity: 0.05
                    });
                }
            }

            // ─── УНИЧТОЖЕНИЕ ВРАГА ──────────────────────────────────
            function destroyEnemy(enemy) {
                if (!enemy.alive) return;
                enemy.alive = false;
                state.score += 10 + state.level * 2;
                state.money += 5;
                if (state.player.health < state.player.maxHealth) {
                    state.player.health += 1;
                    if (state.player.health > state.player.maxHealth) state.player.health = state.player.maxHealth;
                }
                createExplosion(enemy.x + enemy.w / 2, enemy.y + enemy.h / 2, 0.6, '#ffdd44');
                state.enemiesKilled++;
                if (state.enemiesKilled >= 60 && !state.bossSpawned && !state.bossDefeated) {
                    spawnBoss();
                }
                const newLevel = Math.floor(state.score / 100) + 1;
                if (newLevel > state.level) {
                    state.level = newLevel;
                    state.maxEnemies = Math.min(2 + Math.floor(state.level / 2), 5);
                    state.spawnInterval = Math.max(50, 130 - state.level * 3);
                }
                updateHUD();
            }

            // ─── УНИЧТОЖЕНИЕ БОССА ──────────────────────────────────
            function destroyBoss() {
                const boss = state.boss;
                if (!boss || !boss.alive) return;
                boss.alive = false;
                state.bossDefeated = true;
                state.score += 500;
                state.money += 200;
                for (let i = 0; i < 25; i++) {
                    state.explosions.push({
                        x: boss.x + rand(0, boss.w),
                        y: boss.y + rand(0, boss.h),
                        r: rand(3, 12),
                        life: randInt(12, 26),
                        maxLife: 26,
                        color: ['#ff6644', '#ffaa44', '#ffdd66', '#ff8844', '#ff5533', '#ff3333'][randInt(0, 5)],
                        vx: rand(-2, 2),
                        vy: rand(-3, 0.5),
                        gravity: 0.04
                    });
                }
                for (let i = 0; i < 5; i++) {
                    state.coins.push({
                        x: boss.x + rand(0, boss.w),
                        y: boss.y + rand(0, boss.h),
                        w: 7,
                        h: 7,
                        value: 20,
                        vy: -1.5 - rand(0, 1.5),
                        life: 140,
                        bob: rand(0, 5),
                        collected: false
                    });
                }
                updateHUD();
            }

            // ─── СБРОС ИГРЫ ──────────────────────────────────────────
            function resetGame() {
                const def = getTankDef(state.currentTankId);
                state.player.x = 55;
                state.player.y = 140;
                state.player.w = 30;
                state.player.h = 17;
                state.player.health = def.health;
                state.player.maxHealth = def.health;
                state.player.speed = def.speed;
                state.player.fireRate = def.fireRate;
                state.player.damage = def.damage;
                state.player.bulletSpeed = def.bulletSpeed;
                state.player.fireCooldown = 0;
                state.player.alive = true;
                state.player.invincible = 60;
                state.player.trackOffset = 0;
                state.player.barrelAngle = 0;
                state.bullets = [];
                state.enemyBullets = [];
                state.enemies = [];
                state.coins = [];
                state.explosions = [];
                state.money = Math.max(0, state.money);
                state.score = 0;
                state.level = 1;
                state.spawnTimer = 0;
                state.spawnInterval = 130;
                state.maxEnemies = 2;
                state.gameOver = false;
                state.paused = false;
                state.frame = 0;
                state.timeSeconds = 0;
                state.enemiesKilled = 0;
                state.boss = null;
                state.bossSpawned = false;
                state.bossDefeated = false;

                state.ownedTanks = ['t26'];

                state.level = 1;
                state.maxEnemies = 2;

                    case 'W':

                    case 'S':

                    case 'd':
                    case 'D':
                        keys.right = false;
                        e.preventDefault();
                        break;

                    case 'W':
                        keys.up = false;
                        e.preventDefault();
                        break;
                    case 'ArrowDown':

                    case 'S':
                        keys.down = false;
                        e.preventDefault();
                        break;
                    case ' ':
                    case 'Space':
                        keys.fire = false;
                        e.preventDefault();
                        break;
                    case 'q':
                    case 'Q':

                        e.preventDefault();

            // ─── КНОПКИ УПРАВЛЕНИЯ ──────────────────────────────────────

                btn.addEventListener('touchend', end, { passive: false });

            // ─── МАГАЗИН ──────────────────────────────────────────────
            function renderShop() {
                const list = document.getElementById('shopList');
                list.innerHTML = '';
                const money = state.money;
                document.getElementById('shopMoney').textContent = '💰 ' + money;

                for (const [id, def] of Object.entries(TANK_DEFS)) {
                    const owned = state.ownedTanks.includes(id);
                    const current = state.currentTankId === id;

                    const div = document.createElement('div');
                    div.className = 'shop-item';
                    if (owned) div.classList.add('owned');
                    if (current) div.classList.add('current');

                    const nameSpan = document.createElement('span');
                    nameSpan.className = 's-name';
                    nameSpan.textContent = def.name;

                    const statsSpan = document.createElement('span');
                    statsSpan.className = 's-stats';
                    statsSpan.innerHTML = `
                        <span>⚡${def.speed.toFixed(1)}</span>
                        <span>💥${def.damage}</span>
                        <span>❤️${def.health}</span>
                        <span>🎯${Math.round(60/def.fireRate)}/с</span>
                    `;

                    const priceSpan = document.createElement('span');
                    priceSpan.className = 's-price';
                    if (def.cost === 0) priceSpan.textContent = '★ СТАРТ';
                    else priceSpan.textContent = '💰 ' + def.cost;

                    const actionBtn = document.createElement('button');
                    actionBtn.className = 's-action';

                    if (current) {
                        actionBtn.textContent = '✅ ВЫБРАН';
                        actionBtn.disabled = true;
                        actionBtn.classList.add('equipped');
                    } else if (owned) {
                        actionBtn.textContent = '🔁 ВЫБРАТЬ';
                        actionBtn.classList.add('select');
                        actionBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            state.currentTankId = id;
                            const def2 = getTankDef(id);
                            state.player.health = def2.health;
                            state.player.maxHealth = def2.health;
                            state.player.invincible = 30;
                            resetGame();
                            renderShop();
                            updateHUD();
                        });
                    } else {
                        actionBtn.textContent = '💰 КУПИТЬ';
                        actionBtn.classList.add('buy');
                        if (money < def.cost) actionBtn.disabled = true;
                        actionBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            if (state.money >= def.cost) {
                                state.money -= def.cost;
                                state.ownedTanks.push(id);
                                state.currentTankId = id;
                                const def2 = getTankDef(id);
                                state.player.health = def2.health;
                                state.player.maxHealth = def2.health;
                                state.player.invincible = 30;
                                resetGame();
                                renderShop();
                                updateHUD();
                            }
                        });
                    }

                    div.appendChild(nameSpan);
                    div.appendChild(statsSpan);
                    div.appendChild(priceSpan);
                    div.appendChild(actionBtn);

                    div.addEventListener('click', () => {
                        if (owned && !current) {
                            state.currentTankId = id;
                            const def2 = getTankDef(id);
                            state.player.health = def2.health;
                            state.player.maxHealth = def2.health;
                            state.player.invincible = 30;
                            resetGame();
                            renderShop();
                            updateHUD();
                        } else if (!owned && state.money >= def.cost) {
                            state.money -= def.cost;
                            state.ownedTanks.push(id);
                            state.currentTankId = id;
                            const def2 = getTankDef(id);
                            state.player.health = def2.health;
                            state.player.maxHealth = def2.health;
                            state.player.invincible = 30;
                            resetGame();
                            renderShop();
                            updateHUD();
