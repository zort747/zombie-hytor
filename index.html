<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Танки СССР — PDA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        html, body {
            width: 100%;
            overflow: hidden;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            padding: 8px;
            touch-action: none;
        }
        .pda {
            background: #2d2d3f;
            border-radius: 32px 32px 28px 28px;
            padding: 14px 14px 18px 14px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), inset 0 0 0 2px #4a4a5e, inset 0 0 0 4px #1a1a2a, 0 0 0 6px #0e0e1a;
            position: relative;
            max-width: 660px;
            width: 100%;
            transition: all 0.2s;
        }
        .pda::before {
            content: '';
            position: absolute;
            top: -16px;
            right: 40px;
            width: 6px;
            height: 24px;
            background: linear-gradient(to top, #4a4a5e, #6a6a8a);
            border-radius: 3px 3px 0 0;
            box-shadow: inset 0 -2px 4px rgba(0, 0, 0, 0.5);
        }
        .pda::after {
            content: '';
            position: absolute;
            top: -20px;
            right: 34px;
            width: 14px;
            height: 10px;
            background: #4a4a5e;
            border-radius: 50% 50% 0 0;
            box-shadow: inset 0 -2px 4px rgba(0, 0, 0, 0.4);
        }
        .screen-wrapper {
            background: #1a1a28;
            border-radius: 16px;
            padding: 8px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8), 0 0 0 2px #3a3a4e;
            margin-bottom: 10px;
        }
        .screen {
            background: #1e2b1e;
            border-radius: 10px;
            padding: 5px;
            box-shadow: inset 0 0 30px rgba(0, 20, 0, 0.7);
            position: relative;
            image-rendering: pixelated;
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 600 / 340;
            background: #1a2a1a;
            border-radius: 6px;
            cursor: none;
            image-rendering: pixelated;
            box-shadow: inset 0 0 40px rgba(0, 30, 0, 0.5);
            touch-action: none;
        }
        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 10px 6px 10px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px 8px 0 0;
            border-bottom: 2px solid #3a5a3a;
            font-size: 11px;
            color: #8fca8f;
            text-shadow: 0 0 8px rgba(80, 200, 80, 0.3);
            flex-wrap: wrap;
            gap: 2px 6px;
        }
        .hud-item {
            display: flex;
            align-items: center;
            gap: 3px;
            background: rgba(0, 0, 0, 0.3);
            padding: 1px 7px 1px 5px;
            border-radius: 12px;
            border: 1px solid #2a4a2a;
        }
        .hud-item .icon {
            font-size: 12px;
            opacity: 0.8;
        }
        .hud-item .value {
            font-weight: bold;
            font-size: 12px;
            color: #b0f0b0;
            min-width: 18px;
        }
        .hud-item .label {
            color: #6a9a6a;
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .hud-tank {
            background: rgba(0, 0, 0, 0.4);
            padding: 1px 8px 1px 5px;
            border-radius: 12px;
            border: 1px solid #3a5a3a;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            color: #8fca8f;
        }
        .hud-tank .tname {
            color: #c0f0c0;
            font-weight: bold;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 2px 0px 2px;
            gap: 4px;
            flex-wrap: wrap;
        }
        .ctrl-group {
            display: flex;
            gap: 4px;
            align-items: center;
            flex-wrap: wrap;
        }
        .ctrl-btn {
            background: #3a3a52;
            border: none;
            border-radius: 12px;
            padding: 8px 14px;
            font-size: 18px;
            color: #b0b0d0;
            box-shadow: 0 4px 0 #1a1a2a, inset 0 1px 0 rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.06s ease;
            touch-action: manipulation;
            min-width: 48px;
            min-height: 48px;
            text-align: center;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            line-height: 1.2;
            outline: none;
            -webkit-touch-callout: none;
        }
        .ctrl-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #1a1a2a;
        }
        .ctrl-btn.fire {
            background: #6a2a2a;
            color: #ff8888;
            box-shadow: 0 4px 0 #3a1212, inset 0 1px 0 rgba(255, 100, 100, 0.2);
            min-width: 56px;
        }
        .ctrl-btn.fire:active {
            background: #8a3a3a;
        }
        .ctrl-btn.shop-btn {
            background: #2a4a3a;
            color: #8fca8f;
            box-shadow: 0 4px 0 #142a1a, inset 0 1px 0 rgba(100, 255, 100, 0.1);
            font-size: 16px;
            padding: 8px 14px;
            min-width: 48px;
        }
        .ctrl-btn.shop-btn:active {
            background: #3a5a4a;
        }
        .ctrl-btn.pause-btn {
            background: #4a3a2a;
            color: #f0d080;
            box-shadow: 0 4px 0 #2a1a0a;
            font-size: 16px;
            min-width: 48px;
        }
        .ctrl-btn.pause-btn:active {
            background: #5a4a3a;
        }
        .ctrl-btn.barrel {
            background: #3a3a4a;
            color: #a0b0d0;
            box-shadow: 0 4px 0 #1a1a2a;
            font-size: 16px;
            padding: 8px 10px;
            min-width: 44px;
        }
        .ctrl-btn.barrel:active {
            background: #4a4a5a;
        }
        .ctrl-btn.restart-btn {
            background: #4a2a2a;
            color: #ff8888;
            box-shadow: 0 4px 0 #2a1212;
            font-size: 16px;
            padding: 8px 12px;
            min-width: 48px;
        }
        .ctrl-btn.restart-btn:active {
            background: #5a3a3a;
        }
        .ctrl-btn:disabled {
            opacity: 0.4;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #1a1a2a;
            pointer-events: none;
        }

        /* ─── D-PAD (крестовина) ───────────────────────────────────── */
        .dpad-group {
            flex-shrink: 0;
        }
        .dpad {
            display: grid;
            grid-template-columns: 52px 52px 52px;
            grid-template-rows: 52px 52px 52px;
            gap: 4px;
            justify-items: center;
            align-items: center;
        }
        .dpad .ctrl-btn {
            width: 100%;
            height: 100%;
            min-width: unset;
            min-height: unset;
            padding: 0;
            font-size: 24px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #3a3a52;
            box-shadow: 0 4px 0 #1a1a2a, inset 0 1px 0 rgba(255, 255, 255, 0.1);
            color: #b0b0d0;
            transition: all 0.06s ease;
        }
        .dpad .ctrl-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #1a1a2a;
        }
        #btnUp { grid-column: 2; grid-row: 1; }
        #btnLeft { grid-column: 1; grid-row: 2; }
        #btnDown { grid-column: 2; grid-row: 3; }
        #btnRight { grid-column: 3; grid-row: 2; }
        .dpad-center {
            grid-column: 2;
            grid-row: 2;
            width: 100%;
            height: 100%;
            background: transparent;
            pointer-events: none;
        }

        /* ─── Остальные кнопки ────────────────────────────────────── */
        .shop-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.78);
            backdrop-filter: blur(3px);
            border-radius: 28px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            z-index: 20;
        }
        .shop-overlay.active {
            display: flex;
        }
        .shop-panel {
            background: #1e2a1e;
            border-radius: 20px;
            padding: 16px 18px 20px 18px;
            max-width: 480px;
            width: 100%;
            max-height: 85%;
            overflow-y: auto;
            border: 2px solid #3a6a3a;
            box-shadow: 0 0 60px rgba(0, 40, 0, 0.6);
        }
        .shop-panel::-webkit-scrollbar {
            width: 6px;
        }
        .shop-panel::-webkit-scrollbar-track {
            background: #0a1a0a;
            border-radius: 4px;
        }
        .shop-panel::-webkit-scrollbar-thumb {
            background: #3a6a3a;
            border-radius: 4px;
        }
        .shop-title {
            font-size: 18px;
            color: #8fca8f;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(80, 200, 80, 0.2);
            border-bottom: 2px solid #2a4a2a;
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .shop-title span {
            font-size: 13px;
            color: #f0c040;
        }
        .shop-list {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            padding: 5px 10px 5px 10px;
            border-radius: 8px;
            border: 1px solid #2a4a2a;
            transition: all 0.15s;
            cursor: default;
            gap: 4px;
            flex-wrap: wrap;
        }
        .shop-item.owned {
            border-color: #4a7a4a;
            background: rgba(30, 60, 30, 0.3);
        }
        .shop-item.current {
            border-color: #f0c040;
            background: rgba(60, 50, 20, 0.3);
            box-shadow: 0 0 20px rgba(240, 192, 64, 0.1);
        }
        .shop-item .s-name {
            color: #b0e0b0;
            font-weight: bold;
            font-size: 12px;
            min-width: 50px;
        }
        .shop-item .s-stats {
            color: #6a9a6a;
            font-size: 8px;
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        .shop-item .s-stats span {
            background: rgba(0, 0, 0, 0.3);
            padding: 1px 4px;
            border-radius: 4px;
        }
        .shop-item .s-price {
            color: #f0c040;
            font-weight: bold;
            font-size: 12px;
            min-width: 40px;
            text-align: right;
        }
        .shop-item .s-action {
            background: #2a4a3a;
            border: none;
            border-radius: 6px;
            padding: 2px 12px;
            color: #8fca8f;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 3px 0 #142a1a;
            touch-action: manipulation;
        }
        .shop-item .s-action:active {
            transform: translateY(3px);
            box-shadow: 0 0px 0 #142a1a;
        }
        .shop-item .s-action:disabled {
            opacity: 0.4;
            transform: translateY(2px);
            box-shadow: 0 1px 0 #142a1a;
            pointer-events: none;
        }
        .shop-item .s-action.buy {
            background: #3a5a2a;
            color: #b0f0a0;
        }
        .shop-item .s-action.select {
            background: #4a4a2a;
            color: #f0e080;
        }
        .shop-item .s-action.equipped {
            background: #2a3a2a;
            color: #6a9a6a;
            box-shadow: 0 2px 0 #1a2a1a;
            cursor: default;
        }
        .shop-close {
            margin-top: 10px;
            background: #4a2a2a;
            border: none;
            border-radius: 12px;
            padding: 8px 0;
            width: 100%;
            color: #ff8888;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 0 #2a1212;
            transition: all 0.08s;
            touch-action: manipulation;
            letter-spacing: 2px;
        }
        .shop-close:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #2a1212;
        }
        .gameover-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(2px);
            border-radius: 28px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 15;
            padding: 16px;
        }
        .gameover-overlay.active {
            display: flex;
        }
        .gameover-box {
            background: #1a1a2a;
            border-radius: 20px;
            padding: 24px 30px;
            text-align: center;
            border: 2px solid #6a2a2a;
            box-shadow: 0 0 60px rgba(100, 0, 0, 0.3);
        }
        .gameover-box h1 {
            color: #ff6666;
            font-size: 24px;
            letter-spacing: 4px;
            margin-bottom: 4px;
        }
        .gameover-box .sub {
            color: #8a8aaa;
            font-size: 12px;
            margin-bottom: 8px;
        }
        .gameover-box .final-score {
            color: #f0c040;
            font-size: 18px;
            margin-bottom: 12px;
        }
        .gameover-box .restart-btn {
            background: #3a4a3a;
            border: none;
            border-radius: 12px;
            padding: 8px 32px;
            color: #b0f0b0;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 0 #1a2a1a;
            transition: all 0.08s;
            touch-action: manipulation;
        }
        .gameover-box .restart-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #1a2a1a;
        }
        .pause-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(2px);
            border-radius: 28px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 12;
        }
        .pause-overlay.active {
            display: flex;
        }
        .pause-box {
            color: #b0f0b0;
            font-size: 28px;
            letter-spacing: 6px;
            text-shadow: 0 0 40px rgba(80, 200, 80, 0.3);
            background: rgba(0, 0, 0, 0.5);
            padding: 16px 32px;
            border-radius: 20px;
            border: 2px solid #3a6a3a;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .pause-box .time {
            font-size: 16px;
            color: #8fca8f;
        }
        .pause-box .resume-btn {
            background: #2a4a3a;
            border: none;
            border-radius: 12px;
            padding: 8px 28px;
            color: #8fca8f;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 0 #142a1a;
            transition: all 0.08s;
            touch-action: manipulation;
            letter-spacing: 1px;
            margin-top: 4px;
        }
        .pause-box .resume-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #142a1a;
        }

        /* ─── Адаптив ───────────────────────────────────────────────── */
        @media (max-width: 560px) {
            .pda {
                padding: 10px 8px 12px 8px;
                border-radius: 24px;
            }
            .screen-wrapper {
                padding: 5px;
            }
            .hud {
                font-size: 9px;
                padding: 3px 6px 4px 6px;
                gap: 2px 4px;
            }
            .hud-item {
                padding: 1px 5px;
                border-radius: 8px;
            }
            .hud-item .value {
                font-size: 10px;
                min-width: 14px;
            }
            .hud-item .label {
                font-size: 7px;
            }
            .hud-tank {
                font-size: 8px;
                padding: 1px 5px;
            }
            .dpad {
                grid-template-columns: 48px 48px 48px;
                grid-template-rows: 48px 48px 48px;
                gap: 4px;
            }
            .dpad .ctrl-btn {
                font-size: 22px;
                border-radius: 10px;
            }
            .ctrl-btn {
                padding: 6px 10px;
                font-size: 15px;
                min-width: 42px;
                min-height: 42px;
                border-radius: 10px;
            }
            .ctrl-btn.fire {
                min-width: 48px;
                font-size: 16px;
            }
            .ctrl-btn.shop-btn {
                font-size: 14px;
                padding: 6px 10px;
                min-width: 42px;
            }
            .ctrl-btn.pause-btn {
                font-size: 14px;
                min-width: 42px;
            }
            .ctrl-btn.barrel {
                font-size: 14px;
                padding: 6px 8px;
                min-width: 38px;
            }
            .ctrl-btn.restart-btn {
                font-size: 14px;
                padding: 6px 10px;
                min-width: 42px;
            }
            .shop-panel {
                padding: 10px 12px 14px 12px;
            }
            .shop-title {
                font-size: 15px;
            }
            .shop-item .s-name {
                font-size: 10px;
                min-width: 36px;
            }
            .shop-item .s-stats {
                font-size: 7px;
                gap: 2px;
            }
            .shop-item .s-price {
                font-size: 10px;
                min-width: 30px;
            }
            .shop-item .s-action {
                font-size: 9px;
                padding: 2px 8px;
            }
            .gameover-box {
                padding: 16px 20px;
            }
            .gameover-box h1 {
                font-size: 20px;
            }
            .pause-box {
                font-size: 22px;
                padding: 12px 20px;
                gap: 8px;
            }
            .pause-box .time {
                font-size: 14px;
            }
            .pause-box .resume-btn {
                font-size: 14px;
                padding: 6px 20px;
            }
        }
        @media (max-width: 420px) {
            .dpad {
                grid-template-columns: 42px 42px 42px;
                grid-template-rows: 42px 42px 42px;
                gap: 3px;
            }
            .dpad .ctrl-btn {
                font-size: 18px;
                border-radius: 8px;
            }
            .ctrl-btn {
                padding: 5px 8px;
                font-size: 13px;
                min-width: 36px;
                min-height: 36px;
                border-radius: 8px;
            }
            .ctrl-btn.fire {
                min-width: 40px;
                font-size: 14px;
            }
            .ctrl-btn.shop-btn {
                font-size: 12px;
                padding: 5px 8px;
                min-width: 36px;
            }
            .ctrl-btn.pause-btn {
                font-size: 12px;
                min-width: 36px;
            }
            .ctrl-btn.barrel {
                font-size: 12px;
                padding: 5px 6px;
                min-width: 32px;
            }
            .ctrl-btn.restart-btn {
                font-size: 12px;
                padding: 5px 8px;
                min-width: 36px;
            }
            .hud {
                font-size: 8px;
                gap: 1px 3px;
            }
            .hud-item {
                padding: 0px 4px;
            }
            .hud-item .value {
                font-size: 9px;
                min-width: 12px;
            }
            .shop-item .s-name {
                font-size: 9px;
                min-width: 28px;
            }
            .shop-item .s-stats {
                font-size: 6px;
            }
            .shop-item .s-price {
                font-size: 9px;
                min-width: 24px;
            }
            .shop-item .s-action {
                font-size: 8px;
                padding: 1px 6px;
            }
            .pause-box {
                font-size: 18px;
                padding: 10px 16px;
            }
            .pause-box .resume-btn {
                font-size: 12px;
                padding: 5px 16px;
            }
        }
        @media (max-width: 360px) {
            .dpad {
                grid-template-columns: 38px 38px 38px;
                grid-template-rows: 38px 38px 38px;
                gap: 2px;
            }
            .dpad .ctrl-btn {
                font-size: 16px;
                border-radius: 6px;
            }
            .ctrl-btn {
                padding: 4px 6px;
                font-size: 11px;
                min-width: 30px;
                min-height: 30px;
                border-radius: 6px;
            }
            .ctrl-btn.fire {
                min-width: 34px;
                font-size: 12px;
            }
            .ctrl-btn.shop-btn {
                font-size: 10px;
                padding: 4px 6px;
                min-width: 30px;
            }
            .ctrl-btn.pause-btn {
                font-size: 10px;
                min-width: 30px;
            }
            .ctrl-btn.barrel {
                font-size: 10px;
                padding: 4px 4px;
                min-width: 26px;
            }
            .ctrl-btn.restart-btn {
                font-size: 10px;
                padding: 4px 6px;
                min-width: 30px;
            }
            .hud {
                font-size: 7px;
                gap: 1px 2px;
            }
            .hud-item {
                padding: 0px 3px;
            }
            .hud-item .value {
                font-size: 8px;
                min-width: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="pda" id="pda">
        <div class="screen-wrapper">
            <div class="screen">
                <div class="hud" id="hud">
                    <div class="hud-item">
                        <span class="icon">⭐</span>
                        <span class="label">Счёт</span>
                        <span class="value" id="scoreDisplay">0</span>
                    </div>
                    <div class="hud-item">
                        <span class="icon">💰</span>
                        <span class="label">Деньги</span>
                        <span class="value" id="moneyDisplay">0</span>
                    </div>
                    <div class="hud-tank">
                        <span>🚀</span>
                        <span class="tname" id="tankNameDisplay">Т-26</span>
                        <span style="color:#6a9a6a;font-size:9px;" id="tankHealthDisplay">❤️ 3/3</span>
                    </div>
                    <div class="hud-item">
                        <span class="icon">🎯</span>
                        <span class="label">Ур.</span>
                        <span class="value" id="levelDisplay">1</span>
                    </div>
                    <div class="hud-item">
                        <span class="icon">⏱️</span>
                        <span class="label">Время</span>
                        <span class="value" id="timeDisplay">00:00</span>
                    </div>
                </div>
                <canvas id="gameCanvas" width="600" height="340"></canvas>
            </div>
        </div>

        <div class="controls">
            <!-- D-Pad (крестовина) — слева -->
            <div class="ctrl-group dpad-group">
                <div class="dpad">
                    <button class="ctrl-btn" id="btnUp">▲</button>
                    <button class="ctrl-btn" id="btnLeft">◀</button>
                    <button class="ctrl-btn" id="btnDown">▼</button>
                    <button class="ctrl-btn" id="btnRight">▶</button>
                    <div class="dpad-center"></div>
                </div>
            </div>

            <!-- Пауза, магазин, рестарт — по центру -->
            <div class="ctrl-group">
                <button class="ctrl-btn pause-btn" id="btnPause">⏸️</button>
                <button class="ctrl-btn shop-btn" id="btnShop">🏪</button>
                <button class="ctrl-btn restart-btn" id="btnRestart">🔄</button>
            </div>

            <!-- Кнопки наклона пушки и выстрела — справа -->
            <div class="ctrl-group">
                <button class="ctrl-btn barrel" id="btnBarrelUp">↗</button>
                <button class="ctrl-btn barrel" id="btnBarrelDown">↘</button>
                <button class="ctrl-btn fire" id="btnFire">🔥</button>
            </div>
        </div>

        <div class="shop-overlay" id="shopOverlay">
            <div class="shop-panel">
                <div class="shop-title">
                    <span>🏪 МАГАЗИН ТАНКОВ</span>
                    <span id="shopMoney">💰 0</span>
                </div>
                <div class="shop-list" id="shopList"></div>
                <button class="shop-close" id="shopClose">✕ ЗАКРЫТЬ</button>
            </div>
        </div>

        <div class="pause-overlay" id="pauseOverlay">
            <div class="pause-box">
                ⏸ ПАУЗА
                <div class="time" id="pauseTime">00:00</div>
                <button class="resume-btn" id="resumeBtn">▶ ПРОДОЛЖИТЬ</button>
            </div>
        </div>

        <div class="gameover-overlay" id="gameoverOverlay">
            <div class="gameover-box">
                <h1>☠️ ПОДБИТ</h1>
                <div class="sub">Ваш танк уничтожен</div>
                <div class="final-score">⭐ Счёт: <span id="finalScore">0</span></div>
                <button class="restart-btn" id="restartBtn">🔄 НОВЫЙ БОЙ</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ─── CANVAS ───────────────────────────────────────────────────
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const W = 600,
                H = 340;

            // ─── DOM ЭЛЕМЕНТЫ ──────────────────────────────────────────
            const scoreDisplay = document.getElementById('scoreDisplay');
            const moneyDisplay = document.getElementById('moneyDisplay');
            const tankNameDisplay = document.getElementById('tankNameDisplay');
            const tankHealthDisplay = document.getElementById('tankHealthDisplay');
            const levelDisplay = document.getElementById('levelDisplay');
            const timeDisplay = document.getElementById('timeDisplay');
            const finalScore = document.getElementById('finalScore');
            const shopOverlay = document.getElementById('shopOverlay');
            const shopList = document.getElementById('shopList');
            const shopMoney = document.getElementById('shopMoney');
            const gameoverOverlay = document.getElementById('gameoverOverlay');
            const pauseOverlay = document.getElementById('pauseOverlay');
            const pauseTime = document.getElementById('pauseTime');

            // ─── ОПРЕДЕЛЕНИЯ ТАНКОВ (СССР) ────────────────────────────
            const TANK_DEFS = {
                't26': { id: 't26', name: 'Т-26', cost: 0, speed: 2.6, fireRate: 26, damage: 1, health: 3,
                    bulletSpeed: 4.8, color: '#5a7a3a', trackColor: '#3a4a2a', turretColor: '#6a8a4a', star: true },
                'bt7': { id: 'bt7', name: 'БТ-7', cost: 60, speed: 4.0, fireRate: 20, damage: 1, health: 3,
                    bulletSpeed: 5.2, color: '#6a8a4a', trackColor: '#4a5a3a', turretColor: '#7a9a5a', star: true },
                't34': { id: 't34', name: 'Т-34', cost: 120, speed: 3.4, fireRate: 16, damage: 2, health: 5,
                    bulletSpeed: 5.6, color: '#4a7a3a', trackColor: '#2a4a2a', turretColor: '#5a8a4a', star: true },
                'kv1': { id: 'kv1', name: 'КВ-1', cost: 220, speed: 2.4, fireRate: 20, damage: 2, health: 8,
                    bulletSpeed: 5.0, color: '#3a6a3a', trackColor: '#2a3a2a', turretColor: '#4a7a4a', star: true },
                'is2': { id: 'is2', name: 'ИС-2', cost: 350, speed: 2.6, fireRate: 22, damage: 3, health: 7,
                    bulletSpeed: 5.4, color: '#2a5a2a', trackColor: '#1a3a1a', turretColor: '#3a6a3a', star: true },
                't44': { id: 't44', name: 'Т-44', cost: 480, speed: 3.8, fireRate: 14, damage: 2, health: 6,
                    bulletSpeed: 5.8, color: '#4a6a3a', trackColor: '#2a4a2a', turretColor: '#5a7a4a', star: true },
                'is3': { id: 'is3', name: 'ИС-3', cost: 620, speed: 2.2, fireRate: 24, damage: 3, health: 9,
                    bulletSpeed: 5.2, color: '#2a4a2a', trackColor: '#1a2a1a', turretColor: '#3a5a3a', star: true },
                't54': { id: 't54', name: 'Т-54', cost: 780, speed: 4.4, fireRate: 12, damage: 3, health: 7,
                    bulletSpeed: 6.2, color: '#4a7a5a', trackColor: '#2a4a3a', turretColor: '#5a8a6a', star: true },
                't10': { id: 't10', name: 'Т-10', cost: 950, speed: 2.8, fireRate: 18, damage: 4, health: 10,
                    bulletSpeed: 5.6, color: '#3a5a3a', trackColor: '#1a3a1a', turretColor: '#4a6a4a', star: true },
                't62': { id: 't62', name: 'Т-62', cost: 1200, speed: 4.2, fireRate: 10, damage: 4, health: 8,
                    bulletSpeed: 6.5, color: '#4a6a5a', trackColor: '#2a4a3a', turretColor: '#5a7a6a', star: true }
            };

            // ─── СОСТОЯНИЕ ИГРЫ ──────────────────────────────────────
            const state = {
                player: {
                    x: 70,
                    y: 180,
                    w: 38,
                    h: 22,
                    tankId: 't26',
                    health: 3,
                    maxHealth: 3,
                    speed: 2.6,
                    fireRate: 26,
                    damage: 1,
                    bulletSpeed: 4.8,
                    fireCooldown: 0,
                    alive: true,
                    invincible: 0,
                    trackOffset: 0,
                    barrelAngle: 0
                },
                bullets: [],
                enemyBullets: [],
                enemies: [],
                coins: [],
                explosions: [],
                money: 0,
                score: 0,
                level: 1,
                spawnTimer: 0,
                spawnInterval: 120,
                maxEnemies: 2,
                gameOver: false,
                shopOpen: false,
                paused: false,
                frame: 0,
                timeSeconds: 0,
                ownedTanks: ['t26'],
                currentTankId: 't26',
                buildings: [],
                roadPoints: []
            };

            // ─── ГЕНЕРАЦИЯ КАРТЫ ──────────────────────────────────────
            function generateMap() {
                state.buildings = [];
                for (let i = 0; i < 12; i++) {
                    let x = 50 + i * 55 + Math.random() * 30;
                    let y = 10 + Math.random() * 80;
                    let w = 25 + Math.random() * 40;
                    let h = 30 + Math.random() * 50;
                    if (x + w > W) break;
                    state.buildings.push({
                        x: x,
                        y: y,
                        w: w,
                        h: h,
                        destroyed: Math.random() > 0.4,
                        color: `hsl(${30 + Math.random()*20}, 20%, ${30 + Math.random()*20}%)`,
                        windows: Math.floor(Math.random() * 3) + 1
                    });
                }
                state.roadPoints = [];
                for (let i = 0; i <= 20; i++) {
                    let x = i * (W / 20);
                    let y = H - 20 + Math.sin(i * 0.5) * 4 + Math.sin(i * 1.3 + 1) * 3;
                    state.roadPoints.push({ x, y });
                }
            }
            generateMap();

            // ─── ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ──────────────────────────────
            function rand(min, max) { return Math.random() * (max - min) + min; }

            function randInt(min, max) { return Math.floor(rand(min, max + 1)); }

            function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

            function getTankDef(id) { return TANK_DEFS[id] || TANK_DEFS['t26']; }

            function getPlayerTankDef() { return getTankDef(state.currentTankId); }

            // ─── ОБНОВИТЬ HUD ──────────────────────────────────────────
            function updateHUD() {
                const def = getPlayerTankDef();
                scoreDisplay.textContent = state.score;
                moneyDisplay.textContent = state.money;
                tankNameDisplay.textContent = def.name;
                const hp = state.player.health;
                const maxHp = state.player.maxHealth;
                tankHealthDisplay.textContent = '❤️ ' + hp + '/' + maxHp;
                levelDisplay.textContent = state.level;
                const mins = Math.floor(state.timeSeconds / 60);
                const secs = Math.floor(state.timeSeconds % 60);
                timeDisplay.textContent = String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
                if (state.paused) {
                    pauseTime.textContent = timeDisplay.textContent;
                }
            }

            // ─── СПАВН ВРАГА ──────────────────────────────────────────
            function spawnEnemy() {
                if (state.enemies.length >= state.maxEnemies) return;
                if (state.gameOver || state.paused) return;

                let enemyType;
                const r = Math.random();
                if (state.level < 5) {
                    enemyType = r < 0.85 ? 'light' : (r < 0.95 ? 'medium' : 'heavy');
                } else {
                    enemyType = r < 0.6 ? 'light' : (r < 0.85 ? 'medium' : 'heavy');
                }

                let health, speed, color, turretColor, trackColor, damage, bulletSpeed, fireRate, w, h, reward;

                if (enemyType === 'light') {
                    health = 1;
                    speed = 0.5 + state.level * 0.025;
                    color = '#5a6a4a';
                    turretColor = '#6a7a5a';
                    trackColor = '#3a4a2a';
                    damage = 1;
                    bulletSpeed = 1.7 + state.level * 0.04;
                    fireRate = 75 - Math.min(state.level, 20);
                    w = 26;
                    h = 15;
                    reward = 5;
                } else if (enemyType === 'medium') {
                    health = 2;
                    speed = 0.4 + state.level * 0.02;
                    color = '#6a5a3a';
                    turretColor = '#7a6a4a';
                    trackColor = '#4a3a2a';
                    damage = 1;
                    bulletSpeed = 2.0 + state.level * 0.04;
                    fireRate = 65 - Math.min(state.level, 15);
                    w = 32;
                    h = 18;
                    reward = 5;
                } else {
                    health = 3;
                    speed = 0.35 + state.level * 0.015;
                    color = '#4a4a3a';
                    turretColor = '#5a5a4a';
                    trackColor = '#2a2a1a';
                    damage = 1;
                    bulletSpeed = 1.8 + state.level * 0.03;
                    fireRate = 55 - Math.min(state.level, 10);
                    w = 38;
                    h = 22;
                    reward = 5;
                }

                const enemy = {
                    x: W + 10,
                    y: 50 + rand(0, H - 80 - h),
                    w: w,
                    h: h,
                    health: Math.max(1, health),
                    maxHealth: Math.max(1, health),
                    speed: Math.max(0.2, speed),
                    color: color,
                    turretColor: turretColor,
                    trackColor: trackColor,
                    damage: damage,
                    bulletSpeed: Math.max(1.4, bulletSpeed),
                    fireRate: Math.max(35, fireRate),
                    fireCooldown: randInt(25, 65),
                    reward: reward,
                    alive: true,
                    hitFlash: 0,
                    trackOffset: rand(0, 100),
                    shootTimer: 0,
                    moveTimer: 0,
                    yTarget: 50 + rand(0, H - 80 - h)
                };
                state.enemies.push(enemy);
            }

            // ─── ВЫСТРЕЛ ИГРОКА ──────────────────────────────────────
            function playerShoot() {
                if (state.gameOver || state.paused) return;
                const p = state.player;
                if (!p.alive) return;
                if (p.fireCooldown > 0) return;

                const def = getPlayerTankDef();
                p.fireCooldown = def.fireRate;

                const angle = p.barrelAngle;
                const startX = p.x + p.w - 2;
                const startY = p.y + p.h / 2 - 2;

                state.bullets.push({
                    x: startX,
                    y: startY,
                    w: 8,
                    h: 4,
                    vx: Math.cos(angle) * def.bulletSpeed,
                    vy: Math.sin(angle) * def.bulletSpeed,
                    damage: def.damage,
                    friendly: true,
                    trail: []
                });

                state.explosions.push({
                    x: startX - 4,
                    y: startY - 4,
                    r: 6,
                    life: 8,
                    maxLife: 8,
                    color: '#ffdd44'
                });
            }

            // ─── ВЫСТРЕЛ ВРАГА ──────────────────────────────────────
            function enemyShoot(enemy) {
                if (enemy.fireCooldown > 0) return;
                if (!enemy.alive) return;
                const p = state.player;
                if (!p.alive) return;

                enemy.fireCooldown = enemy.fireRate;

                const angle = Math.PI + rand(-0.2, 0.2);
                const speed = enemy.bulletSpeed * 0.6;
                const bx = enemy.x - 4;
                const by = enemy.y + enemy.h / 2 - 2;

                state.enemyBullets.push({
                    x: bx,
                    y: by,
                    w: 6,
                    h: 3,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    damage: enemy.damage,
                    trail: []
                });
            }

            // ─── ВЗРЫВ ────────────────────────────────────────────────
            function createExplosion(x, y, size, color) {
                const count = 8 + randInt(0, 5);
                for (let i = 0; i < count; i++) {
                    const angle = rand(0, Math.PI * 2);
                    const speed = rand(0.3, 2.0 + size * 0.3);
                    const life = randInt(8, 18);
                    state.explosions.push({
                        x: x + rand(-4, 4),
                        y: y + rand(-4, 4),
                        r: rand(2, 5 + size * 1.5),
                        life: life,
                        maxLife: life,
                        color: color || ['#ff6644', '#ffaa44', '#ffdd66', '#ff8844', '#ff5533'][randInt(0, 4)],
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 0.4,
                        gravity: 0.06
                    });
                }
            }

            // ─── УНИЧТОЖЕНИЕ ВРАГА ──────────────────────────────────
            function destroyEnemy(enemy) {
                if (!enemy.alive) return;
                enemy.alive = false;

                state.score += 10 + state.level * 2;
                state.money += 5;

                if (state.player.health < state.player.maxHealth) {
                    state.player.health += 1;
                }

                createExplosion(enemy.x + enemy.w / 2, enemy.y + enemy.h / 2, 0.8, '#ffdd44');
                createExplosion(enemy.x + enemy.w / 2, enemy.y + enemy.h / 2, 1.2, '#ff8844');

                const newLevel = Math.floor(state.score / 100) + 1;
                if (newLevel > state.level) {
                    state.level = newLevel;
                    state.maxEnemies = Math.min(2 + Math.floor(state.level / 2), 6);
                    state.spawnInterval = Math.max(50, 120 - state.level * 2);
                }
                updateHUD();
            }

            // ─── СБРОС ИГРЫ ──────────────────────────────────────────
            function resetGame() {
                const def = getTankDef(state.currentTankId);
                state.player.x = 70;
                state.player.y = 180;
                state.player.w = 38;
                state.player.h = 22;
                state.player.health = def.health;
                state.player.maxHealth = def.health;
                state.player.speed = def.speed;
                state.player.fireRate = def.fireRate;
                state.player.damage = def.damage;
                state.player.bulletSpeed = def.bulletSpeed;
                state.player.fireCooldown = 0;
                state.player.alive = true;
                state.player.invincible = 60;
                state.player.trackOffset = 0;
                state.player.barrelAngle = 0;

                state.bullets = [];
                state.enemyBullets = [];
                state.enemies = [];
                state.coins = [];
                state.explosions = [];

                state.money = Math.max(0, state.money);
                state.score = 0;
                state.level = 1;
                state.spawnTimer = 0;
                state.spawnInterval = 120;
                state.maxEnemies = 2;
                state.gameOver = false;
                state.paused = false;
                state.frame = 0;
                state.timeSeconds = 0;

                gameoverOverlay.classList.remove('active');
                pauseOverlay.classList.remove('active');
                updateHUD();
            }

            function fullRestart() {
                state.money = 0;
                state.score = 0;
                state.ownedTanks = ['t26'];
                state.currentTankId = 't26';
                state.level = 1;
                state.maxEnemies = 2;
                state.spawnInterval = 120;
                state.timeSeconds = 0;
                resetGame();
                renderShop();
            }

            // ─── ПАУЗА ──────────────────────────────────────────────────
            function togglePause() {
                if (state.gameOver) return;
                state.paused = !state.paused;
                pauseOverlay.classList.toggle('active', state.paused);
                if (state.paused) {
                    pauseTime.textContent = timeDisplay.textContent;
                }
            }

            function resumeGame() {
                if (state.paused) {
                    state.paused = false;
                    pauseOverlay.classList.remove('active');
                }
            }

            // ─── ОБНОВЛЕНИЕ ──────────────────────────────────────────
            function update() {
                if (state.gameOver || state.paused) return;

                state.frame++;
                if (state.frame % 60 === 0) {
                    state.timeSeconds++;
                    updateHUD();
                }

                const p = state.player;
                const def = getPlayerTankDef();

                p.speed = def.speed;
                p.fireRate = def.fireRate;
                p.damage = def.damage;
                p.bulletSpeed = def.bulletSpeed;
                p.maxHealth = def.health;
                if (p.health > p.maxHealth) p.health = p.maxHealth;

                if (p.invincible > 0) p.invincible--;
                if (p.fireCooldown > 0) p.fireCooldown--;

                let dx = 0,
                    dy = 0;
                if (keys.left) dx = -p.speed;
                if (keys.right) dx = p.speed;
                if (keys.up) dy = -p.speed * 0.7;
                if (keys.down) dy = p.speed * 0.7;

                if (dx !== 0) p.trackOffset += 0.3;
                p.x = clamp(p.x + dx, 10, W - p.w - 10);
                p.y = clamp(p.y + dy, 30, H - p.h - 10);

                if (keys.barrelUp) {
                    p.barrelAngle = Math.max(-0.6, p.barrelAngle - 0.04);
                }
                if (keys.barrelDown) {
                    p.barrelAngle = Math.min(0.6, p.barrelAngle + 0.04);
                }

                if (keys.fire) playerShoot();

                // ── Пули игрока ──
                for (let i = state.bullets.length - 1; i >= 0; i--) {
                    const b = state.bullets[i];
                    b.x += b.vx;
                    b.y += b.vy;
                    b.trail.push({ x: b.x, y: b.y });
                    if (b.trail.length > 6) b.trail.shift();
                    if (b.x > W + 20 || b.x < -20 || b.y < -20 || b.y > H + 20) {
                        state.bullets.splice(i, 1);
                        continue;
                    }

                    let hit = false;
                    for (const enemy of state.enemies) {
                        if (!enemy.alive) continue;
                        if (b.x < enemy.x + enemy.w && b.x + b.w > enemy.x &&
                            b.y < enemy.y + enemy.h && b.y + b.h > enemy.y) {
                            enemy.health -= b.damage;
                            enemy.hitFlash = 8;
                            createExplosion(b.x, b.y, 0.3, '#ffaa44');
                            if (enemy.health <= 0) {
                                destroyEnemy(enemy);
                            }
                            hit = true;
                            break;
                        }
                    }
                    if (hit) {
                        state.bullets.splice(i, 1);
                    }
                }

                // ── Пули врагов ──
                for (let i = state.enemyBullets.length - 1; i >= 0; i--) {
                    const b = state.enemyBullets[i];
                    b.x += b.vx;
                    b.y += b.vy;
                    b.trail.push({ x: b.x, y: b.y });
                    if (b.trail.length > 5) b.trail.shift();
                    if (b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20) {
                        state.enemyBullets.splice(i, 1);
                        continue;
                    }

                    if (p.alive && p.invincible === 0) {
                        if (b.x < p.x + p.w && b.x + b.w > p.x &&
                            b.y < p.y + p.h && b.y + b.h > p.y) {
                            p.health -= b.damage;
                            p.invincible = 30;
                            createExplosion(b.x, b.y, 0.5, '#ff5533');
                            state.enemyBullets.splice(i, 1);
                            updateHUD();
                            if (p.health <= 0) {
                                p.alive = false;
                                createExplosion(p.x + p.w / 2, p.y + p.h / 2, 1.8, '#ff6644');
                                state.gameOver = true;
                                finalScore.textContent = state.score;
                                gameoverOverlay.classList.add('active');
                            }
                            continue;
                        }
                    }
                }

                // ── Враги ──
                for (let i = state.enemies.length - 1; i >= 0; i--) {
                    const enemy = state.enemies[i];
                    if (!enemy.alive) {
                        state.enemies.splice(i, 1);
                        continue;
                    }

                    if (enemy.hitFlash > 0) enemy.hitFlash--;

                    const targetY = state.player.y + state.player.h / 2 - enemy.h / 2;
                    const dy2 = targetY - enemy.y;
                    const moveSpeed = enemy.speed * 0.35;
                    if (Math.abs(dy2) > 6) {
                        enemy.y += Math.sign(dy2) * Math.min(Math.abs(dy2) * 0.025, moveSpeed);
                    }
                    enemy.y = clamp(enemy.y, 30, H - enemy.h - 10);

                    enemy.x -= enemy.speed * 0.25;

                    if (enemy.x < -60) {
                        state.enemies.splice(i, 1);
                        continue;
                    }

                    if (enemy.fireCooldown > 0) enemy.fireCooldown--;
                    if (Math.random() < 0.18) enemyShoot(enemy);

                    if (p.alive && p.invincible === 0) {
                        if (enemy.x < p.x + p.w && enemy.x + enemy.w > p.x &&
                            enemy.y < p.y + p.h && enemy.y + enemy.h > p.y) {
                            p.health -= 1;
                            p.invincible = 40;
                            createExplosion(enemy.x + enemy.w / 2, enemy.y + enemy.h / 2, 0.6, '#ff6644');
                            enemy.x += 30;
                            updateHUD();
                            if (p.health <= 0) {
                                p.alive = false;
                                createExplosion(p.x + p.w / 2, p.y + p.h / 2, 1.8, '#ff6644');
                                state.gameOver = true;
                                finalScore.textContent = state.score;
                                gameoverOverlay.classList.add('active');
                            }
                        }
                    }

                    enemy.trackOffset += 0.12;
                }

                // ── Спавн врагов ──
                state.spawnTimer++;
                if (state.spawnTimer >= state.spawnInterval) {
                    state.spawnTimer = 0;
                    spawnEnemy();
                    if (state.level > 8 && Math.random() < 0.05) spawnEnemy();
                }

                // ── Взрывы ──
                for (let i = state.explosions.length - 1; i >= 0; i--) {
                    const e = state.explosions[i];
                    e.x += e.vx || 0;
                    e.y += e.vy || 0;
                    if (e.gravity) e.vy += e.gravity;
                    e.life--;
                    if (e.life <= 0) {
                        state.explosions.splice(i, 1);
                    }
                }

                updateHUD();
            }

            // ─── ОТРИСОВКА ТАНКА ───────────────────────────────────────
            function drawTank(ctx, x, y, w, h, color, turretColor, trackColor, trackOffset, facing, flash, barrelAngle,
                star) {
                const f = facing || 1;
                ctx.save();

                const bodyColor = flash ? '#ffffff' : color;
                const bodyW = w;
                const bodyH = h * 0.55;
                const bodyX = x;
                const bodyY = y + h * 0.25;

                ctx.shadowColor = 'rgba(0,0,0,0.4)';
                ctx.shadowBlur = 8;
                ctx.shadowOffsetY = 2;

                ctx.fillStyle = bodyColor;
                ctx.strokeStyle = '#1a1a1a';
                ctx.lineWidth = 1.2;
                ctx.beginPath();
                ctx.roundRect(bodyX, bodyY, bodyW, bodyH, 5);
                ctx.fill();
                ctx.stroke();

                const trackY = y + h * 0.7;
                const trackH = h * 0.3;
                ctx.shadowBlur = 0;
                ctx.fillStyle = trackColor || '#3a3a2a';
                ctx.fillRect(x + 2, trackY, w - 4, trackH);
                const wheelCount = Math.max(4, Math.floor(w / 10));
                const wheelSpacing = (w - 8) / (wheelCount + 0.5);
                for (let i = 0; i < wheelCount; i++) {
                    const wx = x + 4 + i * wheelSpacing + wheelSpacing * 0.3;
                    const wy = trackY + trackH / 2;
                    ctx.beginPath();
                    ctx.arc(wx, wy, trackH * 0.4, 0, Math.PI * 2);
                    ctx.fillStyle = '#2a2a1a';
                    ctx.fill();
                    ctx.strokeStyle = '#1a1a1a';
                    ctx.lineWidth = 0.8;
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(wx, wy, trackH * 0.15, 0, Math.PI * 2);
                    ctx.fillStyle = '#4a4a3a';
                    ctx.fill();
                }
                for (let i = 0; i < 10; i++) {
                    const tx = x + 4 + (i / 10) * (w - 8) + (trackOffset % 10) * 0.5;
                    ctx.beginPath();
                    ctx.moveTo(tx, trackY + 2);
                    ctx.lineTo(tx + 4, trackY + trackH - 2);
                    ctx.strokeStyle = '#2a2a1a';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }

                const turretW = w * 0.4;
                const turretH = h * 0.45;
                const turretX = x + w * 0.4;
                const turretY = y + h * 0.1;

                ctx.shadowBlur = 6;
                ctx.shadowOffsetY = 1;
                ctx.fillStyle = turretColor || color;
                ctx.strokeStyle = '#1a1a1a';
                ctx.lineWidth = 1.2;
                ctx.beginPath();
                ctx.roundRect(turretX, turretY, turretW, turretH, 6);
                ctx.fill();
                ctx.stroke();

                ctx.shadowBlur = 4;
                const barrelLen = w * 0.55;
                const barrelW = 4;
                const barrelX = (f > 0) ? turretX + turretW : turretX - barrelLen;
                const barrelY = turretY + turretH / 2 - barrelW / 2;

                ctx.save();
                ctx.translate(barrelX + (f > 0 ? 0 : barrelLen), barrelY + barrelW / 2);
                ctx.rotate(barrelAngle || 0);
                ctx.fillStyle = '#2a2a2a';
                ctx.strokeStyle = '#1a1a1a';
                ctx.lineWidth = 1.2;
                ctx.fillRect(0, -barrelW / 2, barrelLen, barrelW);
                ctx.strokeRect(0, -barrelW / 2, barrelLen, barrelW);
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(barrelLen - 6, -barrelW / 2 - 1, 6, barrelW + 2);
                ctx.restore();

                if (star) {
                    ctx.shadowBlur = 0;
                    const sx = turretX + turretW / 2;
                    const sy = turretY + turretH / 2;
                    ctx.fillStyle = '#cc2222';
                    ctx.strokeStyle = '#aa1111';
                    ctx.lineWidth = 1;
                    const size = 5;
                    ctx.beginPath();
                    for (let i = 0; i < 5; i++) {
                        const angle = (i * 4 * Math.PI / 5) - Math.PI / 2;
                        const r = (i % 2 === 0) ? size : size * 0.4;
                        const px = sx + Math.cos(angle) * r;
                        const py = sy + Math.sin(angle) * r;
                        if (i === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                }

                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(turretX + turretW * 0.6, turretY + turretH * 0.25, 3, 0, Math.PI * 2);
                ctx.fillStyle = '#1a1a1a';
                ctx.fill();

                ctx.restore();
            }

            // ─── ОТРИСОВКА ────────────────────────────────────────────
            function draw() {
                ctx.clearRect(0, 0, W, H);

                const grad = ctx.createLinearGradient(0, 0, 0, H);
                grad.addColorStop(0, '#1a2a3a');
                grad.addColorStop(0.5, '#2a3a2a');
                grad.addColorStop(1, '#1a2a1a');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, W, H);

                for (const bld of state.buildings) {
                    ctx.fillStyle = bld.color;
                    ctx.shadowColor = 'rgba(0,0,0,0.3)';
                    ctx.shadowBlur = 6;
                    ctx.shadowOffsetY = 2;
                    ctx.fillRect(bld.x, bld.y, bld.w, bld.h);
                    ctx.shadowBlur = 0;
                    const winCount = bld.windows;
                    const gap = bld.w / (winCount + 1);
                    for (let i = 0; i < winCount; i++) {
                        const wx = bld.x + gap * (i + 1) - 4;
                        const wy = bld.y + 8 + (bld.h - 16) * 0.3;
                        ctx.fillStyle = bld.destroyed ? '#2a2a1a' : '#8a9a7a';
                        ctx.fillRect(wx, wy, 8, 8);
                        if (!bld.destroyed) {
                            ctx.fillStyle = '#aabb99';
                            ctx.fillRect(wx + 1, wy + 1, 6, 6);
                            ctx.fillStyle = '#c0d0b0';
                            ctx.fillRect(wx + 2, wy + 2, 2, 2);
                        }
                    }
                    if (bld.destroyed) {
                        ctx.fillStyle = '#2a2a1a';
                        ctx.fillRect(bld.x + 4, bld.y + bld.h - 6, bld.w - 8, 4);
                        ctx.fillRect(bld.x + 6, bld.y + bld.h - 12, 4, 6);
                    }
                }

                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.moveTo(0, H - 20);
                for (const pt of state.roadPoints) {
                    ctx.lineTo(pt.x, pt.y);
                }
                ctx.lineTo(W, H - 20);
                ctx.lineTo(W, H);
                ctx.lineTo(0, H);
                ctx.closePath();
                ctx.fillStyle = '#2a3a2a';
                ctx.fill();
                ctx.strokeStyle = '#1a2a1a';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                ctx.strokeStyle = '#3a4a3a';
                ctx.lineWidth = 1;
                ctx.beginPath();
                for (const pt of state.roadPoints) {
                    if (pt === state.roadPoints[0]) ctx.moveTo(pt.x, pt.y);
                    else ctx.lineTo(pt.x, pt.y);
                }
                ctx.stroke();

                for (const enemy of state.enemies) {
                    if (!enemy.alive) continue;
                    const flash = enemy.hitFlash > 0;
                    drawTank(ctx, enemy.x, enemy.y, enemy.w, enemy.h,
                        flash ? '#ffffff' : enemy.color,
                        flash ? '#dddddd' : enemy.turretColor,
                        enemy.trackColor,
                        enemy.trackOffset || 0,
                        -1,
                        flash,
                        0,
                        false
                    );
                    if (enemy.health < enemy.maxHealth) {
                        const barW = enemy.w;
                        const barH = 3;
                        const barX = enemy.x;
                        const barY = enemy.y - 8;
                        ctx.fillStyle = 'rgba(0,0,0,0.6)';
                        ctx.fillRect(barX, barY, barW, barH);
                        ctx.fillStyle = '#44cc44';
                        ctx.fillRect(barX + 1, barY + 1, (barW - 2) * (enemy.health / enemy.maxHealth), barH - 2);
                    }
                }

                for (const b of state.bullets) {
                    for (let t = 0; t < b.trail.length; t++) {
                        const alpha = t / b.trail.length * 0.5;
                        ctx.fillStyle = `rgba(255,255,100,${alpha})`;
                        ctx.fillRect(b.trail[t].x - 2, b.trail[t].y - 1, 4, 3);
                    }
                    ctx.fillStyle = '#ffff44';
                    ctx.shadowColor = '#ffff44';
                    ctx.shadowBlur = 12;
                    ctx.fillRect(b.x, b.y, b.w, b.h);
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(b.x + 1, b.y + 1, b.w - 2, b.h - 2);
                }

                for (const b of state.enemyBullets) {
                    for (let t = 0; t < b.trail.length; t++) {
                        const alpha = t / b.trail.length * 0.4;
                        ctx.fillStyle = `rgba(255,80,40,${alpha})`;
                        ctx.fillRect(b.trail[t].x - 2, b.trail[t].y - 1, 4, 3);
                    }
                    ctx.fillStyle = '#ff5533';
                    ctx.shadowColor = '#ff5533';
                    ctx.shadowBlur = 10;
                    ctx.fillRect(b.x, b.y, b.w, b.h);
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#ff8866';
                    ctx.fillRect(b.x + 1, b.y + 1, b.w - 2, b.h - 2);
                }

                const p = state.player;
                if (p.alive) {
                    const flash = p.invincible > 0 && Math.floor(p.invincible / 4) % 2 === 0;
                    const def = getPlayerTankDef();
                    drawTank(ctx, p.x, p.y, p.w, p.h,
                        flash ? '#ffffff' : def.color,
                        flash ? '#dddddd' : def.turretColor,
                        def.trackColor,
                        p.trackOffset || 0,
                        1,
                        flash,
                        p.barrelAngle,
                        true
                    );
                    const barW = p.w + 10;
                    const barH = 4;
                    const barX = p.x - 5;
                    const barY = p.y - 14;
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = 'rgba(0,0,0,0.6)';
                    ctx.fillRect(barX, barY, barW, barH);
                    const hpRatio = p.health / p.maxHealth;
                    const hpColor = hpRatio > 0.5 ? '#44cc44' : (hpRatio > 0.25 ? '#ccaa44' : '#cc4444');
                    ctx.fillStyle = hpColor;
                    ctx.fillRect(barX + 1, barY + 1, (barW - 2) * hpRatio, barH - 2);
                }

                for (const e of state.explosions) {
                    const alpha = e.life / e.maxLife;
                    const r = e.r * (1 + (1 - alpha) * 0.5);
                    ctx.globalAlpha = alpha;
                    ctx.beginPath();
                    ctx.arc(e.x, e.y, r, 0, Math.PI * 2);
                    ctx.fillStyle = e.color || '#ff8844';
                    ctx.shadowColor = e.color || '#ff8844';
                    ctx.shadowBlur = 20;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    if (alpha > 0.3) {
                        ctx.beginPath();
                        ctx.arc(e.x, e.y, r * 0.3, 0, Math.PI * 2);
                        ctx.fillStyle = 'rgba(255,255,200,0.6)';
                        ctx.fill();
                    }
                    ctx.globalAlpha = 1;
                }

                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(200,200,200,0.3)';
                ctx.font = '10px monospace';
                ctx.textAlign = 'right';
                ctx.textBaseline = 'bottom';
                ctx.fillText('врагов: ' + state.enemies.filter(e => e.alive).length + '/' + state.maxEnemies, W - 8, H - 4);

                if (p.alive) {
                    ctx.fillStyle = 'rgba(200,200,200,0.4)';
                    ctx.font = '10px monospace';
                    ctx.textAlign = 'left';
                    ctx.textBaseline = 'top';
                    const deg = (p.barrelAngle * 180 / Math.PI).toFixed(0);
                    ctx.fillText('🔫 ' + deg + '°', 8, 8);
                }

                if (state.paused) {
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = '#b0f0b0';
                    ctx.font = '24px monospace';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('⏸ ПАУЗА', W / 2, H / 2 - 10);
                    ctx.fillStyle = '#8fca8f';
                    ctx.font = '14px monospace';
                    ctx.fillText('нажмите кнопку на экране', W / 2, H / 2 + 30);
                }
            }

            // ─── ИГРОВОЙ ЦИКЛ ──────────────────────────────────────────
            function gameLoop() {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }

            // ─── КЛАВИАТУРА ─────────────────────────────────────────────
            const keys = {
                left: false,
                right: false,
                up: false,
                down: false,
                fire: false,
                barrelUp: false,
                barrelDown: false
            };

            document.addEventListener('keydown', (e) => {
                switch (e.key) {
                    case 'ArrowLeft':
                    case 'a':
                    case 'A':
                        keys.left = true;
                        e.preventDefault();
                        break;
                    case 'ArrowRight':
                    case 'd':
                    case 'D':
                        keys.right = true;
                        e.preventDefault();
                        break;
                    case 'ArrowUp':
                    case 'w':
                    case 'W':
                        keys.up = true;
                        e.preventDefault();
                        break;
                    case 'ArrowDown':
                    case 's':
                    case 'S':
                        keys.down = true;
                        e.preventDefault();
                        break;
                    case ' ':
                    case 'Space':
                        keys.fire = true;
                        e.preventDefault();
                        break;
                    case 'q':
                    case 'Q':
                        keys.barrelUp = true;
                        e.preventDefault();
                        break;
                    case 'e':
                    case 'E':
                        keys.barrelDown = true;
                        e.preventDefault();
                        break;
                    case 'p':
                    case 'P':
                        togglePause();
                        e.preventDefault();
                        break;
                    case 'Enter':
                        if (state.gameOver) { fullRestart();
                            e.preventDefault(); }
                        break;
                }
            });

            document.addEventListener('keyup', (e) => {
                switch (e.key) {
                    case 'ArrowLeft':
                    case 'a':
                    case 'A':
                        keys.left = false;
                        e.preventDefault();
                        break;
                    case 'ArrowRight':
                    case 'd':
                    case 'D':
                        keys.right = false;
                        e.preventDefault();
                        break;
                    case 'ArrowUp':
                    case 'w':
                    case 'W':
                        keys.up = false;
                        e.preventDefault();
                        break;
                    case 'ArrowDown':
                    case 's':
                    case 'S':
                        keys.down = false;
                        e.preventDefault();
                        break;
                    case ' ':
                    case 'Space':
                        keys.fire = false;
                        e.preventDefault();
                        break;
                    case 'q':
                    case 'Q':
                        keys.barrelUp = false;
                        e.preventDefault();
                        break;
                    case 'e':
                    case 'E':
                        keys.barrelDown = false;
                        e.preventDefault();
                        break;
                }
            });

            // ─── КНОПКИ УПРАВЛЕНИЯ ──────────────────────────────────────
            function setupButton(id, key, isToggle) {
                const btn = document.getElementById(id);
                if (!btn) return;
                const start = (e) => {
                    e.preventDefault();
                    if (isToggle) { keys[key] = !keys[key]; } else { keys[key] = true; }
                    if (key === 'fire' && !isToggle) playerShoot();
                };
                const end = (e) => {
                    e.preventDefault();
                    if (!isToggle) keys[key] = false;
                };
                btn.addEventListener('mousedown', start);
                btn.addEventListener('mouseup', end);
                btn.addEventListener('mouseleave', end);
                btn.addEventListener('touchstart', start, { passive: false });
                btn.addEventListener('touchend', end, { passive: false });
                btn.addEventListener('touchcancel', end, { passive: false });
            }

            setupButton('btnUp', 'up');
            setupButton('btnDown', 'down');
            setupButton('btnLeft', 'left');
            setupButton('btnRight', 'right');
            setupButton('btnBarrelUp', 'barrelUp');
            setupButton('btnBarrelDown', 'barrelDown');

            const fireBtn = document.getElementById('btnFire');
            fireBtn.addEventListener('mousedown', (e) => {
                e.preventDefault();
                keys.fire = true;
                playerShoot();
            });
            fireBtn.addEventListener('mouseup', (e) => {
                e.preventDefault();
                keys.fire = false;
            });
            fireBtn.addEventListener('mouseleave', (e) => { keys.fire = false; });
            fireBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                keys.fire = true;
                playerShoot();
            }, { passive: false });
            fireBtn.addEventListener('touchend', (e) => {
                e.preventDefault();
                keys.fire = false;
            }, { passive: false });
            fireBtn.addEventListener('touchcancel', (e) => { keys.fire = false; }, { passive: false });

            // ─── ПАУЗА (кнопки) ────────────────────────────────────────
            document.getElementById('btnPause').addEventListener('click', togglePause);
            document.getElementById('resumeBtn').addEventListener('click', resumeGame);

            // ─── РЕСТАРТ (кнопка) ──────────────────────────────────────
            document.getElementById('btnRestart').addEventListener('click', function() {
                if (state.gameOver) {
                    fullRestart();
                } else {
                    if (confirm('Начать новый бой? Текущий прогресс будет потерян.')) {
                        fullRestart();
                    }
                }
            });

            // ─── МАГАЗИН ──────────────────────────────────────────────
            function renderShop() {
                const list = document.getElementById('shopList');
                list.innerHTML = '';
                const money = state.money;
                document.getElementById('shopMoney').textContent = '💰 ' + money;

                for (const [id, def] of Object.entries(TANK_DEFS)) {
                    const owned = state.ownedTanks.includes(id);
                    const current = state.currentTankId === id;

                    const div = document.createElement('div');
                    div.className = 'shop-item';
                    if (owned) div.classList.add('owned');
                    if (current) div.classList.add('current');

                    const nameSpan = document.createElement('span');
                    nameSpan.className = 's-name';
                    nameSpan.textContent = def.name;

                    const statsSpan = document.createElement('span');
                    statsSpan.className = 's-stats';
                    statsSpan.innerHTML = `
                        <span>⚡${def.speed.toFixed(1)}</span>
                        <span>💥${def.damage}</span>
                        <span>❤️${def.health}</span>
                        <span>🎯${Math.round(60/def.fireRate)}/с</span>
                    `;

                    const priceSpan = document.createElement('span');
                    priceSpan.className = 's-price';
                    if (def.cost === 0) priceSpan.textContent = '★ СТАРТ';
                    else priceSpan.textContent = '💰 ' + def.cost;

                    const actionBtn = document.createElement('button');
                    actionBtn.className = 's-action';

                    if (current) {
                        actionBtn.textContent = '✅ ВЫБРАН';
                        actionBtn.disabled = true;
                        actionBtn.classList.add('equipped');
                    } else if (owned) {
                        actionBtn.textContent = '🔁 ВЫБРАТЬ';
                        actionBtn.classList.add('select');
                        actionBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            state.currentTankId = id;
                            const def2 = getTankDef(id);
                            state.player.health = def2.health;
                            state.player.maxHealth = def2.health;
                            state.player.invincible = 30;
                            resetGame();
                            renderShop();
                            updateHUD();
                        });
                    } else {
                        actionBtn.textContent = '💰 КУПИТЬ';
                        actionBtn.classList.add('buy');
                        if (money < def.cost) actionBtn.disabled = true;
                        actionBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            if (state.money >= def.cost) {
                                state.money -= def.cost;
                                state.ownedTanks.push(id);
                                state.currentTankId = id;
                                const def2 = getTankDef(id);
                                state.player.health = def2.health;
                                state.player.maxHealth = def2.health;
                                state.player.invincible = 30;
                                resetGame();
                                renderShop();
                                updateHUD();
                            }
                        });
                    }

                    div.appendChild(nameSpan);
                    div.appendChild(statsSpan);
                    div.appendChild(priceSpan);
                    div.appendChild(actionBtn);

                    div.addEventListener('click', () => {
                        if (owned && !current) {
                            state.currentTankId = id;
                            const def2 = getTankDef(id);
                            state.player.health = def2.health;
                            state.player.maxHealth = def2.health;
                            state.player.invincible = 30;
                            resetGame();
                            renderShop();
                            updateHUD();
                        } else if (!owned && state.money >= def.cost) {
                            state.money -= def.cost;
                            state.ownedTanks.push(id);
                            state.currentTankId = id;
                            const def2 = getTankDef(id);
                            state.player.health = def2.health;
                            state.player.maxHealth = def2.health;
                            state.player.invincible = 30;
                            resetGame();
                            renderShop();
                            updateHUD();
                        }
                    });

                    list.appendChild(div);
                }
            }

            document.getElementById('btnShop').addEventListener('click', () => {
                if (state.gameOver) return;
                state.shopOpen = !state.shopOpen;
                shopOverlay.classList.toggle('active', state.shopOpen);
                if (state.shopOpen) renderShop();
            });

            document.getElementById('shopClose').addEventListener('click', () => {
                state.shopOpen = false;
                shopOverlay.classList.remove('active');
            });

            shopOverlay.addEventListener('click', (e) => {
                if (e.target === shopOverlay) {
                    state.shopOpen = false;
                    shopOverlay.classList.remove('active');
                }
            });

            // ─── РЕСТАРТ (оверлей) ──────────────────────────────────────
            document.getElementById('restartBtn').addEventListener('click', fullRestart);

            // ─── ИНИЦИАЛИЗАЦИЯ ────────────────────────────────────────
            function init() {
                const def = getTankDef('t26');
                state.player.health = def.health;
                state.player.maxHealth = def.health;
                state.player.speed = def.speed;
                state.player.fireRate = def.fireRate;
                state.player.damage = def.damage;
                state.player.bulletSpeed = def.bulletSpeed;
                state.currentTankId = 't26';
                state.ownedTanks = ['t26'];
                state.money = 0;
                state.score = 0;
                state.level = 1;
                state.gameOver = false;
                state.paused = false;
                state.player.alive = true;
                state.player.invincible = 60;
                state.enemies = [];
                state.bullets = [];
                state.enemyBullets = [];
                state.coins = [];
                state.explosions = [];
                state.timeSeconds = 0;
                state.spawnInterval = 120;
                state.maxEnemies = 2;
                generateMap();
                updateHUD();
                renderShop();
                gameLoop();
            }

            init();

        })();
    </script>
</body>
