<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Танки СССР — Fullscreen</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎖️</text></svg>" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a12;
            font-family: 'Courier New', monospace;
            touch-action: none;
        }
        #gameContainer {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #1a1a2e;
            position: relative;
            overflow: hidden;
        }
        #hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 8px;
            background: rgba(0, 0, 0, 0.6);
            border-bottom: 2px solid #3a5a3a;
            font-size: 11px;
            color: #8fca8f;
            text-shadow: 0 0 8px rgba(80, 200, 80, 0.3);
            flex-wrap: wrap;
            gap: 2px 6px;
            z-index: 10;
            flex-shrink: 0;
            min-height: 32px;
        }
        .hud-item {
            display: flex;
            align-items: center;
            gap: 3px;
            background: rgba(0, 0, 0, 0.3);
            padding: 1px 7px 1px 5px;
            border-radius: 12px;
            border: 1px solid #2a4a2a;
        }
        .hud-item .icon {
            font-size: 12px;
            opacity: 0.8;
        }
        .hud-item .value {
            font-weight: bold;
            font-size: 12px;
            color: #b0f0b0;
            min-width: 18px;
        }
        .hud-item .label {
            color: #6a9a6a;
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .hud-tank {
            background: rgba(0, 0, 0, 0.3);
            padding: 1px 8px 1px 5px;
            border-radius: 12px;
            border: 1px solid #3a5a3a;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            color: #8fca8f;
        }
        .hud-tank .tname {
            color: #c0f0c0;
            font-weight: bold;
        }
        #canvasWrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #0a0a12;
            min-height: 0;
        }
        #gameCanvas {
            display: block;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            image-rendering: pixelated;
            touch-action: none;
            cursor: none;
            background: #1a2a1a;
        }
        #controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 8px 12px 8px;
            background: rgba(0, 0, 0, 0.6);
            border-top: 2px solid #3a5a3a;
            gap: 6px;
            flex-shrink: 0;
            flex-wrap: nowrap;
            z-index: 10;
            touch-action: none;
        }
        .ctrl-group {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-shrink: 0;
        }
        .ctrl-btn {
            background: #3a3a52;
            border: none;
            border-radius: 12px;
            padding: 0;
            font-size: 20px;
            color: #b0b0d0;
            box-shadow: 0 4px 0 #1a1a2a, inset 0 1px 0 rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.06s ease;
            touch-action: manipulation;
            width: 54px;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            line-height: 1;
            outline: none;
            -webkit-touch-callout: none;
            flex-shrink: 0;
        }
        .ctrl-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #1a1a2a;
        }
        .ctrl-btn.fire {
            background: #6a2a2a;
            color: #ff8888;
            box-shadow: 0 4px 0 #3a1212, inset 0 1px 0 rgba(255, 100, 100, 0.2);
            width: 64px;
        }
        .ctrl-btn.fire:active {
            background: #8a3a3a;
        }
        .ctrl-btn.shop-btn {
            background: #2a4a3a;
            color: #8fca8f;
            box-shadow: 0 4px 0 #142a1a, inset 0 1px 0 rgba(100, 255, 100, 0.1);
            font-size: 18px;
        }
        .ctrl-btn.shop-btn:active {
            background: #3a5a4a;
        }
        .ctrl-btn.pause-btn {
            background: #4a3a2a;
            color: #f0d080;
            box-shadow: 0 4px 0 #2a1a0a;
            font-size: 18px;
        }
        .ctrl-btn.pause-btn:active {
            background: #5a4a3a;
        }
        .ctrl-btn.barrel {
            background: #3a3a4a;
            color: #a0b0d0;
            box-shadow: 0 4px 0 #1a1a2a;
            font-size: 18px;
            width: 48px;
        }
        .ctrl-btn.barrel:active {
            background: #4a4a5a;
        }
        .ctrl-btn.restart-btn {
            background: #4a2a2a;
            color: #ff8888;
            box-shadow: 0 4px 0 #2a1212;
            font-size: 18px;
        }
        .ctrl-btn.restart-btn:active {
            background: #5a3a3a;
        }
        .ctrl-btn.fullscreen-btn {
            background: #2a3a4a;
            color: #8fcaf0;
            box-shadow: 0 4px 0 #1a2a3a;
            font-size: 22px;
        }
        .ctrl-btn.fullscreen-btn:active {
            background: #3a4a5a;
        }
        .ctrl-btn:disabled {
            opacity: 0.4;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #1a1a2a;
            pointer-events: none;
        }
        /* D-Pad */
        .dpad {
            display: grid;
            grid-template-columns: 54px 54px 54px;
            grid-template-rows: 54px 54px 54px;
            gap: 4px;
            justify-items: center;
            align-items: center;
            flex-shrink: 0;
        }
        .dpad .ctrl-btn {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            font-size: 24px;
            box-shadow: 0 4px 0 #1a1a2a, inset 0 1px 0 rgba(255, 255, 255, 0.1);
            background: #3a3a52;
            color: #b0b0d0;
        }
        .dpad .ctrl-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #1a1a2a;
        }
        #btnUp { grid-column: 2; grid-row: 1; }
        #btnLeft { grid-column: 1; grid-row: 2; }
        #btnDown { grid-column: 2; grid-row: 3; }
        #btnRight { grid-column: 3; grid-row: 2; }
        .dpad-center {
            grid-column: 2;
            grid-row: 2;
            width: 100%;
            height: 100%;
            background: transparent;
            pointer-events: none;
        }
        /* Оверлеи */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            padding: 20px;
        }
        .overlay.active {
            display: flex;
        }
        .overlay-box {
            background: #1a1a2a;
            border-radius: 20px;
            padding: 24px 30px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            border: 2px solid #3a6a3a;
            box-shadow: 0 0 60px rgba(0, 40, 0, 0.4);
            color: #b0f0b0;
        }
        .overlay-box h1 {
            font-size: 28px;
            letter-spacing: 4px;
            margin-bottom: 6px;
            color: #ff6666;
        }
        .overlay-box .sub {
            color: #8a8aaa;
            font-size: 14px;
            margin-bottom: 12px;
        }
        .overlay-box .final-score {
            color: #f0c040;
            font-size: 20px;
            margin-bottom: 16px;
        }
        .overlay-box .time {
            font-size: 16px;
            color: #8fca8f;
            margin-bottom: 12px;
        }
        .overlay-btn {
            background: #2a4a3a;
            border: none;
            border-radius: 12px;
            padding: 10px 28px;
            color: #8fca8f;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 0 #142a1a;
            transition: all 0.08s;
            touch-action: manipulation;
            letter-spacing: 1px;
            margin-top: 8px;
            width: 100%;
            max-width: 200px;
        }
        .overlay-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #142a1a;
        }
        .shop-panel {
            background: #1e2a1e;
            border-radius: 20px;
            padding: 16px 18px 20px 18px;
            max-width: 480px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            border: 2px solid #3a6a3a;
            box-shadow: 0 0 60px rgba(0, 40, 0, 0.6);
        }
        .shop-panel::-webkit-scrollbar {
            width: 6px;
        }
        .shop-panel::-webkit-scrollbar-track {
            background: #0a1a0a;
            border-radius: 4px;
        }
        .shop-panel::-webkit-scrollbar-thumb {
            background: #3a6a3a;
            border-radius: 4px;
        }
        .shop-title {
            font-size: 18px;
            color: #8fca8f;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: 2px;
            border-bottom: 2px solid #2a4a2a;
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .shop-title span {
            font-size: 13px;
            color: #f0c040;
        }
        .shop-list {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            padding: 5px 10px;
            border-radius: 8px;
            border: 1px solid #2a4a2a;
            gap: 4px;
            flex-wrap: wrap;
            cursor: default;
        }
        .shop-item.owned {
            border-color: #4a7a4a;
            background: rgba(30, 60, 30, 0.3);
        }
        .shop-item.current {
            border-color: #f0c040;
            background: rgba(60, 50, 20, 0.3);
            box-shadow: 0 0 20px rgba(240, 192, 64, 0.1);
        }
        .shop-item .s-name {
            color: #b0e0b0;
            font-weight: bold;
            font-size: 12px;
            min-width: 50px;
        }
        .shop-item .s-stats {
            color: #6a9a6a;
            font-size: 8px;
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        .shop-item .s-stats span {
            background: rgba(0, 0, 0, 0.3);
            padding: 1px 4px;
            border-radius: 4px;
        }
        .shop-item .s-price {
            color: #f0c040;
            font-weight: bold;
            font-size: 12px;
            min-width: 40px;
            text-align: right;
        }
        .shop-item .s-action {
            background: #2a4a3a;
            border: none;
            border-radius: 6px;
            padding: 2px 12px;
            color: #8fca8f;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 3px 0 #142a1a;
            touch-action: manipulation;
        }
        .shop-item .s-action:active {
            transform: translateY(3px);
            box-shadow: 0 0px 0 #142a1a;
        }
        .shop-item .s-action:disabled {
            opacity: 0.4;
            transform: translateY(2px);
            box-shadow: 0 1px 0 #142a1a;
            pointer-events: none;
        }
        .shop-item .s-action.buy {
            background: #3a5a2a;
            color: #b0f0a0;
        }
        .shop-item .s-action.select {
            background: #4a4a2a;
            color: #f0e080;
        }
        .shop-item .s-action.equipped {
            background: #2a3a2a;
            color: #6a9a6a;
            box-shadow: 0 2px 0 #1a2a1a;
            cursor: default;
        }
        .shop-close {
            margin-top: 10px;
            background: #4a2a2a;
            border: none;
            border-radius: 12px;
            padding: 8px 0;
            width: 100%;
            color: #ff8888;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 0 #2a1212;
            transition: all 0.08s;
            touch-action: manipulation;
            letter-spacing: 2px;
        }
        .shop-close:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #2a1212;
        }

        /* Адаптация под маленькие экраны */
        @media (max-width: 500px) {
            .ctrl-btn {
                width: 48px;
                height: 48px;
                font-size: 17px;
                border-radius: 10px;
            }
            .ctrl-btn.fire {
                width: 56px;
            }
            .ctrl-btn.barrel {
                width: 44px;
                font-size: 15px;
            }
            .ctrl-btn.fullscreen-btn {
                font-size: 20px;
            }
            .dpad {
                grid-template-columns: 48px 48px 48px;
                grid-template-rows: 48px 48px 48px;
                gap: 3px;
            }
            .dpad .ctrl-btn {
                font-size: 20px;
            }
            #hud {
                font-size: 10px;
                padding: 2px 6px;
                min-height: 28px;
            }
            .hud-item .value {
                font-size: 10px;
                min-width: 14px;
            }
            .hud-item .label {
                font-size: 7px;
            }
            .hud-tank {
                font-size: 9px;
                padding: 1px 5px;
            }
            #controls {
                padding: 4px 4px 10px 4px;
                gap: 4px;
            }
        }
        @media (max-width: 400px) {
            .ctrl-btn {
                width: 42px;
                height: 42px;
                font-size: 15px;
            }
            .ctrl-btn.fire {
                width: 48px;
            }
            .ctrl-btn.barrel {
                width: 38px;
                font-size: 13px;
            }
            .ctrl-btn.fullscreen-btn {
                font-size: 17px;
            }
            .dpad {
                grid-template-columns: 42px 42px 42px;
                grid-template-rows: 42px 42px 42px;
                gap: 2px;
            }
            .dpad .ctrl-btn {
                font-size: 17px;
            }
            #hud {
                font-size: 8px;
                padding: 2px 4px;
                min-height: 24px;
            }
            .hud-item {
                padding: 0px 4px;
            }
            .hud-item .value {
                font-size: 8px;
                min-width: 10px;
            }
            .hud-tank {
                font-size: 7px;
            }
            #controls {
                padding: 2px 2px 8px 2px;
                gap: 2px;
            }
        }
        @media (orientation: landscape) and (max-height: 450px) {
            #hud {
                font-size: 8px;
                min-height: 22px;
                padding: 1px 4px;
            }
            #controls {
                padding: 2px 4px 6px 4px;
            }
            .ctrl-btn {
                width: 40px;
                height: 40px;
                font-size: 13px;
            }
            .ctrl-btn.fire {
                width: 46px;
            }
            .ctrl-btn.barrel {
                width: 36px;
                font-size: 12px;
            }
            .ctrl-btn.fullscreen-btn {
                font-size: 16px;
            }
            .dpad {
                grid-template-columns: 40px 40px 40px;
                grid-template-rows: 40px 40px 40px;
                gap: 2px;
            }
            .dpad .ctrl-btn {
                font-size: 16px;
            }
        }
        @media (max-width: 340px) {
            .ctrl-btn {
                width: 36px;
                height: 36px;
                font-size: 12px;
            }
            .ctrl-btn.fire {
                width: 40px;
            }
            .ctrl-btn.barrel {
                width: 32px;
                font-size: 11px;
            }
            .ctrl-btn.fullscreen-btn {
                font-size: 14px;
            }
            .dpad {
                grid-template-columns: 36px 36px 36px;
                grid-template-rows: 36px 36px 36px;
                gap: 2px;
            }
            .dpad .ctrl-btn {
                font-size: 14px;
            }
            #controls {
                padding: 2px 2px 6px 2px;
                gap: 2px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <!-- HUD -->
        <div id="hud">
            <div class="hud-item">
                <span class="icon">⭐</span>
                <span class="label">Счёт</span>
                <span class="value" id="scoreDisplay">0</span>
            </div>
            <div class="hud-item">
                <span class="icon">💰</span>
                <span class="label">Деньги</span>
                <span class="value" id="moneyDisplay">0</span>
            </div>
            <div class="hud-tank">
                <span>🚀</span>
                <span class="tname" id="tankNameDisplay">Т-26</span>
                <span style="color:#6a9a6a;font-size:9px;" id="tankHealthDisplay">❤️ 3/3</span>
            </div>
            <div class="hud-item">
                <span class="icon">🎯</span>
                <span class="label">Ур.</span>
                <span class="value" id="levelDisplay">1</span>
            </div>
            <div class="hud-item">
                <span class="icon">⏱️</span>
                <span class="label">Время</span>
                <span class="value" id="timeDisplay">00:00</span>
            </div>
            <div class="hud-item" id="bossHud" style="display:none; border-color:#cc4444;">
                <span class="icon">👹</span>
                <span class="label">БОСС</span>
                <span class="value" id="bossHpDisplay">1000</span>
            </div>
        </div>

        <!-- Canvas -->
        <div id="canvasWrapper">
            <canvas id="gameCanvas"></canvas>
        </div>

        <!-- Управление -->
        <div id="controls">
            <!-- D-Pad слева -->
            <div class="ctrl-group">
                <div class="dpad">
                    <button class="ctrl-btn" id="btnUp">▲</button>
                    <button class="ctrl-btn" id="btnLeft">◀</button>
                    <button class="ctrl-btn" id="btnDown">▼</button>
                    <button class="ctrl-btn" id="btnRight">▶</button>
                    <div class="dpad-center"></div>
                </div>
            </div>

            <!-- Центр: пауза, магазин, рестарт, полноэкран -->
            <div class="ctrl-group">
                <button class="ctrl-btn pause-btn" id="btnPause">⏸️</button>
                <button class="ctrl-btn shop-btn" id="btnShop">🏪</button>
                <button class="ctrl-btn restart-btn" id="btnRestart">🔄</button>
                <button class="ctrl-btn fullscreen-btn" id="btnFullscreen">⛶</button>
            </div>

            <!-- Справа: наклон пушки и огонь -->
            <div class="ctrl-group">
                <button class="ctrl-btn barrel" id="btnBarrelUp">↗</button>
                <button class="ctrl-btn barrel" id="btnBarrelDown">↘</button>
                <button class="ctrl-btn fire" id="btnFire">🔥</button>
            </div>
        </div>

        <!-- Оверлеи -->
        <div class="overlay" id="shopOverlay">
            <div class="shop-panel">
                <div class="shop-title">
                    <span>🏪 МАГАЗИН ТАНКОВ</span>
                    <span id="shopMoney">💰 0</span>
                </div>
                <div class="shop-list" id="shopList"></div>
                <button class="shop-close" id="shopClose">✕ ЗАКРЫТЬ</button>
            </div>
        </div>

        <div class="overlay" id="pauseOverlay">
            <div class="overlay-box">
                <h1 style="color:#b0f0b0;font-size:28px;">⏸ ПАУЗА</h1>
                <div class="time" id="pauseTime">00:00</div>
                <button class="overlay-btn" id="resumeBtn">▶ ПРОДОЛЖИТЬ</button>
            </div>
        </div>

        <div class="overlay" id="gameoverOverlay">
            <div class="overlay-box">
                <h1>☠️ ПОДБИТ</h1>
                <div class="sub">Ваш танк уничтожен</div>
                <div class="final-score">⭐ Счёт: <span id="finalScore">0</span></div>
                <button class="overlay-btn" id="restartBtn">🔄 НОВЫЙ БОЙ</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ─── FULLSCREEN TOGGLE ─────────────────────────────────────
            const fullscreenBtn = document.getElementById('btnFullscreen');
            const container = document.getElementById('gameContainer');

            function toggleFullscreen() {
                if (!document.fullscreenElement) {
                    if (container.requestFullscreen) {
                        container.requestFullscreen().catch(err => {});
                    } else if (container.webkitRequestFullscreen) {
                        container.webkitRequestFullscreen();
                    } else if (container.msRequestFullscreen) {
                        container.msRequestFullscreen();
                    }
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    } else if (document.webkitExitFullscreen) {
                        document.webkitExitFullscreen();
                    } else if (document.msExitFullscreen) {
                        document.msExitFullscreen();
                    }
                }
            }

            fullscreenBtn.addEventListener('click', toggleFullscreen);

            document.addEventListener('fullscreenchange', updateFullscreenIcon);
            document.addEventListener('webkitfullscreenchange', updateFullscreenIcon);
            document.addEventListener('mozfullscreenchange', updateFullscreenIcon);
            document.addEventListener('MSFullscreenChange', updateFullscreenIcon);

            function updateFullscreenIcon() {
                fullscreenBtn.textContent = '⛶';
            }

            // ─── ICON: РИСУЕМ ТАНК ДЛЯ FAVICON ──────────────────────
            function setTankFavicon() {
                const size = 64;
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, size, size);
                const s = size / 64;
                ctx.fillStyle = '#4a7a3a';
                ctx.fillRect(10 * s, 30 * s, 44 * s, 18 * s);
                ctx.fillStyle = '#5a8a4a';
                ctx.fillRect(22 * s, 20 * s, 20 * s, 14 * s);
                ctx.fillStyle = '#2a2a2a';
                ctx.fillRect(38 * s, 24 * s, 20 * s, 4 * s);
                ctx.fillRect(54 * s, 22 * s, 6 * s, 8 * s);
                ctx.fillStyle = '#2a3a2a';
                ctx.fillRect(8 * s, 44 * s, 48 * s, 10 * s);
                ctx.fillStyle = '#1a2a1a';
                for (let i = 0; i < 4; i++) {
                    const cx = 14 * s + i * 12 * s;
                    ctx.beginPath();
                    ctx.arc(cx, 49 * s, 5 * s, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.fillStyle = '#cc2222';
                ctx.font = `${16 * s}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('★', 32 * s, 27 * s);
                const link = document.querySelector("link[rel*='icon']") || document.createElement('link');
                link.type = 'image/x-icon';
                link.rel = 'shortcut icon';
                link.href = canvas.toDataURL('image/png');
                document.head.appendChild(link);
            }

            // ─── CANVAS ───────────────────────────────────────────────────
            const canvas = document.getElementById('gameCanvas');

            // Фиксированные логические размеры игры

            const GAME_H = 340;

            function resizeCanvas() {
                const rect = wrapper.getBoundingClientRect();
                const w = rect.width;
                const h = rect.height;
                // Сохраняем пропорции
                const ratio = GAME_W / GAME_H;
                let displayW = w;
                let displayH = w / ratio;
                if (displayH > h) {
                    displayH = h;
                    displayW = h * ratio;
                }
                // Устанавливаем размеры canvas
                canvas.width = GAME_W;
                canvas.height = GAME_H;
                canvas.style.width = displayW + 'px';
                canvas.style.height = displayH + 'px';
                // Центрируем с помощью absolute и transform
                canvas.style.position = 'absolute';
                canvas.style.left = '50%';
                canvas.style.top = '50%';
                canvas.style.transform = 'translate(-50%, -50%)';
                // Масштаб для возможного использования
                scale = displayW / GAME_W;
            }

            window.addEventListener('resize', resizeCanvas);

            // ─── ГЕНЕРАЦИЯ КАРТЫ ──────────────────────────────────────
            function generateMap() {
                state.buildings = [];
                for (let i = 0; i < 12; i++) {
                    let x = 50 + i * 55 + Math.random() * 30;
                    let y = 10 + Math.random() * 80;
                    let w = 25 + Math.random() * 40;
                    let h = 30 + Math.random() * 50;
                    if (x + w > GAME_W) break;
                    state.buildings.push({
                        x: x,
                        y: y,
                        w: w,
                        h: h,
                        destroyed: Math.random() > 0.4,
                        color: `hsl(${30 + Math.random()*20}, 20%, ${30 + Math.random()*20}%)`,
                        windows: Math.floor(Math.random() * 3) + 1
                    });
                }
                state.roadPoints = [];
                for (let i = 0; i <= 20; i++) {
                    let x = i * (GAME_W / 20);
                    let y = GAME_H - 20 + Math.sin(i * 0.5) * 4 + Math.sin(i * 1.3 + 1) * 3;

            // ─── ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ──────────────────────────────
            function rand(min, max) { return Math.random() * (max - min) + min; }

            function randInt(min, max) { return Math.floor(rand(min, max + 1)); }

            function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

            function getTankDef(id) { return TANK_DEFS[id] || TANK_DEFS['t26']; }

            function getPlayerTankDef() { return getTankDef(state.currentTankId); }

                    pauseTime.textContent = timeDisplay.textContent;
                }
                if (state.boss && state.boss.alive) {
                    bossHud.style.display = 'flex';
                    bossHpDisplay.textContent = Math.ceil(state.boss.health);
                } else {
                    bossHud.style.display = 'none';
                }

            // ─── СПАВН ВРАГА ──────────────────────────────────────────
            function spawnEnemy() {
                if (state.enemies.length >= state.maxEnemies) return;
                if (state.gameOver || state.paused) return;

                let enemyType;
                const r = Math.random();
                if (state.level < 5) {
                    enemyType = r < 0.85 ? 'light' : (r < 0.95 ? 'medium' : 'heavy');
                } else {
                    enemyType = r < 0.6 ? 'light' : (r < 0.85 ? 'medium' : 'heavy');
                }

                let health, speed, color, turretColor, trackColor, damage, bulletSpeed, fireRate, w, h, reward;
                const enemyDamage = 1;

                if (enemyType === 'light') {
                    health = 1;
                    speed = 0.5 + state.level * 0.025;
                    color = '#5a6a4a';
                    turretColor = '#6a7a5a';
                    trackColor = '#3a4a2a';
                    damage = enemyDamage;
                    bulletSpeed = 1.7 + state.level * 0.04;
                    fireRate = 75 - Math.min(state.level, 20);
                    w = 26;
                    h = 15;
                    reward = 5;
                } else if (enemyType === 'medium') {
                    health = 2;
                    speed = 0.4 + state.level * 0.02;
                    color = '#6a5a3a';
                    turretColor = '#7a6a4a';
                    trackColor = '#4a3a2a';
                    damage = enemyDamage;
                    bulletSpeed = 2.0 + state.level * 0.04;
                    fireRate = 65 - Math.min(state.level, 15);
                    w = 32;
                    h = 18;
                    reward = 5;

                    turretColor = '#5a5a4a';
                    trackColor = '#2a2a1a';
                    damage = enemyDamage;
                    bulletSpeed = 1.8 + state.level * 0.03;
                    fireRate = 55 - Math.min(state.level, 10);
                    w = 38;
                    h = 22;
                    reward = 5;

                    health: Math.max(1, health),

                    trackColor: trackColor,
                    damage: damage,
                    bulletSpeed: Math.max(1.4, bulletSpeed),

            // ─── ВЫСТРЕЛ ИГРОКА ──────────────────────────────────────
            function playerShoot() {
                if (state.gameOver || state.paused) return;
                const p = state.player;
                if (!p.alive) return;
                if (p.fireCooldown > 0) return;

                const def = getPlayerTankDef();
                p.fireCooldown = def.fireRate;

                const angle = p.barrelAngle;
                const startX = p.x + p.w - 2;
                const startY = p.y + p.h / 2 - 2;

                state.bullets.push({
                    x: startX,
                    y: startY,
                    w: 8,
                    h: 4,
                    vx: Math.cos(angle) * def.bulletSpeed,
                    vy: Math.sin(angle) * def.bulletSpeed,
                    damage: def.damage,
                    friendly: true,
                    trail: []
                });

                state.explosions.push({
                    x: startX - 4,
                    y: startY - 4,
                    r: 6,
                    life: 8,
                    maxLife: 8,
                    color: '#ffdd44'
                });
            }

            // ─── ВЫСТРЕЛ ВРАГА ──────────────────────────────────────
            function enemyShoot(enemy) {
                if (enemy.fireCooldown > 0) return;
                if (!enemy.alive) return;
                const p = state.player;
                if (!p.alive) return;

                enemy.fireCooldown = enemy.fireRate;

                const angle = Math.PI + rand(-0.2, 0.2);
                const speed = enemy.bulletSpeed * 0.6;
                const bx = enemy.x - 4;
                const by = enemy.y + enemy.h / 2 - 2;

                state.enemyBullets.push({
                    x: bx,
                    y: by,
                    w: 6,
                    h: 3,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    damage: enemy.damage,
                    trail: []
                });
            }

            // ─── ВЫСТРЕЛ БОССА ──────────────────────────────────────
            function bossShoot() {
                const boss = state.boss;
                if (!boss || !boss.alive) return;
                if (boss.fireCooldown > 0) return;
                const p = state.player;
                if (!p.alive) return;

                boss.fireCooldown = boss.fireRate;

                const angle = Math.PI + rand(-0.15, 0.15);
                const speed = boss.bulletSpeed * 0.5;
                const bx = boss.x - 4;
                const by = boss.y + boss.h / 2 - 2;

                state.enemyBullets.push({
                    x: bx,
                    y: by,
                    w: 8,
                    h: 5,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    damage: boss.damage,
                    trail: [],
                    isBoss: true
                });

                state.explosions.push({
                    x: bx - 2,
                    y: by - 2,
                    r: 5,
                    life: 6,
                    maxLife: 6,
                    color: '#ff8844'
                });
            }

            // ─── ВЗРЫВ ────────────────────────────────────────────────
            function createExplosion(x, y, size, color) {
                const count = 8 + randInt(0, 5);
                for (let i = 0; i < count; i++) {
                    const angle = rand(0, Math.PI * 2);
                    const speed = rand(0.3, 2.0 + size * 0.3);
                    const life = randInt(8, 18);
                    state.explosions.push({
                        x: x + rand(-4, 4),
                        y: y + rand(-4, 4),
                        r: rand(2, 5 + size * 1.5),
                        life: life,
                        maxLife: life,
                        color: color || ['#ff6644', '#ffaa44', '#ffdd66', '#ff8844', '#ff5533'][randInt(0, 4)],
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 0.4,
                        gravity: 0.06
                    });
                }
            }

            // ─── УНИЧТОЖЕНИЕ ВРАГА ──────────────────────────────────
            function destroyEnemy(enemy) {
                if (!enemy.alive) return;
                enemy.alive = false;

                state.score += 10 + state.level * 2;
                state.money += 5;

                if (state.player.health < state.player.maxHealth) {
                    state.player.health += 1;
                    if (state.player.health > state.player.maxHealth) state.player.health = state.player.maxHealth;
                }

                createExplosion(enemy.x + enemy.w / 2, enemy.y + enemy.h / 2, 0.8, '#ffdd44');
                createExplosion(enemy.x + enemy.w / 2, enemy.y + enemy.h / 2, 1.2, '#ff8844');

                state.enemiesKilled++;
                if (state.enemiesKilled >= 60 && !state.bossSpawned && !state.bossDefeated) {
                    spawnBoss();
                }

                const newLevel = Math.floor(state.score / 100) + 1;
                if (newLevel > state.level) {
                    state.level = newLevel;
                    state.maxEnemies = Math.min(2 + Math.floor(state.level / 2), 6);
                    state.spawnInterval = Math.max(50, 120 - state.level * 2);
                }
                updateHUD();
            }

            // ─── УНИЧТОЖЕНИЕ БОССА ──────────────────────────────────
            function destroyBoss() {
                const boss = state.boss;
                if (!boss || !boss.alive) return;
                boss.alive = false;
                state.bossDefeated = true;

                state.score += 500;
                state.money += 200;

                for (let i = 0; i < 40; i++) {
                    state.explosions.push({
                        x: boss.x + rand(0, boss.w),
                        y: boss.y + rand(0, boss.h),
                        r: rand(4, 16),

                        gravity: 0.04

                for (let i = 0; i < 10; i++) {
                    state.coins.push({
                        x: boss.x + rand(0, boss.w),
                        y: boss.y + rand(0, boss.h),
                        w: 10,
                        h: 10,

                        vy: -2 - rand(0, 2),

                        bob: rand(0, 6),

                updateHUD();
            }

            // ─── СБРОС ИГРЫ ──────────────────────────────────────────
            function resetGame() {
                const def = getTankDef(state.currentTankId);
                state.player.x = 70;
                state.player.y = 180;
                state.player.w = 38;
                state.player.h = 22;
                state.player.health = def.health;
                state.player.maxHealth = def.health;
                state.player.speed = def.speed;
                state.player.fireRate = def.fireRate;
                state.player.damage = def.damage;
                state.player.bulletSpeed = def.bulletSpeed;

                state.player.alive = true;
                state.player.invincible = 60;
                state.player.trackOffset = 0;
                state.player.barrelAngle = 0;

                state.bullets = [];
                state.enemyBullets = [];
                state.enemies = [];
                state.coins = [];

            function fullRestart() {
                state.money = 0;
                state.score = 0;
                state.ownedTanks = ['t26'];
                state.currentTankId = 't26';

                state.maxEnemies = 2;

                state.timeSeconds = 0;
                state.enemiesKilled = 0;

                state.bossDefeated = false;

                renderShop();
