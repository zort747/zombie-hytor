            // ─── ОБНОВЛЕНИЕ ──────────────────────────────────────────
            function update() {
                if (state.gameOver || state.paused) return;

                state.frame++;
                if (state.frame % 60 === 0) {
                    state.timeSeconds++;
                    updateHUD();
                }

                const p = state.player;
                const def = getPlayerTankDef();

                p.speed = def.speed;
                p.fireRate = def.fireRate;
                p.damage = def.damage;
                p.bulletSpeed = def.bulletSpeed;
                p.maxHealth = def.health;
                if (p.health > p.maxHealth) p.health = p.maxHealth;
                if (p.invincible > 0) p.invincible--;
                if (p.fireCooldown > 0) p.fireCooldown--;

                let dx = 0,
                    dy = 0;
                if (keys.left) dx = -p.speed;
                if (keys.right) dx = p.speed;
                if (keys.up) dy = -p.speed * 0.6;
                if (keys.down) dy = p.speed * 0.6;
                if (dx !== 0) p.trackOffset += 0.3;
                p.x = clamp(p.x + dx, 8, GAME_W - p.w - 8);
                p.y = clamp(p.y + dy, 24, GAME_H - p.h - 8);

                if (keys.barrelUp) p.barrelAngle = Math.max(-0.5, p.barrelAngle - 0.03);
                if (keys.barrelDown) p.barrelAngle = Math.min(0.5, p.barrelAngle + 0.03);
                if (keys.fire) playerShoot();

                for (let i = state.bullets.length - 1; i >= 0; i--) {
                    const b = state.bullets[i];
                    b.x += b.vx;
                    b.y += b.vy;
                    if (b.x > GAME_W + 20 || b.x < -20 || b.y < -20 || b.y > GAME_H + 20) {
                        state.bullets.splice(i, 1);
                        continue;
                    }
                    let hit = false;
                    for (const enemy of state.enemies) {
                        if (!enemy.alive) continue;
                        if (b.x < enemy.x + enemy.w && b.x + b.w > enemy.x &&
                            b.y < enemy.y + enemy.h && b.y + b.h > enemy.y) {
                            enemy.health -= b.damage;
                            enemy.hitFlash = 5;
                            createExplosion(b.x, b.y, 0.3, '#ffaa44');
                            if (enemy.health <= 0) destroyEnemy(enemy);
                            hit = true;
                            break;
                        }
                    }
                    if (!hit && state.boss && state.boss.alive) {
                        const boss = state.boss;
                        if (b.x < boss.x + boss.w && b.x + b.w > boss.x &&
                            b.y < boss.y + boss.h && b.y + b.h > boss.y) {
                            boss.health -= b.damage;
                            boss.hitFlash = 5;
                            createExplosion(b.x, b.y, 0.4, '#ff8844');
                            if (boss.health <= 0) destroyBoss();
                            hit = true;
                            updateHUD();
                        }
                    }
                    if (hit) state.bullets.splice(i, 1);
                }

                for (let i = state.enemyBullets.length - 1; i >= 0; i--) {
                    const b = state.enemyBullets[i];
                    b.x += b.vx;
                    b.y += b.vy;
                    if (b.x < -20 || b.x > GAME_W + 20 || b.y < -20 || b.y > GAME_H + 20) {
                        state.enemyBullets.splice(i, 1);
                        continue;
                    }
                    if (p.alive && p.invincible === 0) {
                        if (b.x < p.x + p.w && b.x + b.w > p.x &&
                            b.y < p.y + p.h && b.y + b.h > p.y) {
                            p.health -= b.damage;
                            p.invincible = 30;
                            createExplosion(b.x, b.y, 0.4, '#ff5533');
                            state.enemyBullets.splice(i, 1);
                            updateHUD();
                            if (p.health <= 0) {
                                p.alive = false;
                                createExplosion(p.x + p.w / 2, p.y + p.h / 2, 1.2, '#ff6644');
                                state.gameOver = true;
                                finalScore.textContent = state.score;
                                gameoverOverlay.classList.add('active');
                            }
                            continue;
                        }
                    }
                }

                for (let i = state.enemies.length - 1; i >= 0; i--) {
                    const enemy = state.enemies[i];
                    if (!enemy.alive) { state.enemies.splice(i, 1); continue; }
                    if (enemy.hitFlash > 0) enemy.hitFlash--;
                    const targetY = state.player.y + state.player.h / 2 - enemy.h / 2;
                    const dy2 = targetY - enemy.y;
                    const moveSpeed = enemy.speed * 0.3;
                    if (Math.abs(dy2) > 5) {
                        enemy.y += Math.sign(dy2) * Math.min(Math.abs(dy2) * 0.02, moveSpeed);
                    }
                    enemy.y = clamp(enemy.y, 24, GAME_H - enemy.h - 8);
                    enemy.x -= enemy.speed * 0.25;
                    if (enemy.x < -50) { state.enemies.splice(i, 1); continue; }
                    if (enemy.fireCooldown > 0) enemy.fireCooldown--;
                    if (Math.random() < 0.15) enemyShoot(enemy);
                    if (p.alive && p.invincible === 0) {
                        if (enemy.x < p.x + p.w && enemy.x + enemy.w > p.x &&
                            enemy.y < p.y + p.h && enemy.y + enemy.h > p.y) {
                            p.health -= 1;
                            p.invincible = 40;
                            createExplosion(enemy.x + enemy.w / 2, enemy.y + enemy.h / 2, 0.4, '#ff6644');
                            enemy.x += 25;
                            updateHUD();
                            if (p.health <= 0) {
                                p.alive = false;
                                createExplosion(p.x + p.w / 2, p.y + p.h / 2, 1.2, '#ff6644');
                                state.gameOver = true;
                                finalScore.textContent = state.score;
                                gameoverOverlay.classList.add('active');
                            }
                        }
                    }
                    enemy.trackOffset += 0.12;
                }

                if (state.boss && state.boss.alive) {
                    const boss = state.boss;
                    if (boss.hitFlash > 0) boss.hitFlash--;
                    const targetY = state.player.y + state.player.h / 2 - boss.h / 2;
                    const dyBoss = targetY - boss.y;
                    const moveSpeedBoss = boss.speed * 0.4;
                    if (Math.abs(dyBoss) > 5) {
                        boss.y += Math.sign(dyBoss) * Math.min(Math.abs(dyBoss) * 0.02, moveSpeedBoss);
                    }
                    boss.y = clamp(boss.y, 24, GAME_H - boss.h - 8);
                    boss.x -= boss.speed * 0.2;
                    if (boss.fireCooldown > 0) boss.fireCooldown--;
                    if (boss.fireCooldown === 0 && Math.random() < 0.3) {
                        const p2 = state.player;
                        if (p2.alive) {
                            boss.fireCooldown = boss.fireRate;
                            const angle = Math.PI + rand(-0.12, 0.12);
                            const speed = boss.bulletSpeed * 0.4;
                            state.enemyBullets.push({
                                x: boss.x - 4,
                                y: boss.y + boss.h / 2 - 2,
                                w: 6,
                                h: 4,
                                vx: Math.cos(angle) * speed,
                                vy: Math.sin(angle) * speed,
                                damage: boss.damage,
                                isBoss: true
                            });
                            state.explosions.push({
                                x: boss.x - 5,
                                y: boss.y + boss.h / 2 - 3,
                                r: 3,
                                life: 4,
                                maxLife: 4,
                                color: '#ff8844'
                            });
                        }
                    }
                    if (p.alive && p.invincible === 0) {
                        if (boss.x < p.x + p.w && boss.x + boss.w > p.x &&
                            boss.y < p.y + p.h && boss.y + boss.h > p.y) {
                            p.health -= 1;
                            p.invincible = 40;
                            createExplosion(boss.x + boss.w / 2, boss.y + boss.h / 2, 0.5, '#ff6644');
                            boss.x += 18;
                            updateHUD();
                            if (p.health <= 0) {
                                p.alive = false;
                                createExplosion(p.x + p.w / 2, p.y + p.h / 2, 1.2, '#ff6644');
                                state.gameOver = true;
                                finalScore.textContent = state.score;
                                gameoverOverlay.classList.add('active');
                            }
                        }
                    }
                    boss.trackOffset += 0.1;
                }

                state.spawnTimer++;
                if (state.spawnTimer >= state.spawnInterval) {
                    state.spawnTimer = 0;
                    spawnEnemy();
                    if (state.level > 8 && Math.random() < 0.05) spawnEnemy();
                }

                for (let i = state.explosions.length - 1; i >= 0; i--) {
                    const e = state.explosions[i];
                    e.x += e.vx || 0;
                    e.y += e.vy || 0;
                    if (e.gravity) e.vy += e.gravity;
                    e.life--;
                    if (e.life <= 0) state.explosions.splice(i, 1);
                }

                for (let i = state.coins.length - 1; i >= 0; i--) {
                    const coin = state.coins[i];
                    if (coin.collected) { state.coins.splice(i, 1); continue; }
                    coin.y += coin.vy || 0;
                    coin.vy = (coin.vy || 0) + 0.04;
                    if (coin.vy > 1.0) coin.vy = 1.0;
                    coin.bob = (coin.bob || 0) + 0.05;
                    if (p.alive) {
                        if (coin.x < p.x + p.w && coin.x + coin.w > p.x &&
                            coin.y < p.y + p.h && coin.y + coin.h > p.y) {
                            state.money += coin.value;
                            createExplosion(coin.x + 4, coin.y + 4, 0.4, '#ffdd44');
                            coin.collected = true;
                            updateHUD();
                            continue;
                        }
                    }
                    coin.life--;
                    if (coin.life <= 0) state.coins.splice(i, 1);
                }

                updateHUD();
            }

            // ─── ОТРИСОВКА ТАНКА ───────────────────────────────────────
            function drawTank(ctx, x, y, w, h, color, turretColor, trackColor, trackOffset, facing, flash, barrelAngle,
                star) {
                const f = facing || 1;
                ctx.save();

                const bodyColor = flash ? '#ffffff' : color;
                const bodyW = w;
                const bodyH = h * 0.55;
                const bodyX = x;
                const bodyY = y + h * 0.25;

                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 5;
                ctx.shadowOffsetY = 2;

                ctx.fillStyle = bodyColor;
                ctx.strokeStyle = '#1a1a1a';
                ctx.lineWidth = 0.8;
                ctx.beginPath();
                ctx.roundRect(bodyX, bodyY, bodyW, bodyH, 3);
                ctx.fill();
                ctx.stroke();

                const trackY = y + h * 0.7;
                const trackH = h * 0.3;
                ctx.shadowBlur = 0;
                ctx.fillStyle = trackColor || '#3a3a2a';
                ctx.fillRect(x + 2, trackY, w - 4, trackH);

                const wheelCount = Math.max(3, Math.floor(w / 10));
                const wheelSpacing = (w - 8) / (wheelCount + 0.5);
                for (let i = 0; i < wheelCount; i++) {
                    const wx = x + 4 + i * wheelSpacing + wheelSpacing * 0.3;
                    const wy = trackY + trackH / 2;
                    ctx.beginPath();
                    ctx.arc(wx, wy, trackH * 0.4, 0, Math.PI * 2);
                    ctx.fillStyle = '#2a2a1a';
                    ctx.fill();
                    ctx.strokeStyle = '#1a1a1a';
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(wx, wy, trackH * 0.15, 0, Math.PI * 2);
                    ctx.fillStyle = '#4a4a3a';
                    ctx.fill();
                }

                const turretW = w * 0.4;
                const turretH = h * 0.45;
                const turretX = x + w * 0.4;
                const turretY = y + h * 0.1;

                ctx.shadowBlur = 3;
                ctx.shadowOffsetY = 1;
                ctx.fillStyle = turretColor || color;
                ctx.strokeStyle = '#1a1a1a';
                ctx.lineWidth = 0.8;
                ctx.beginPath();
                ctx.roundRect(turretX, turretY, turretW, turretH, 4);
                ctx.fill();
                ctx.stroke();

                ctx.shadowBlur = 2;
                const barrelLen = w * 0.5;
                const barrelW = 3;
                const barrelX = (f > 0) ? turretX + turretW : turretX - barrelLen;
                const barrelY = turretY + turretH / 2 - barrelW / 2;

                ctx.save();
                ctx.translate(barrelX + (f > 0 ? 0 : barrelLen), barrelY + barrelW / 2);
                ctx.rotate(barrelAngle || 0);
                ctx.fillStyle = '#2a2a2a';
                ctx.strokeStyle = '#1a1a1a';
                ctx.lineWidth = 0.8;
                ctx.fillRect(0, -barrelW / 2, barrelLen, barrelW);
                ctx.strokeRect(0, -barrelW / 2, barrelLen, barrelW);
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(barrelLen - 4, -barrelW / 2 - 1, 4, barrelW + 2);
                ctx.restore();

                if (star) {
                    ctx.shadowBlur = 0;
                    const sx = turretX + turretW / 2;
                    const sy = turretY + turretH / 2;
                    ctx.fillStyle = '#cc2222';
                    ctx.strokeStyle = '#aa1111';
                    ctx.lineWidth = 0.8;
                    const size = 3.5;
                    ctx.beginPath();
                    for (let i = 0; i < 5; i++) {
                        const angle = (i * 4 * Math.PI / 5) - Math.PI / 2;
                        const r = (i % 2 === 0) ? size : size * 0.4;
                        const px = sx + Math.cos(angle) * r;
                        const py = sy + Math.sin(angle) * r;
                        if (i === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                }

                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(turretX + turretW * 0.6, turretY + turretH * 0.25, 2, 0, Math.PI * 2);
                ctx.fillStyle = '#1a1a1a';
                ctx.fill();

                ctx.restore();
            }

            // ─── ОТРИСОВКА ────────────────────────────────────────────
            function draw() {
                ctx.clearRect(0, 0, GAME_W, GAME_H);

                const grad = ctx.createLinearGradient(0, 0, 0, GAME_H);
                grad.addColorStop(0, '#1a2a3a');
                grad.addColorStop(0.5, '#2a3a2a');
                grad.addColorStop(1, '#1a2a1a');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, GAME_W, GAME_H);

                for (const bld of state.buildings) {
                    ctx.fillStyle = bld.color;
                    ctx.shadowColor = 'rgba(0,0,0,0.2)';
                    ctx.shadowBlur = 4;
                    ctx.shadowOffsetY = 2;
                    ctx.fillRect(bld.x, bld.y, bld.w, bld.h);
                    ctx.shadowBlur = 0;
                    const winCount = 2 + Math.floor(bld.w / 18);
                    const gap = bld.w / (winCount + 1);
                    for (let i = 0; i < winCount; i++) {
                        const wx = bld.x + gap * (i + 1) - 3;
                        const wy = bld.y + 5 + (bld.h - 10) * 0.3;
                        ctx.fillStyle = bld.destroyed ? '#2a2a1a' : '#8a9a7a';
                        ctx.fillRect(wx, wy, 5, 5);
                        if (!bld.destroyed) {
                            ctx.fillStyle = '#aabb99';
                            ctx.fillRect(wx + 1, wy + 1, 3, 3);
                        }
                    }
                    if (bld.destroyed) {
                        ctx.fillStyle = '#2a2a1a';
                        ctx.fillRect(bld.x + 3, bld.y + bld.h - 3, bld.w - 6, 2);
                    }
                }

                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.moveTo(0, GAME_H - 16);
                for (const pt of state.roadPoints) {
                    ctx.lineTo(pt.x, pt.y);
                }
                ctx.lineTo(GAME_W, GAME_H - 16);
                ctx.lineTo(GAME_W, GAME_H);
                ctx.lineTo(0, GAME_H);
                ctx.closePath();
                ctx.fillStyle = '#2a3a2a';
                ctx.fill();
                ctx.strokeStyle = '#1a2a1a';
                ctx.lineWidth = 0.8;
                ctx.stroke();

                ctx.strokeStyle = '#3a4a3a';
                ctx.lineWidth = 0.8;
                ctx.beginPath();
                for (const pt of state.roadPoints) {
                    if (pt === state.roadPoints[0]) ctx.moveTo(pt.x, pt.y);
                    else ctx.lineTo(pt.x, pt.y);
                }
                ctx.stroke();

                for (const enemy of state.enemies) {
                    if (!enemy.alive) continue;
                    const flash = enemy.hitFlash > 0;
                    drawTank(ctx, enemy.x, enemy.y, enemy.w, enemy.h,
                        flash ? '#ffffff' : enemy.color,
                        flash ? '#dddddd' : enemy.turretColor,
                        enemy.trackColor,
                        enemy.trackOffset || 0,
                        -1,
                        flash,
                        0,
                        false
                    );
                    if (enemy.health < enemy.maxHealth) {
                        const barW = enemy.w;
                        const barH = 2;
                        const barX = enemy.x;
                        const barY = enemy.y - 5;
                        ctx.fillStyle = 'rgba(0,0,0,0.5)';
                        ctx.fillRect(barX, barY, barW, barH);
                        ctx.fillStyle = '#44cc44';
                        ctx.fillRect(barX + 1, barY + 1, (barW - 2) * (enemy.health / enemy.maxHealth), barH - 2);
                    }
                }

                if (state.boss && state.boss.alive) {
                    const boss = state.boss;
                    const flash = boss.hitFlash > 0;
                    drawTank(ctx, boss.x, boss.y, boss.w, boss.h,
                        flash ? '#ffffff' : '#6a2a2a',
                        flash ? '#dddddd' : '#8a3a3a',
                        '#3a1a1a',
                        boss.trackOffset || 0,
                        -1,
                        flash,
                        0,
                        true
                    );
                    const barW = boss.w + 14;
                    const barH = 4;
                    const barX = boss.x - 7;
                    const barY = boss.y - 12;
                    ctx.fillStyle = 'rgba(0,0,0,0.6)';
                    ctx.fillRect(barX, barY, barW, barH);
                    const hpRatio = boss.health / boss.maxHealth;
                    const hpColor = hpRatio > 0.5 ? '#44cc44' : (hpRatio > 0.25 ? '#ccaa44' : '#cc4444');
                    ctx.fillStyle = hpColor;
                    ctx.fillRect(barX + 1, barY + 1, (barW - 2) * hpRatio, barH - 2);
                    ctx.strokeStyle = '#cc4444';
                    ctx.lineWidth = 0.8;
                    ctx.strokeRect(barX, barY, barW, barH);
                    ctx.fillStyle = '#ff6666';
                    ctx.font = 'bold 8px monospace';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'bottom';
                    ctx.fillText('👹 БОСС', boss.x + boss.w / 2, barY - 1);
                }

                for (const b of state.bullets) {
                    ctx.fillStyle = '#ffff44';
                    ctx.shadowColor = '#ffff44';
                    ctx.shadowBlur = 8;
                    ctx.fillRect(b.x, b.y, b.w, b.h);
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(b.x + 1, b.y + 1, b.w - 2, b.h - 2);
                }

                for (const b of state.enemyBullets) {
                    ctx.fillStyle = b.isBoss ? '#ff6644' : '#ff5533';
                    ctx.shadowColor = b.isBoss ? '#ff6644' : '#ff5533';
                    ctx.shadowBlur = 6;
                    ctx.fillRect(b.x, b.y, b.w, b.h);
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#ff8866';
                    ctx.fillRect(b.x + 1, b.y + 1, b.w - 2, b.h - 2);
                }

                const p = state.player;
                if (p.alive) {
                    const flash = p.invincible > 0 && Math.floor(p.invincible / 4) % 2 === 0;
                    const def = getPlayerTankDef();
                    drawTank(ctx, p.x, p.y, p.w, p.h,
                        flash ? '#ffffff' : def.color,
                        flash ? '#dddddd' : def.turretColor,
                        def.trackColor,
                        p.trackOffset || 0,
                        1,
                        flash,
                        p.barrelAngle,
                        true
                    );
                    const barW = p.w + 6;
                    const barH = 2.5;
                    const barX = p.x - 3;
                    const barY = p.y - 10;
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    ctx.fillRect(barX, barY, barW, barH);
                    const hpRatio = p.health / p.maxHealth;
                    const hpColor = hpRatio > 0.5 ? '#44cc44' : (hpRatio > 0.25 ? '#ccaa44' : '#cc4444');
                    ctx.fillStyle = hpColor;
                    ctx.fillRect(barX + 1, barY + 1, (barW - 2) * hpRatio, barH - 2);
                }

                for (const coin of state.coins) {
                    if (coin.collected) continue;
                    const bobY = Math.sin(coin.bob || 0) * 1.5;
                    const cx = coin.x + 3.5;
                    const cy = coin.y + 3.5 + bobY;
                    ctx.save();
                    ctx.shadowColor = 'rgba(255,200,50,0.2)';
                    ctx.shadowBlur = 6;
                    const r = 3.5;
                    ctx.beginPath();
                    ctx.arc(cx, cy, r, 0, Math.PI * 2);
                    ctx.fillStyle = '#f0c040';
                    ctx.fill();
                    ctx.strokeStyle = '#c09020';
                    ctx.lineWidth = 0.8;
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(cx - 1, cy - 1, 1, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255,255,200,0.5)';
                    ctx.fill();
                    ctx.fillStyle = '#8a6a10';
                    ctx.font = '4px monospace';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('₽', cx, cy + 0.5);
                    ctx.restore();
                }

                for (const e of state.explosions) {
                    const alpha = e.life / e.maxLife;
                    const r = e.r * (1 + (1 - alpha) * 0.5);
                    ctx.globalAlpha = alpha;
                    ctx.beginPath();
                    ctx.arc(e.x, e.y, r, 0, Math.PI * 2);
                    ctx.fillStyle = e.color || '#ff8844';
                    ctx.shadowColor = e.color || '#ff8844';
                    ctx.shadowBlur = 12;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    if (alpha > 0.3) {
                        ctx.beginPath();
                        ctx.arc(e.x, e.y, r * 0.3, 0, Math.PI * 2);
                        ctx.fillStyle = 'rgba(255,255,200,0.5)';
                        ctx.fill();
                    }
                    ctx.globalAlpha = 1;
                }

                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(200,200,200,0.2)';
                ctx.font = '8px monospace';
                ctx.textAlign = 'right';
                ctx.textBaseline = 'bottom';
                ctx.fillText('врагов: ' + state.enemies.filter(e => e.alive).length + '/' + state.maxEnemies, GAME_W - 5,
                    GAME_H - 2);
                ctx.textAlign = 'left';
                ctx.fillText('убито: ' + state.enemiesKilled + '/60', 5, GAME_H - 2);

                if (p.alive) {
                    ctx.fillStyle = 'rgba(200,200,200,0.3)';
                    ctx.font = '8px monospace';
                    ctx.textAlign = 'left';
                    ctx.textBaseline = 'top';
                    const deg = (p.barrelAngle * 180 / Math.PI).toFixed(0);
                    ctx.fillText('🔫 ' + deg + '°', 5, 5);
                }

                if (state.paused) {
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.fillRect(0, 0, GAME_W, GAME_H);
                    ctx.fillStyle = '#b0f0b0';
                    ctx.font = '20px monospace';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('⏸ ПАУЗА', GAME_W / 2, GAME_H / 2 - 8);
                    ctx.fillStyle = '#8fca8f';
                    ctx.font = '12px monospace';
                    ctx.fillText('нажмите кнопку на экране', GAME_W / 2, GAME_H / 2 + 26);
                }
            }

            function gameLoop() {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }

            function init() {
                const def = getTankDef('t26');
                state.player.health = def.health;
                state.player.maxHealth = def.health;
                state.player.speed = def.speed;
                state.player.fireRate = def.fireRate;
                state.player.damage = def.damage;
                state.player.bulletSpeed = def.bulletSpeed;
                state.currentTankId = 't26';
                state.ownedTanks = ['t26'];
                state.money = 0;
                state.score = 0;
                state.level = 1;
                state.gameOver = false;
                state.paused = false;
                state.player.alive = true;
                state.player.invincible = 60;
                state.enemies = [];
                state.bullets = [];
                state.enemyBullets = [];
                state.coins = [];
                state.explosions = [];
                state.timeSeconds = 0;
                state.spawnInterval = 130;
                state.maxEnemies = 2;
                state.enemiesKilled = 0;
                state.boss = null;
                state.bossSpawned = false;
                state.bossDefeated = false;
                generateMap();
                updateHUD();
                renderShop();
                gameLoop();
            }

            init();

            if (!CanvasRenderingContext2D.prototype.roundRect) {
                CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                    const rad = typeof r === 'number' ? r : (r || 3);
                    this.moveTo(x + rad, y);
                    this.lineTo(x + w - rad, y);
                    this.quadraticCurveTo(x + w, y, x + w, y + rad);
                    this.lineTo(x + w, y + h - rad);
                    this.quadraticCurveTo(x + w, y + h, x + w - rad, y + h);
                    this.lineTo(x + rad, y + h);
                    this.quadraticCurveTo(x, y + h, x, y + h - rad);
                    this.lineTo(x, y + rad);
                    this.quadraticCurveTo(x, y, x + rad, y);
                    this.closePath();
                    return this;
                };
            }

        })();
    </script>
</body>
