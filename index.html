<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Танки СССР — PWA</title>
    <link rel="icon" href="favicon.png" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <style>
        /* Все стили из игры (можно вынести в style.css) */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a12; font-family: 'Courier New', monospace; touch-action: none; }
        #gameContainer { width: 100vw; height: 100vh; display: flex; flex-direction: column; background: #1a1a2e; position: relative; overflow: hidden; }
        /* ... остальные стили из игры ... */
    </style>
</head>
<body>
    <div id="gameContainer">
        <!-- HUD и весь интерфейс игры -->
        <div id="hud">...</div>
        <div id="canvasWrapper"><canvas id="gameCanvas"></canvas></div>
        <div id="controls">...</div>
        <div class="overlay" id="shopOverlay">...</div>
        <div class="overlay" id="pauseOverlay">...</div>
        <div class="overlay" id="gameoverOverlay">...</div>
        <div class="install-banner" id="installBanner">...</div>
    </div>
    <script>
        // Весь JavaScript код игры (можно вынести в game.js)
        // ... вся логика игры ...
    </script>
    <script>
        // Регистрация Service Worker (можно вынести в sw-register.js)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(() => console.log('SW registered'))
                .catch(err => console.log('SW registration failed:', err));
        }
    </script>
</body>
</html>
