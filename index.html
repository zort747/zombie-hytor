<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Zombie USSR · Горизонтальный телефон</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #1a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Courier New', 'Consolas', monospace;
            touch-action: none;
            overflow: hidden;
        }
        .pda-container {
            background: #3d1a1a;
            border-radius: 28px;
            padding: 12px 12px 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9), inset 0 0 0 3px #b8860b, inset 0 0 0 6px #5a2a1a;
            border: 4px solid #b8860b;
            position: relative;
            max-width: 520px;
            width: fit-content;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .pda-container::before {
            content: "★";
            position: absolute;
            top: -8px;
            left: 20px;
            font-size: 32px;
            color: #ffd700;
            text-shadow: 0 0 10px #ff8c00;
            opacity: 0.5;
            transform: rotate(-10deg);
        }
        .pda-container::after {
            content: "☭";
            position: absolute;
            bottom: -8px;
            right: 20px;
            font-size: 30px;
            color: #ffd700;
            opacity: 0.3;
            transform: rotate(10deg);
        }
        .pda-screen {
            background: #1f1212;
            border-radius: 16px;
            padding: 6px;
            box-shadow: inset 0 0 30px #0a0505, 0 0 0 2px #b8860b;
            position: relative;
            width: 420px;
            height: 600px;
            flex-shrink: 0;
        }
        @media (max-width: 460px) {
            .pda-container {
                padding: 8px;
                border-radius: 18px;
            }
            .pda-screen {
                width: 100%;
                height: auto;
                aspect-ratio: 420 / 600;
                padding: 4px;
            }
        }
        canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
            background: #1a0f0f;
            border-radius: 8px;
            image-rendering: pixelated;
            margin: 0 auto;
            cursor: crosshair;
            box-shadow: inset 0 0 15px #0a0505;
            touch-action: none;
        }

        /* ---------- ПАНЕЛЬ УПРАВЛЕНИЯ ---------- */
        .pda-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px 6px;
            margin-top: 6px;
            padding: 4px 10px;
            background: #2a1212;
            border-radius: 10px;
            border: 1px solid #b8860b;
            color: #f0d080;
            font-size: 14px;
            text-shadow: 0 0 6px #8a4a1a;
            width: 100%;
            max-width: 420px;
        }
        .pda-controls .money {
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: bold;
            color: #ffd700;
            font-size: 16px;
        }
        .pda-controls .weapon-info {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #d4b48c;
            font-size: 13px;
        }
        .pda-controls .weapon-info span {
            background: #1a0a0a;
            padding: 1px 8px;
            border-radius: 12px;
            border: 1px solid #8a5a2a;
        }
        .pda-btn {
            background: #8a2a2a;
            border: none;
            color: #ffd700;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            font-weight: bold;
            padding: 3px 12px;
            border-radius: 14px;
            box-shadow: inset 0 -3px 0 #3a1010;
            cursor: pointer;
            transition: 0.08s linear;
            border: 1px solid #b8860b;
            text-shadow: 0 0 4px #8a4a00;
            touch-action: manipulation;
        }
        .pda-btn:hover {
            background: #aa3a3a;
            transform: scale(0.97);
        }
        .pda-btn:active {
            transform: translateY(2px);
            box-shadow: inset 0 0 0 #3a1010;
        }
        .pda-btn-shop {
            background: #5a3a1a;
            border-color: #d4a020;
            color: #ffdd66;
        }
        .pda-btn-shop:hover {
            background: #7a4a2a;
        }
        .pda-btn-restart {
            background: #3a2a2a;
            border-color: #8a4a4a;
            color: #f0a0a0;
        }
        .pda-btn-restart:hover {
            background: #5a3a3a;
        }
        .hint {
            color: #9a7a5a;
            font-size: 10px;
            text-align: center;
            margin-top: 3px;
            letter-spacing: 0.5px;
        }

        /* ---------- МАГАЗИН ---------- */
        .shop-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            background: rgba(26, 10, 10, 0.95);
            border-radius: 12px;
            display: none;
            flex-direction: column;
            padding: 16px;
            border: 2px solid #b8860b;
            backdrop-filter: blur(4px);
            z-index: 10;
            overflow-y: auto;
        }
        .shop-overlay.open {
            display: flex;
        }
        .shop-title {
            color: #ffd700;
            font-size: 22px;
            text-align: center;
            margin: 0 0 10px 0;
            letter-spacing: 4px;
            text-shadow: 0 0 12px #8a4a00;
            border-bottom: 2px solid #8a5a2a;
            padding-bottom: 6px;
        }
        .shop-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 8px 0;
        }
        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1f1212;
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid #6a3a2a;
            color: #d4b48c;
            font-size: 14px;
        }
        .shop-item .name {
            font-weight: bold;
            min-width: 80px;
        }
        .shop-item .price {
            color: #ffd700;
            margin-right: 10px;
        }
        .shop-item .buy-btn {
            background: #3a6a3a;
            border: none;
            color: #e0f0e0;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            padding: 2px 14px;
            border-radius: 14px;
            font-size: 13px;
            cursor: pointer;
            box-shadow: inset 0 -3px 0 #1a3a1a;
            border: 1px solid #5a8a5a;
            transition: 0.06s linear;
            touch-action: manipulation;
        }
        .shop-item .buy-btn:hover {
            background: #4a7a4a;
        }
        .shop-item .buy-btn:active {
            transform: translateY(2px);
            box-shadow: inset 0 0 0 #1a3a1a;
        }
        .shop-item .buy-btn:disabled {
            opacity: 0.4;
            transform: none;
            box-shadow: inset 0 -3px 0 #1a3a1a;
            cursor: not-allowed;
        }
        .shop-close-btn {
            background: #5a2a2a;
            border: none;
            color: #f0c0a0;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: bold;
            padding: 5px 0;
            border-radius: 20px;
            cursor: pointer;
            border: 1px solid #8a4a2a;
            margin-top: 6px;
            transition: 0.06s linear;
            touch-action: manipulation;
        }
        .shop-close-btn:hover {
            background: #7a3a3a;
        }
        .shop-close-btn:active {
            transform: scale(0.97);
        }

        @media (max-width: 460px) {
            .pda-controls {
                font-size: 12px;
                padding: 3px 6px;
                gap: 3px;
            }
            .pda-controls .money {
                font-size: 14px;
            }
            .pda-controls .weapon-info {
                font-size: 11px;
                gap: 4px;
            }
            .pda-controls .weapon-info span {
                padding: 1px 6px;
            }
            .pda-btn {
                font-size: 11px;
                padding: 2px 10px;
            }
            .shop-item {
                font-size: 12px;
                padding: 4px 10px;
            }
            .shop-title {
                font-size: 18px;
            }
            .hint {
                font-size: 9px;
            }
        }

        .shop-overlay::-webkit-scrollbar {
            width: 5px;
        }
        .shop-overlay::-webkit-scrollbar-track {
            background: #1a0a0a;
            border-radius: 10px;
        }
        .shop-overlay::-webkit-scrollbar-thumb {
            background: #6a3a2a;
            border-radius: 10px;
        }

        /* ---------- МОБИЛЬНЫЕ КНОПКИ ---------- */
        .mobile-controls {
            display: none;
            justify-content: space-between;
            padding: 4px 6px;
            gap: 6px;
            margin-top: 4px;
            width: 100%;
            max-width: 420px;
        }
        .mobile-controls .ctrl-btn {
            background: rgba(40, 20, 20, 0.8);
            border: 1px solid #b8860b;
            border-radius: 10px;
            color: #ffd700;
            font-size: 18px;
            padding: 6px 0;
            text-align: center;
            flex: 1;
            cursor: pointer;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            font-family: 'Courier New', monospace;
            box-shadow: inset 0 -4px 0 #2a0a0a;
            transition: 0.05s linear;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .mobile-controls .ctrl-btn:active {
            transform: translateY(2px);
            box-shadow: inset 0 0 0 #2a0a0a;
        }
        .mobile-controls .ctrl-btn.fire-btn {
            background: rgba(80, 30, 20, 0.9);
            border-color: #cc4444;
            color: #ff6666;
            flex: 1.5;
            font-size: 20px;
        }
        .mobile-controls .ctrl-btn.jump-btn {
            background: rgba(30, 50, 30, 0.8);
            border-color: #5a8a5a;
            color: #88dd88;
        }
        .mobile-controls .ctrl-btn.shop-btn-mob {
            background: rgba(60, 40, 10, 0.8);
            border-color: #d4a020;
            color: #ffdd66;
            flex: 0.8;
            font-size: 14px;
        }

        @media (pointer: coarse) {
            .mobile-controls {
                display: flex !important;
            }
            .hint {
                display: none;
            }
        }
        @media (max-width: 460px) {
            .mobile-controls .ctrl-btn {
                font-size: 14px;
                min-height: 34px;
                padding: 4px 0;
            }
            .mobile-controls .ctrl-btn.fire-btn {
                font-size: 16px;
            }
        }

        /* ---------- ГОРИЗОНТАЛЬНАЯ ОРИЕНТАЦИЯ ДЛЯ ТЕЛЕФОНОВ ---------- */
        @media (orientation: landscape) and (pointer: coarse) {
            body {
                overflow: hidden;
                background: #0a0505;
            }
            .pda-container {
                max-width: 100vw;
                max-height: 100vh;
                border-radius: 0;
                padding: 4px 8px;
                border-width: 2px;
                box-shadow: none;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                align-items: center;
                gap: 4px;
                background: #1a0a0a;
                width: 100vw;
                height: 100vh;
            }
            .pda-container::before,
            .pda-container::after {
                display: none;
            }
            .pda-screen {
                width: auto;
                height: calc(100vh - 60px);
                aspect-ratio: 4 / 5;
                max-width: calc(100vw - 20px);
                padding: 4px;
                border-radius: 10px;
                flex-shrink: 0;
            }
            .pda-controls {
                display: none; /* Скрываем на горизонтальном телефоне, так как всё управление на кнопках */
            }
            .mobile-controls {
                max-width: 100%;
                padding: 2px 4px;
                gap: 4px;
                flex-wrap: nowrap;
                height: 44px;
                margin-top: 0;
            }
            .mobile-controls .ctrl-btn {
                font-size: 14px;
                min-height: 30px;
                padding: 2px 0;
                border-radius: 8px;
                box-shadow: inset 0 -3px 0 #2a0a0a;
            }
            .mobile-controls .ctrl-btn.fire-btn {
                font-size: 16px;
                flex: 2;
            }
            .mobile-controls .ctrl-btn.shop-btn-mob {
                flex: 0.6;
                font-size: 12px;
            }
            .mobile-controls .ctrl-btn.jump-btn {
                flex: 0.8;
            }
            .hint {
                display: none;
            }
            /* Магазин в горизонтали */
            .shop-overlay {
                top: 5px;
                left: 5px;
                right: 5px;
                bottom: 5px;
                border-radius: 8px;
                padding: 10px;
            }
            .shop-title {
                font-size: 18px;
            }
            .shop-item {
                font-size: 12px;
                padding: 4px 8px;
            }
            .shop-item .buy-btn {
                font-size: 11px;
                padding: 1px 10px;
            }
            .shop-close-btn {
                font-size: 14px;
                padding: 4px 0;
            }
        }
        /* Для очень маленьких экранов в горизонтали */
        @media (orientation: landscape) and (pointer: coarse) and (max-height: 400px) {
            .pda-screen {
                height: calc(100vh - 50px);
            }
            .mobile-controls {
                height: 36px;
            }
            .mobile-controls .ctrl-btn {
                font-size: 12px;
                min-height: 24px;
            }
            .mobile-controls .ctrl-btn.fire-btn {
                font-size: 14px;
            }
        }
        /* Для планшетов и больших экранов в горизонтали (не телефоны) */
        @media (orientation: landscape) and (pointer: fine) {
            /* Оставляем стандартный вид для ПК */
        }
    </style>
</head>
<body>
    <div class="pda-container">
        <div class="pda-screen">
            <canvas id="gameCanvas" width="400" height="500"></canvas>
            <div id="shopOverlay" class="shop-overlay">
                <div class="shop-title">★ ОРУЖЕЙНЫЙ ★</div>
                <div class="shop-list" id="shopList"></div>
                <button class="shop-close-btn" id="shopCloseBtn">[ ЗАКРЫТЬ ]</button>
            </div>
        </div>
        <!-- Панель управления (скрывается в горизонтали) -->
        <div class="pda-controls" id="pdaControls">
            <div class="money" id="moneyDisplay">₽ 0</div>
            <div class="weapon-info">
                <span id="weaponName">ПМ</span>
                <span id="weaponDamage">💥 1</span>
                <span style="color:#88dd88; font-weight:bold;">∞</span>
            </div>
            <div style="display: flex; gap: 4px; flex-wrap: wrap;">
                <button class="pda-btn pda-btn-shop" id="shopBtn">🛒 МАГАЗИН</button>
                <button class="pda-btn pda-btn-restart" id="restartBtn">⟳ ЗАНОВО</button>
            </div>
        </div>
        <!-- Мобильные кнопки (всегда видны на телефонах) -->
        <div class="mobile-controls" id="mobileControls">
            <button class="ctrl-btn" id="mobLeft">◀</button>
            <button class="ctrl-btn" id="mobRight">▶</button>
            <button class="ctrl-btn jump-btn" id="mobJump">⬆</button>
            <button class="ctrl-btn fire-btn" id="mobFire">🔥</button>
            <button class="ctrl-btn shop-btn-mob" id="mobShop">🛒</button>
        </div>
        <div class="hint">
            W / ↑ — вперёд  ·  S / ↓ — назад  ·  A / D / ← → — поворот  ·  ПРОБЕЛ — прыжок/стрельба<br>
            🎯 Прицел — мышь / касание
        </div>
    </div>
    <script>
        // ===================================================================
        //  ИГРА: ZOMBIE USSR · ГОРИЗОНТАЛЬНАЯ ВЕРСИЯ ДЛЯ ТЕЛЕФОНОВ
        // ===================================================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 400,
            H = 500,
            GROUND_Y = 450;

        const moneyDisplay = document.getElementById('moneyDisplay');
        const weaponNameEl = document.getElementById('weaponName');
        const weaponDamageEl = document.getElementById('weaponDamage');
        const shopBtn = document.getElementById('shopBtn');
        const shopOverlay = document.getElementById('shopOverlay');
        const shopList = document.getElementById('shopList');
        const shopCloseBtn = document.getElementById('shopCloseBtn');
        const restartBtn = document.getElementById('restartBtn');
        const pdaControls = document.getElementById('pdaControls');

        let gameRunning = true,
            shopOpen = false,
            keys = {},
            frameCount = 0,
            gameTime = 0,
            timeCounter = 0,
            cameraX = 0;
        let aimX = 200,
            aimY = 200;

        const weapons = {
            pistol: { name: 'ПМ', damage: 1, fireRate: 12, bulletSpeed: 8, price: 0 },
            ak47: { name: 'АК-47', damage: 1, fireRate: 5, bulletSpeed: 9, price: 100 },
            saiga: { name: 'Сайга', damage: 2, fireRate: 18, bulletSpeed: 7, price: 150 },
            svd: { name: 'СВД', damage: 5, fireRate: 28, bulletSpeed: 14, price: 200 },
            ppsh: { name: 'ППШ', damage: 1, fireRate: 3, bulletSpeed: 9, price: 250 },
            mosin: { name: 'Мосина', damage: 4, fireRate: 35, bulletSpeed: 15, price: 300 },
            toz: { name: 'ТОЗ-34', damage: 6, fireRate: 40, bulletSpeed: 8, price: 350 }
        };
        const weaponKeys = ['pistol', 'ak47', 'saiga', 'svd', 'ppsh', 'mosin', 'toz'];

        class Player {
            constructor() {
                this.x = 200;
                this.y = GROUND_Y - 38;
                this.w = 28;
                this.h = 38;
                this.vx = 0;
                this.vy = 0;
                this.speed = 3.0;
                this.jumpPower = -7.2;
                this.onGround = false;
                this.facing = 1;
                this.weapon = 'pistol';
                this.money = 0;
                this.shootCooldown = 0;
                this.hp = 100;
                this.maxHp = 100;
            }
            getWeaponData() { return weapons[this.weapon]; }
            getDamage() { return this.getWeaponData().damage; }
            getFireRate() { return this.getWeaponData().fireRate; }
            getBulletSpeed() { return this.getWeaponData().bulletSpeed || 8; }
            canShoot() { return this.shootCooldown <= 0; }
            resetCooldown() { this.shootCooldown = this.getFireRate(); }

            update() {
                let moveForward = 0;
                if (keys['KeyW'] || keys['ArrowUp']) moveForward = 1;
                if (keys['KeyS'] || keys['ArrowDown']) moveForward = -1;

                if (keys['KeyA'] || keys['ArrowLeft']) this.facing = -1;
                if (keys['KeyD'] || keys['ArrowRight']) this.facing = 1;
                if (keys['KeyQ']) this.facing = -1;
                if (keys['KeyE']) this.facing = 1;

                this.vx = moveForward * this.speed * this.facing;

                if ((keys['Space'] || keys['KeyW'] || keys['ArrowUp']) && this.onGround) {
                    this.vy = this.jumpPower;
                    this.onGround = false;
                }
                this.vy += 0.35;
                if (this.vy > 10) this.vy = 10;
                this.x += this.vx;
                this.y += this.vy;
                if (this.y + this.h >= GROUND_Y) {
                    this.y = GROUND_Y - this.h;
                    this.vy = 0;
                    this.onGround = true;
                } else {
                    this.onGround = false;
                }
                if (this.shootCooldown > 0) this.shootCooldown--;
            }

            draw(offsetX) {
                const x = this.x - offsetX,
                    y = this.y,
                    w = this.w,
                    h = this.h;
                ctx.fillStyle = '#6a5a4a';
                ctx.fillRect(x, y, w, h);
                ctx.fillStyle = '#dbb07b';
                ctx.fillRect(x + 4, y - 6, w - 8, 10);
                ctx.fillStyle = '#222';
                if (this.facing === 1) {
                    ctx.fillRect(x + 14, y - 4, 4, 4);
                    ctx.fillRect(x + 20, y - 4, 4, 4);
                } else {
                    ctx.fillRect(x + 4, y - 4, 4, 4);
                    ctx.fillRect(x + 10, y - 4, 4, 4);
                }
                ctx.fillStyle = '#fff';
                if (this.facing === 1) {
                    ctx.fillRect(x + 16, y - 2, 2, 2);
                    ctx.fillRect(x + 22, y - 2, 2, 2);
                } else {
                    ctx.fillRect(x + 6, y - 2, 2, 2);
                    ctx.fillRect(x + 12, y - 2, 2, 2);
                }
                ctx.fillStyle = '#555';
                const gx = this.facing === 1 ? x + w : x - 8;
                ctx.fillRect(gx, y + 6, 8, 4);
                ctx.fillStyle = '#888';
                ctx.fillRect(gx + (this.facing === 1 ? 2 : -2), y + 12, 4, 3);
                ctx.fillStyle = '#ffd700';
                ctx.font = '12px "Courier New"';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('★', x + w / 2, y + 18);
            }

            shoot(bullets) {
                if (!this.canShoot()) return;
                const wData = this.getWeaponData();
                const bSpeed = this.getBulletSpeed();
                const damage = this.getDamage();
                const cx = this.x + this.w / 2;
                const cy = this.y + 10;

                let dx = aimX - cx,
                    dy = aimY - cy;
                const len = Math.hypot(dx, dy);
                if (len < 0.001) { dx = this.facing;
                    dy = 0; } else { dx /= len;
                    dy /= len; }

                const isShotgun = (this.weapon === 'saiga' || this.weapon === 'toz');
                const pellets = isShotgun ? (this.weapon === 'toz' ? 8 : 5) : 1;
                for (let i = 0; i < pellets; i++) {
                    let sx = 0,
                        sy = 0;
                    if (isShotgun) {
                        const a = (Math.random() - 0.5) * 0.5;
                        sx = Math.sin(a) * 0.3;
                        sy = Math.cos(a) * 0.3;
                    }
                    bullets.push(new Bullet(cx, cy, (dx + sx) * bSpeed, (dy + sy) * bSpeed, damage, 3));
                }
                this.resetCooldown();
            }
        }

        class Bullet {
            constructor(x, y, vx, vy, damage, size = 3) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.damage = damage;
                this.active = true;
                this.radius = size;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < -100 || this.x > 999999 || this.y < -100 || this.y > H + 100) this.active = false;
            }
            draw(offsetX) {
                const x = this.x - offsetX;
                if (x < -20 || x > W + 20) return;
                ctx.fillStyle = '#ffdd44';
                ctx.shadowColor = '#ffaa00';
                ctx.shadowBlur = 8;
                ctx.beginPath();
                ctx.arc(x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        class Zombie {
            constructor(x) {
                this.x = x || 0;
                this.y = GROUND_Y - 38;
                this.w = 28;
                this.h = 38;
                this.speed = 0.6 + Math.random() * 0.4;
                this.hp = 1.5;
                this.maxHp = 1.5;
                this.active = true;
                this.damageCooldown = 0;
                this.hitFlash = 0;
                this.type = Math.random() > 0.7 ? 'буржуй' : 'зомби';
            }
            update(player) {
                if (!this.active) return;
                const dx = player.x - this.x,
                    dy = player.y - this.y,
                    dist = Math.hypot(dx, dy);
                if (dist > 10) {
                    const move = Math.min(this.speed, dist);
                    this.x += (dx / dist) * move;
                    this.y += (dy / dist) * move * 0.2;
                }
                if (this.y + this.h > GROUND_Y) this.y = GROUND_Y - this.h;
                if (this.y < 200) this.y = 200;
                if (this.x < -200 || this.x > 999999) this.active = false;
                if (this.damageCooldown > 0) this.damageCooldown--;
                if (this.hitFlash > 0) this.hitFlash--;
            }
            takeDamage(dmg) {
                this.hp -= dmg;
                this.hitFlash = 6;
                if (this.hp <= 0) { this.active = false; return true; }
                return false;
            }
            draw(offsetX) {
                if (!this.active) return;
                const x = this.x - offsetX;
                if (x < -50 || x > W + 50) return;
                const y = this.y,
                    w = this.w,
                    h = this.h;
                ctx.fillStyle = this.hitFlash > 0 ? '#ff8888' : '#4a6a3a';
                ctx.fillRect(x, y, w, h);
                ctx.fillStyle = this.hitFlash > 0 ? '#cc7777' : '#5a7a4a';
                ctx.fillRect(x + 4, y - 6, w - 8, 10);
                ctx.fillStyle = '#cc2222';
                ctx.fillRect(x + 4, y - 2, 6, 4);
                ctx.fillRect(x + w - 10, y - 2, 6, 4);
                ctx.fillStyle = '#000';
                ctx.fillRect(x + 6, y, 2, 2);
                ctx.fillRect(x + w - 8, y, 2, 2);
                ctx.fillStyle = '#4a6a3a';
                ctx.fillRect(x - 4, y + 6, 4, 8);
                ctx.fillRect(x + w, y + 6, 4, 8);
                ctx.fillStyle = '#ffd700';
                ctx.font = '8px "Courier New"';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillText(this.type === 'буржуй' ? '₽' : '☠', x + w / 2, y - 8);
                if (this.hp < this.maxHp) {
                    ctx.fillStyle = '#400';
                    ctx.fillRect(x, y - 12, w, 4);
                    ctx.fillStyle = '#f44';
                    ctx.fillRect(x, y - 12, w * (this.hp / this.maxHp), 4);
                }
            }
        }

        class Boss {
            constructor(x, y) {
                this.x = x;
                this.y = y - 60;
                this.w = 50;
                this.h = 60;
                this.speed = 0.8;
                this.hp = 20;
                this.maxHp = 20;
                this.active = true;
                this.damageCooldown = 0;
                this.hitFlash = 0;
            }
            update(player) {
                if (!this.active) return;
                const dx = player.x - this.x,
                    dy = player.y - this.y,
                    dist = Math.hypot(dx, dy);
                if (dist > 10) {
                    const move = Math.min(this.speed, dist);
                    this.x += (dx / dist) * move;
                    this.y += (dy / dist) * move * 0.2;
                }
                if (this.y + this.h > GROUND_Y) this.y = GROUND_Y - this.h;
                if (this.y < 200) this.y = 200;
                if (this.x < -200 || this.x > 999999) this.active = false;
                if (this.damageCooldown > 0) this.damageCooldown--;
                if (this.hitFlash > 0) this.hitFlash--;
            }
            takeDamage(dmg) {
                this.hp -= dmg;
                this.hitFlash = 8;
                if (this.hp <= 0) { this.active = false; return true; }
                return false;
            }
            draw(offsetX) {
                if (!this.active) return;
                const x = this.x - offsetX;
                if (x < -60 || x > W + 60) return;
                const y = this.y,
                    w = this.w,
                    h = this.h;
                ctx.fillStyle = this.hitFlash > 0 ? '#ff4444' : '#6a2a2a';
                ctx.fillRect(x, y, w, h);
                ctx.fillStyle = this.hitFlash > 0 ? '#cc3333' : '#8a3a3a';
                ctx.fillRect(x + 6, y - 10, w - 12, 12);
                ctx.fillStyle = '#ff2222';
                ctx.fillRect(x + 10, y - 6, 6, 6);
                ctx.fillRect(x + w - 16, y - 6, 6, 6);
                ctx.fillStyle = '#000';
                ctx.fillRect(x + 12, y - 4, 2, 2);
                ctx.fillRect(x + w - 14, y - 4, 2, 2);
                ctx.fillStyle = '#8a4a4a';
                ctx.fillRect(x - 6, y + 10, 6, 12);
                ctx.fillRect(x + w, y + 10, 6, 12);
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 16px "Courier New"';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillText('БОСС', x + w / 2, y - 12);
                ctx.fillStyle = '#400';
                ctx.fillRect(x, y - 20, w, 6);
                ctx.fillStyle = '#f44';
                ctx.fillRect(x, y - 20, w * (this.hp / this.maxHp), 6);
            }
        }

        class Coin {
            constructor(x, y, value = 1) {
                this.x = x;
                this.y = y;
                this.value = value;
                this.radius = 10;
                this.active = true;
                this.vy = -2.5;
                this.gravity = 0.15;
                this.bob = 0;
            }
            update() {
                this.vy += this.gravity;
                this.y += this.vy;
                if (this.y + this.radius > GROUND_Y) { this.y = GROUND_Y - this.radius;
                    this.vy = 0; }
                this.bob += 0.06;
                this.x += Math.sin(this.bob) * 0.15;
            }
            draw(offsetX) {
                if (!this.active) return;
                const x = this.x - offsetX;
                if (x < -20 || x > W + 20) return;
                ctx.shadowColor = '#ffcc44';
                ctx.shadowBlur = 14;
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.arc(x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#b8860b';
                ctx.font = 'bold 11px "Courier New"';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('₽' + this.value, x, this.y + 1);
                ctx.fillStyle = 'rgba(255,255,220,0.4)';
                ctx.beginPath();
                ctx.arc(x - 3, this.y - 4, 3, 0, Math.PI * 2);
                ctx.fill();
            }
            collect(player) {
                const dx = this.x - (player.x + player.w / 2);
                const dy = this.y - (player.y + player.h / 2);
                return Math.hypot(dx, dy) < 30;
            }
        }

        class Building {
            constructor(x, y, w, h) {
                this.x = x;
                this.y = y;
                this.w = w;
                this.h = h;
                this.color = `hsl(${Math.random() * 60 + 20}, 20%, ${20 + Math.random() * 20}%)`;
                this.windows = [];
                for (let row = 0; row < Math.floor(h / 20); row++) {
                    for (let col = 0; col < Math.floor(w / 20); col++) {
                        if (Math.random() > 0.4) {
                            this.windows.push({ x: col * 20 + 4, y: row * 20 + 4, lit: Math.random() > 0.3 });
                        }
                    }
                }
            }
            draw(offsetX) {
                const x = this.x - offsetX;
                if (x + this.w < -10 || x > W + 10) return;
                ctx.fillStyle = this.color;
                ctx.fillRect(x, this.y, this.w, this.h);
                ctx.strokeStyle = '#3a2a1a';
                ctx.lineWidth = 1;
                ctx.strokeRect(x, this.y, this.w, this.h);
                for (const win of this.windows) {
                    const wx = x + win.x,
                        wy = this.y + win.y;
                    ctx.fillStyle = win.lit ? '#ffd700' : '#1a2a3a';
                    ctx.fillRect(wx, wy, 12, 12);
                    ctx.strokeStyle = '#2a1a0a';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(wx, wy, 12, 12);
                }
            }
        }

        let player, bullets, zombies, coins, buildings, boss;
        let spawnTimer, spawnInterval, wave, kills, bossSpawned, bossDefeated;
        let gameOver;

        function initGame() {
            player = new Player();
            bullets = [];
            zombies = [];
            coins = [];
            buildings = [];
            boss = null;
            spawnTimer = 0;
            spawnInterval = 120;
            wave = 1;
            kills = 0;
            bossSpawned = false;
            bossDefeated = false;
            gameOver = false;
            gameRunning = true;
            gameTime = 0;
            timeCounter = 0;
            player.money = 30;
            cameraX = 0;
            aimX = player.x + 100;
            aimY = player.y;
            for (let i = 0; i < 200; i++) {
                const x = (Math.random() - 0.5) * 8000;
                const w = 30 + Math.random() * 70;
                const h = 40 + Math.random() * 80;
                const y = GROUND_Y - h;
                buildings.push(new Building(x, y, w, h));
            }
            buildings.sort((a, b) => a.x - b.x);
            updateUI();
        }

        function spawnZombie() {
            if (zombies.length < 15 + wave * 2) {
                let x = player.x + (Math.random() - 0.5) * 800;
                x = Math.min(Math.max(x, player.x - 600), player.x + 600);
                zombies.push(new Zombie(x));
            }
        }

        function spawnBoss() {
            if (bossSpawned || bossDefeated) return;
            const x = player.x + (Math.random() > 0.5 ? 300 : -300);
            boss = new Boss(x, GROUND_Y);
            bossSpawned = true;
        }

        function dropMoney(x, y) { coins.push(new Coin(x, y, 20)); }

        function updateUI() {
            moneyDisplay.textContent = '₽ ' + player.money;
            const wd = player.getWeaponData();
            weaponNameEl.textContent = wd.name;
            weaponDamageEl.textContent = '💥 ' + wd.damage;
        }

        function openShop() {
            if (gameOver) return;
            shopOpen = true;
            shopOverlay.classList.add('open');
            renderShop();
        }

        function closeShop() {
            shopOpen = false;
            shopOverlay.classList.remove('open');
        }

        function renderShop() {
            shopList.innerHTML = '';
            weaponKeys.forEach(key => {
                const w = weapons[key];
                const owned = player.weapon === key;
                const canBuy = player.money >= w.price && !owned;
                const div = document.createElement('div');
                div.className = 'shop-item';
                div.innerHTML = `
                    <span class="name">${owned ? '✅ ' : ''}${w.name}</span>
                    <span class="price">₽ ${w.price}</span>
                    <button class="buy-btn" data-key="${key}" ${!canBuy ? 'disabled' : ''}>
                        ${owned ? 'В ЭКИП.' : 'КУПИТЬ'}
                    </button>
                `;
                shopList.appendChild(div);
            });
            document.querySelectorAll('.shop-item .buy-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const key = btn.dataset.key;
                    const w = weapons[key];
                    if (player.money >= w.price && player.weapon !== key) {
                        player.money -= w.price;
                        player.weapon = key;
                        updateUI();
                        renderShop();
                    }
                });
            });
        }

        function restartGame() {
            if (shopOpen) closeShop();
            initGame();
        }

        function updateAimFromMouse(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            aimX = (e.clientX - rect.left) * scaleX + cameraX;
            aimY = (e.clientY - rect.top) * scaleY;
        }

        function updateAimFromTouch(e) {
            e.preventDefault();
            const touch = e.touches[0];
            if (!touch) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            aimX = (touch.clientX - rect.left) * scaleX + cameraX;
            aimY = (touch.clientY - rect.top) * scaleY;
        }

        // Пересчёт при изменении размера окна (ориентация)
        window.addEventListener('resize', () => {
            // Можно обновить координаты прицела, если нужно
        });

        function handleCollisions() {
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                if (!b.active) continue;
                for (let j = zombies.length - 1; j >= 0; j--) {
                    const z = zombies[j];
                    if (!z.active) continue;
                    if (b.x > z.x && b.x < z.x + z.w && b.y > z.y && b.y < z.y + z.h) {
                        b.active = false;
                        if (z.takeDamage(b.damage)) {
                            dropMoney(z.x + z.w / 2, z.y + z.h / 2);
                            kills++;
                            if (kills % 10 === 0) wave++;
                            if (kills >= 25 && !bossSpawned && !bossDefeated) spawnBoss();
                        }
                        break;
                    }
                }
                if (b.active && boss && boss.active) {
                    if (b.x > boss.x && b.x < boss.x + boss.w && b.y > boss.y && b.y < boss.y + boss.h) {
                        b.active = false;
                        if (boss.takeDamage(b.damage)) {
                            bossDefeated = true;
                            boss.active = false;
                            for (let k = 0; k < 10; k++) dropMoney(boss.x + Math.random() * boss.w, boss.y + Math.random() *
                                boss.h);
                        }
                    }
                }
            }
            for (let i = coins.length - 1; i >= 0; i--) {
                const c = coins[i];
                if (!c.active) continue;
                if (c.collect(player)) {
                    c.active = false;
                    player.money += c.value;
                    updateUI();
                }
            }
            for (let j = zombies.length - 1; j >= 0; j--) {
                const z = zombies[j];
                if (!z.active) continue;
                if (z.x < player.x + player.w && z.x + z.w > player.x && z.y < player.y + player.h && z.y + z.h > player.y) {
                    if (z.damageCooldown <= 0) {
                        player.hp -= 8;
                        z.damageCooldown = 30;
                        if (player.hp <= 0) { player.hp = 0;
                            gameOver = true;
                            gameRunning = false;
                            updateUI(); }
                    }
                }
            }
            if (boss && boss.active) {
                if (boss.x < player.x + player.w && boss.x + boss.w > player.x && boss.y < player.y + player.h && boss.y + boss
                    .h > player.y) {
                    if (boss.damageCooldown <= 0) {
                        player.hp -= 15;
                        boss.damageCooldown = 40;
                        if (player.hp <= 0) { player.hp = 0;
                            gameOver = true;
                            gameRunning = false;
                            updateUI(); }
                    }
                }
            }
        }

        function update() {
            if (gameOver || shopOpen) return;
            frameCount++;
            timeCounter++;
            if (timeCounter >= 60) { timeCounter = 0;
                gameTime++; }
            spawnTimer++;
            const interval = Math.max(80, spawnInterval - wave * 2);
            if (spawnTimer >= interval) {
                spawnTimer = 0;
                spawnZombie();
                if (wave > 5 && Math.random() < 0.2) spawnZombie();
            }
            player.update();
            if (keys['Space'] || keys['KeyF'] || keys['Mouse0'] || keys['Fire']) {
                if (player.canShoot()) player.shoot(bullets);
            }
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].update();
                if (!bullets[i].active) bullets.splice(i, 1);
            }
            for (let i = zombies.length - 1; i >= 0; i--) {
                zombies[i].update(player);
                if (!zombies[i].active) zombies.splice(i, 1);
            }
            if (boss && boss.active) {
                boss.update(player);
                if (!boss.active) bossDefeated = true;
            }
            for (let i = coins.length - 1; i >= 0; i--) {
                coins[i].update();
                if (!coins[i].active) coins.splice(i, 1);
            }
            handleCollisions();
            cameraX = player.x - W / 2;
            if (bullets.length > 150) bullets.splice(0, bullets.length - 150);
            if (coins.length > 80) coins.splice(0, coins.length - 80);
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, '#3a1a1a');
            grad.addColorStop(0.5, '#2a1010');
            grad.addColorStop(1, '#1a0a0a');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = 'rgba(255, 215, 0, 0.06)';
            for (let i = 0; i < 20; i++) {
                const sx = (i * 37 + 13) % W,
                    sy = (i * 53 + 7) % 200;
                ctx.font = '16px "Courier New"';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('★', sx, sy);
            }
            ctx.fillStyle = '#2a1a1a';
            ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
            ctx.fillStyle = '#b8860b';
            ctx.fillRect(0, GROUND_Y, W, 2);
            ctx.strokeStyle = '#6a4a2a';
            ctx.lineWidth = 1;
            for (let i = 0; i < W; i += 15) { ctx.beginPath();
                ctx.arc(i, GROUND_Y + 5, 4, 0, Math.PI);
                ctx.stroke(); }

            for (const b of buildings) b.draw(cameraX);
            for (const c of coins) c.draw(cameraX);
            for (const z of zombies) z.draw(cameraX);
            if (boss && boss.active) boss.draw(cameraX);
            for (const b of bullets) b.draw(cameraX);
            player.draw(cameraX);

            // Прицел
            const ax = aimX - cameraX,
                ay = aimY;
            if (ax >= 0 && ax <= W && ay >= 0 && ay <= H) {
                ctx.strokeStyle = '#ff3333';
                ctx.lineWidth = 2;
                const s = 8;
                ctx.beginPath();
                ctx.moveTo(ax - s, ay);
                ctx.lineTo(ax + s, ay);
                ctx.moveTo(ax, ay - s);
                ctx.lineTo(ax, ay + s);
                ctx.stroke();
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath();
                ctx.arc(ax, ay, s * 1.5, 0, Math.PI * 2);
                ctx.stroke();
            }

            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillStyle = '#400';
            ctx.fillRect(10, 10, 80, 12);
            ctx.fillStyle = '#f44';
            ctx.fillRect(10, 10, 80 * (player.hp / player.maxHp), 12);
            ctx.strokeStyle = '#b8860b';
            ctx.lineWidth = 1;
            ctx.strokeRect(10, 10, 80, 12);
            ctx.fillStyle = '#ffd700';
            ctx.font = '10px "Courier New"';
            ctx.fillText('ЗДОРОВЬЕ', 14, 12);
            ctx.fillStyle = '#d4b48c';
            ctx.font = '12px "Courier New"';
            ctx.fillText('⏱ ' + gameTime + 'с', 10, 28);
            ctx.fillText('☠ ' + zombies.length + (boss && boss.active ? ' + БОСС' : ''), 10, 44);
            ctx.fillStyle = '#ffd700';
            ctx.fillText('₽ ' + player.money, 10, 60);
            ctx.fillStyle = '#ffd700';
            ctx.textAlign = 'right';
            ctx.fillText('ВОЛНА ' + wave, W - 10, 10);
            ctx.fillStyle = '#b0a080';
            ctx.fillText('УБИЙ: ' + kills, W - 10, 28);
            ctx.textAlign = 'right';
            ctx.fillStyle = '#d4b48c';
            const wd = player.getWeaponData();
            ctx.fillText(wd.name + ' | 💥' + wd.damage + ' | ∞', W - 10, 46);

            if (!bossSpawned && !bossDefeated) {
                ctx.fillStyle = 'rgba(255,215,0,0.3)';
                ctx.fillRect(10, 78, 100, 6);
                const progress = Math.min(kills / 25, 1);
                ctx.fillStyle = '#ffd700';
                ctx.fillRect(10, 78, 100 * progress, 6);
                ctx.fillStyle = '#d4b48c';
                ctx.font = '8px "Courier New"';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                ctx.fillText('БОСС: ' + kills + '/25', 10, 86);
            } else if (bossDefeated) {
                ctx.fillStyle = '#88dd88';
                ctx.font = '10px "Courier New"';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                ctx.fillText('★ БОСС ПОВЕРЖЕН ★', 10, 78);
            }
            ctx.fillStyle = 'rgba(255, 215, 0, 0.08)';
            ctx.font = 'bold 14px "Courier New"';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillText('☭ СССР ☭', W / 2, GROUND_Y - 6);
            if (gameOver) {
                ctx.fillStyle = 'rgba(20,0,0,0.8)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#ff4444';
                ctx.font = 'bold 36px "Courier New"';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('ПОРАЖЕНИЕ', W / 2, H / 2 - 20);
                ctx.fillStyle = '#ffd700';
                ctx.font = '18px "Courier New"';
                ctx.fillText('Нажмите ⟳ ЗАНОВО', W / 2, H / 2 + 40);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // ---------- УПРАВЛЕНИЕ ----------
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space') e.preventDefault();
            if (e.code === 'KeyM') {
                if (!gameOver) {
                    if (shopOpen) closeShop();
                    else openShop();
                }
            }
            if (e.code === 'Escape') { if (shopOpen) closeShop(); }
        });
        document.addEventListener('keyup', (e) => { keys[e.code] = false; });

        canvas.addEventListener('mousemove', updateAimFromMouse);
        canvas.addEventListener('mousedown', (e) => { e.preventDefault();
            keys['Mouse0'] = true;
            updateAimFromMouse(e); });
        canvas.addEventListener('mouseup', () => { keys['Mouse0'] = false; });
        canvas.addEventListener('mouseleave', () => { keys['Mouse0'] = false; });
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());

        canvas.addEventListener('touchstart', (e) => { e.preventDefault();
            updateAimFromTouch(e);
            keys['Fire'] = true; }, { passive: false });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault();
            updateAimFromTouch(e); }, { passive: false });
        canvas.addEventListener('touchend', (e) => { e.preventDefault();
            keys['Fire'] = false; }, { passive: false });

        function setupMobileButton(id, keyOn, keyOff) {
            const el = document.getElementById(id);
            if (!el) return;
            el.addEventListener('touchstart', (e) => { e.preventDefault();
                keys[keyOn] = true; }, { passive: false });
            el.addEventListener('touchend', (e) => { e.preventDefault();
                keys[keyOn] = false; if (keyOff) keys[keyOff] = false; }, { passive: false });
            el.addEventListener('touchcancel', () => { keys[keyOn] = false; if (keyOff) keys[keyOff] = false; });
            el.addEventListener('mousedown', (e) => { e.preventDefault();
                keys[keyOn] = true; });
            el.addEventListener('mouseup', (e) => { e.preventDefault();
                keys[keyOn] = false; if (keyOff) keys[keyOff] = false; });
            el.addEventListener('mouseleave', () => { keys[keyOn] = false; if (keyOff) keys[keyOff] = false; });
        }
        setupMobileButton('mobLeft', 'ArrowLeft');
        setupMobileButton('mobRight', 'ArrowRight');
        setupMobileButton('mobJump', 'Space');
        setupMobileButton('mobFire', 'Fire');
        document.getElementById('mobShop').addEventListener('touchstart', (e) => { e.preventDefault(); if (!gameOver) { if (
                    shopOpen) closeShop();
                else openShop(); } });
        document.getElementById('mobShop').addEventListener('mousedown', (e) => { e.preventDefault(); if (!gameOver) { if (
                    shopOpen) closeShop();
                else openShop(); } });

        shopBtn.addEventListener('click', () => { if (gameOver) return; if (shopOpen) closeShop();
            else openShop(); });
        shopCloseBtn.addEventListener('click', closeShop);
        restartBtn.addEventListener('click', restartGame);

        // ---------- СТАРТ ----------
        initGame();
        gameLoop();
    </script>
</body>
</html>
