            // ─── ПАУЗА ──────────────────────────────────────────────────
            function togglePause() {
                if (state.gameOver) return;
                state.paused = !state.paused;
                pauseOverlay.classList.toggle('active', state.paused);
                if (state.paused) {
                    pauseTime.textContent = timeDisplay.textContent;
                }
            }

            function resumeGame() {
                if (state.paused) {
                    state.paused = false;
                    pauseOverlay.classList.remove('active');
                }
            }

            // ─── ОБНОВЛЕНИЕ ──────────────────────────────────────────
            function update() {
                if (state.gameOver || state.paused) return;

                state.frame++;
                if (state.frame % 60 === 0) {
                    state.timeSeconds++;
                    updateHUD();
                }

                const p = state.player;
                const def = getPlayerTankDef();

                p.speed = def.speed;
                p.fireRate = def.fireRate;
                p.damage = def.damage;
                p.bulletSpeed = def.bulletSpeed;
                if (p.health > p.maxHealth) p.health = p.maxHealth;

                if (p.invincible > 0) p.invincible--;
                if (p.fireCooldown > 0) p.fireCooldown--;

                let dx = 0,
                    dy = 0;
                if (keys.left) dx = -p.speed;
                if (keys.right) dx = p.speed;
                if (keys.up) dy = -p.speed * 0.7;
                if (keys.down) dy = p.speed * 0.7;

                if (dx !== 0) p.trackOffset += 0.3;
                p.x = clamp(p.x + dx, 10, GAME_W - p.w - 10);
                p.y = clamp(p.y + dy, 30, GAME_H - p.h - 10);

                if (keys.barrelUp) {
                    p.barrelAngle = Math.max(-0.6, p.barrelAngle - 0.04);
                }
                if (keys.barrelDown) {
                    p.barrelAngle = Math.min(0.6, p.barrelAngle + 0.04);
                }

                if (keys.fire) playerShoot();

                // ── Пули игрока ──
                for (let i = state.bullets.length - 1; i >= 0; i--) {
                    const b = state.bullets[i];
                    b.x += b.vx;
                    b.y += b.vy;
                    b.trail.push({ x: b.x, y: b.y });
                    if (b.trail.length > 6) b.trail.shift();
                    if (b.x > GAME_W + 20 || b.x < -20 || b.y < -20 || b.y > GAME_H + 20) {
                        state.bullets.splice(i, 1);
                        continue;
                    }

                    let hit = false;
                    for (const enemy of state.enemies) {
                        if (!enemy.alive) continue;
                        if (b.x < enemy.x + enemy.w && b.x + b.w > enemy.x &&
                            b.y < enemy.y + enemy.h && b.y + b.h > enemy.y) {
                            enemy.health -= b.damage;
                            enemy.hitFlash = 8;
                            createExplosion(b.x, b.y, 0.3, '#ffaa44');
                            if (enemy.health <= 0) {
                                destroyEnemy(enemy);
                            }
                            hit = true;
                            break;
                        }
                    }
                    if (!hit && state.boss && state.boss.alive) {
                        const boss = state.boss;
                        if (b.x < boss.x + boss.w && b.x + b.w > boss.x &&
                            b.y < boss.y + boss.h && b.y + b.h > boss.y) {
                            boss.health -= b.damage;
                            boss.hitFlash = 8;
                            createExplosion(b.x, b.y, 0.5, '#ff8844');
                            if (boss.health <= 0) {
                                destroyBoss();
                            }
                            hit = true;
                            updateHUD();
                        }
                    }
                    if (hit) {
                        state.bullets.splice(i, 1);
                    }
                }

                // ── Пули врагов и босса ──
                for (let i = state.enemyBullets.length - 1; i >= 0; i--) {
                    const b = state.enemyBullets[i];
                    b.x += b.vx;
                    b.y += b.vy;
                    b.trail.push({ x: b.x, y: b.y });
                    if (b.trail.length > 5) b.trail.shift();
                    if (b.x < -20 || b.x > GAME_W + 20 || b.y < -20 || b.y > GAME_H + 20) {
                        state.enemyBullets.splice(i, 1);
                        continue;
                    }

                    if (p.alive && p.invincible === 0) {
                        if (b.x < p.x + p.w && b.x + b.w > p.x &&
                            b.y < p.y + p.h && b.y + b.h > p.y) {
                            p.health -= b.damage;
                            p.invincible = 30;
                            createExplosion(b.x, b.y, 0.5, '#ff5533');
                            state.enemyBullets.splice(i, 1);
                            updateHUD();
                            if (p.health <= 0) {
                                p.alive = false;
                                createExplosion(p.x + p.w / 2, p.y + p.h / 2, 1.8, '#ff6644');
                                state.gameOver = true;
                                finalScore.textContent = state.score;
                                gameoverOverlay.classList.add('active');
                            }
                            continue;
                        }
                    }
                }

                // ── Враги ──
                for (let i = state.enemies.length - 1; i >= 0; i--) {
                    const enemy = state.enemies[i];
                    if (!enemy.alive) {
                        state.enemies.splice(i, 1);
                        continue;
                    }

                    if (enemy.hitFlash > 0) enemy.hitFlash--;

                    const targetY = state.player.y + state.player.h / 2 - enemy.h / 2;
                    const dy2 = targetY - enemy.y;
                    const moveSpeed = enemy.speed * 0.35;
                    if (Math.abs(dy2) > 6) {
                        enemy.y += Math.sign(dy2) * Math.min(Math.abs(dy2) * 0.025, moveSpeed);
                    }
                    enemy.y = clamp(enemy.y, 30, GAME_H - enemy.h - 10);

                    enemy.x -= enemy.speed * 0.25;

                    if (enemy.x < -60) {
                        state.enemies.splice(i, 1);
                        continue;
                    }

                    if (enemy.fireCooldown > 0) enemy.fireCooldown--;
                    if (Math.random() < 0.18) enemyShoot(enemy);

                    if (p.alive && p.invincible === 0) {
                        if (enemy.x < p.x + p.w && enemy.x + enemy.w > p.x &&
                            enemy.y < p.y + p.h && enemy.y + enemy.h > p.y) {
                            p.health -= 1;
                            p.invincible = 40;
                            createExplosion(enemy.x + enemy.w / 2, enemy.y + enemy.h / 2, 0.6, '#ff6644');
                            enemy.x += 30;
                            updateHUD();
                            if (p.health <= 0) {
                                p.alive = false;
                                createExplosion(p.x + p.w / 2, p.y + p.h / 2, 1.8, '#ff6644');
                                state.gameOver = true;
                                finalScore.textContent = state.score;
                                gameoverOverlay.classList.add('active');
                            }
                        }
                    }

                    enemy.trackOffset += 0.12;
                }

                // ── Босс ──
                if (state.boss && state.boss.alive) {
                    const boss = state.boss;
                    if (boss.hitFlash > 0) boss.hitFlash--;

                    const targetY = state.player.y + state.player.h / 2 - boss.h / 2;
                    const dyBoss = targetY - boss.y;
                    const moveSpeedBoss = boss.speed * 0.5;
                    if (Math.abs(dyBoss) > 5) {
                        boss.y += Math.sign(dyBoss) * Math.min(Math.abs(dyBoss) * 0.02, moveSpeedBoss);
                    }
                    boss.y = clamp(boss.y, 30, GAME_H - boss.h - 10);
                    boss.x -= boss.speed * 0.2;

                    if (boss.fireCooldown > 0) boss.fireCooldown--;
                    bossShoot();

                    if (p.alive && p.invincible === 0) {
                        if (boss.x < p.x + p.w && boss.x + boss.w > p.x &&
                            boss.y < p.y + p.h && boss.y + boss.h > p.y) {
                            p.health -= 1;
                            p.invincible = 40;
                            createExplosion(boss.x + boss.w / 2, boss.y + boss.h / 2, 0.8, '#ff6644');
                            boss.x += 20;
                            updateHUD();
                            if (p.health <= 0) {
                                p.alive = false;
                                createExplosion(p.x + p.w / 2, p.y + p.h / 2, 1.8, '#ff6644');
                                state.gameOver = true;
                                finalScore.textContent = state.score;
                                gameoverOverlay.classList.add('active');
                            }
                        }
                    }

                    boss.trackOffset += 0.1;
                }

                // ── Спавн врагов ──
                state.spawnTimer++;
                if (state.spawnTimer >= state.spawnInterval) {
                    state.spawnTimer = 0;
                    spawnEnemy();
                    if (state.level > 8 && Math.random() < 0.05) spawnEnemy();
                }

                // ── Взрывы ──
                for (let i = state.explosions.length - 1; i >= 0; i--) {
                    const e = state.explosions[i];
                    e.x += e.vx || 0;
                    e.y += e.vy || 0;
                    if (e.gravity) e.vy += e.gravity;
                    e.life--;
                    if (e.life <= 0) {
                        state.explosions.splice(i, 1);
                    }
                }

                // ── Монеты ──
                for (let i = state.coins.length - 1; i >= 0; i--) {
                    const coin = state.coins[i];
                    if (coin.collected) {
                        state.coins.splice(i, 1);
                        continue;
                    }
                    coin.y += coin.vy;
                    coin.vy += 0.04;
                    if (coin.vy > 1.2) coin.vy = 1.2;
                    coin.bob += 0.05;
                    if (p.alive) {
                        if (coin.x < p.x + p.w && coin.x + coin.w > p.x &&
                            coin.y < p.y + p.h && coin.y + coin.h > p.y) {
                            state.money += coin.value;
                            createExplosion(coin.x + 6, coin.y + 6, 0.6, '#ffdd44');
                            coin.collected = true;
                            updateHUD();
                            continue;
                        }
                    }
                    coin.life--;
                    if (coin.life <= 0) {
                        state.coins.splice(i, 1);
                    }
                }

                updateHUD();
            }

            // ─── ОТРИСОВКА ТАНКА ───────────────────────────────────────
            function drawTank(ctx, x, y, w, h, color, turretColor, trackColor, trackOffset, facing, flash, barrelAngle,
                star) {
                const f = facing || 1;
                ctx.save();

                const bodyColor = flash ? '#ffffff' : color;
                const bodyW = w;
                const bodyH = h * 0.55;
                const bodyX = x;
                const bodyY = y + h * 0.25;

                ctx.shadowColor = 'rgba(0,0,0,0.4)';
                ctx.shadowBlur = 8;
                ctx.shadowOffsetY = 2;

                ctx.fillStyle = bodyColor;
                ctx.strokeStyle = '#1a1a1a';
                ctx.lineWidth = 1.2;
                ctx.beginPath();
                ctx.roundRect(bodyX, bodyY, bodyW, bodyH, 5);
                ctx.fill();
                ctx.stroke();

                const trackY = y + h * 0.7;
                const trackH = h * 0.3;
                ctx.shadowBlur = 0;
                ctx.fillStyle = trackColor || '#3a3a2a';
                ctx.fillRect(x + 2, trackY, w - 4, trackH);
                const wheelCount = Math.max(4, Math.floor(w / 10));
                const wheelSpacing = (w - 8) / (wheelCount + 0.5);
                for (let i = 0; i < wheelCount; i++) {
                    const wx = x + 4 + i * wheelSpacing + wheelSpacing * 0.3;
                    const wy = trackY + trackH / 2;
                    ctx.beginPath();
                    ctx.arc(wx, wy, trackH * 0.4, 0, Math.PI * 2);
                    ctx.fillStyle = '#2a2a1a';
                    ctx.fill();
                    ctx.strokeStyle = '#1a1a1a';
                    ctx.lineWidth = 0.8;
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(wx, wy, trackH * 0.15, 0, Math.PI * 2);
                    ctx.fillStyle = '#4a4a3a';
                    ctx.fill();
                }
                for (let i = 0; i < 10; i++) {
                    const tx = x + 4 + (i / 10) * (w - 8) + (trackOffset % 10) * 0.5;
                    ctx.beginPath();
                    ctx.moveTo(tx, trackY + 2);
                    ctx.lineTo(tx + 4, trackY + trackH - 2);
                    ctx.strokeStyle = '#2a2a1a';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }

                const turretW = w * 0.4;
                const turretH = h * 0.45;
                const turretX = x + w * 0.4;
                const turretY = y + h * 0.1;

                ctx.shadowBlur = 6;
                ctx.shadowOffsetY = 1;
                ctx.fillStyle = turretColor || color;
                ctx.strokeStyle = '#1a1a1a';
                ctx.lineWidth = 1.2;
                ctx.beginPath();
                ctx.roundRect(turretX, turretY, turretW, turretH, 6);
                ctx.fill();
                ctx.stroke();

                ctx.shadowBlur = 4;
                const barrelLen = w * 0.55;
                const barrelW = 4;
                const barrelX = (f > 0) ? turretX + turretW : turretX - barrelLen;
                const barrelY = turretY + turretH / 2 - barrelW / 2;

                ctx.save();
                ctx.translate(barrelX + (f > 0 ? 0 : barrelLen), barrelY + barrelW / 2);
                ctx.rotate(barrelAngle || 0);
                ctx.fillStyle = '#2a2a2a';
                ctx.strokeStyle = '#1a1a1a';
                ctx.lineWidth = 1.2;
                ctx.fillRect(0, -barrelW / 2, barrelLen, barrelW);
                ctx.strokeRect(0, -barrelW / 2, barrelLen, barrelW);
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(barrelLen - 6, -barrelW / 2 - 1, 6, barrelW + 2);
                ctx.restore();

                if (star) {
                    ctx.shadowBlur = 0;
                    const sx = turretX + turretW / 2;
                    const sy = turretY + turretH / 2;
                    ctx.fillStyle = '#cc2222';
                    ctx.strokeStyle = '#aa1111';
                    ctx.lineWidth = 1;
                    const size = 5;
                    ctx.beginPath();
                    for (let i = 0; i < 5; i++) {
                        const angle = (i * 4 * Math.PI / 5) - Math.PI / 2;
                        const r = (i % 2 === 0) ? size : size * 0.4;
                        const px = sx + Math.cos(angle) * r;
                        const py = sy + Math.sin(angle) * r;
                        if (i === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                }

                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(turretX + turretW * 0.6, turretY + turretH * 0.25, 3, 0, Math.PI * 2);
                ctx.fillStyle = '#1a1a1a';
                ctx.fill();

                ctx.restore();
            }

            // ─── ОТРИСОВКА ────────────────────────────────────────────
            function draw() {
                ctx.clearRect(0, 0, GAME_W, GAME_H);

                const grad = ctx.createLinearGradient(0, 0, 0, GAME_H);
                grad.addColorStop(0, '#1a2a3a');
                grad.addColorStop(0.5, '#2a3a2a');
                grad.addColorStop(1, '#1a2a1a');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, GAME_W, GAME_H);

                for (const bld of state.buildings) {
                    ctx.fillStyle = bld.color;
                    ctx.shadowColor = 'rgba(0,0,0,0.3)';
                    ctx.shadowBlur = 6;
                    ctx.shadowOffsetY = 2;
                    ctx.fillRect(bld.x, bld.y, bld.w, bld.h);
                    ctx.shadowBlur = 0;
                    const winCount = bld.windows;
                    const gap = bld.w / (winCount + 1);
                    for (let i = 0; i < winCount; i++) {
                        const wx = bld.x + gap * (i + 1) - 4;
                        const wy = bld.y + 8 + (bld.h - 16) * 0.3;
                        ctx.fillStyle = bld.destroyed ? '#2a2a1a' : '#8a9a7a';
                        ctx.fillRect(wx, wy, 8, 8);
                        if (!bld.destroyed) {
                            ctx.fillStyle = '#aabb99';
                            ctx.fillRect(wx + 1, wy + 1, 6, 6);
                            ctx.fillStyle = '#c0d0b0';
                            ctx.fillRect(wx + 2, wy + 2, 2, 2);
                        }
                    }
                    if (bld.destroyed) {
                        ctx.fillStyle = '#2a2a1a';
                        ctx.fillRect(bld.x + 4, bld.y + bld.h - 6, bld.w - 8, 4);
                        ctx.fillRect(bld.x + 6, bld.y + bld.h - 12, 4, 6);
                    }
                }

                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.moveTo(0, GAME_H - 20);
                for (const pt of state.roadPoints) {
                    ctx.lineTo(pt.x, pt.y);
                }
                ctx.lineTo(GAME_W, GAME_H - 20);
                ctx.lineTo(GAME_W, GAME_H);
                ctx.lineTo(0, GAME_H);
                ctx.closePath();
                ctx.fillStyle = '#2a3a2a';
                ctx.fill();
                ctx.strokeStyle = '#1a2a1a';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                ctx.strokeStyle = '#3a4a3a';
                ctx.lineWidth = 1;
                ctx.beginPath();
                for (const pt of state.roadPoints) {
                    if (pt === state.roadPoints[0]) ctx.moveTo(pt.x, pt.y);
                    else ctx.lineTo(pt.x, pt.y);
                }
                ctx.stroke();

                // ── Враги ──
                for (const enemy of state.enemies) {
                    if (!enemy.alive) continue;
                    const flash = enemy.hitFlash > 0;
                    drawTank(ctx, enemy.x, enemy.y, enemy.w, enemy.h,
                        flash ? '#ffffff' : enemy.color,
                        flash ? '#dddddd' : enemy.turretColor,
                        enemy.trackColor,
                        enemy.trackOffset || 0,
                        -1,
                        flash,
                        0,
                        false
                    );
                    if (enemy.health < enemy.maxHealth) {
                        const barW = enemy.w;
                        const barH = 3;
                        const barX = enemy.x;
                        const barY = enemy.y - 8;
                        ctx.fillStyle = 'rgba(0,0,0,0.6)';
                        ctx.fillRect(barX, barY, barW, barH);
                        ctx.fillStyle = '#44cc44';
                        ctx.fillRect(barX + 1, barY + 1, (barW - 2) * (enemy.health / enemy.maxHealth), barH - 2);
                    }
                }

                // ── Босс ──
                if (state.boss && state.boss.alive) {
                    const boss = state.boss;
                    const flash = boss.hitFlash > 0;
                    drawTank(ctx, boss.x, boss.y, boss.w, boss.h,
                        flash ? '#ffffff' : '#6a2a2a',
                        flash ? '#dddddd' : '#8a3a3a',
                        '#3a1a1a',
                        boss.trackOffset || 0,
                        -1,
                        flash,
                        0,
                        true
                    );
                    const barW = boss.w + 20;
                    const barH = 6;
                    const barX = boss.x - 10;
                    const barY = boss.y - 16;
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    ctx.fillRect(barX, barY, barW, barH);
                    const hpRatio = boss.health / boss.maxHealth;
                    const hpColor = hpRatio > 0.5 ? '#44cc44' : (hpRatio > 0.25 ? '#ccaa44' : '#cc4444');
                    ctx.fillStyle = hpColor;
                    ctx.fillRect(barX + 2, barY + 2, (barW - 4) * hpRatio, barH - 4);
                    ctx.strokeStyle = '#cc4444';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(barX, barY, barW, barH);
                    ctx.fillStyle = '#ff6666';
                    ctx.font = 'bold 10px monospace';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'bottom';
                    ctx.fillText('👹 БОСС', boss.x + boss.w / 2, barY - 2);
                }

                // ── Пули игрока ──
                for (const b of state.bullets) {
                    for (let t = 0; t < b.trail.length; t++) {
                        const alpha = t / b.trail.length * 0.5;
                        ctx.fillStyle = `rgba(255,255,100,${alpha})`;
                        ctx.fillRect(b.trail[t].x - 2, b.trail[t].y - 1, 4, 3);
                    }
                    ctx.fillStyle = '#ffff44';
                    ctx.shadowColor = '#ffff44';
                    ctx.shadowBlur = 12;
                    ctx.fillRect(b.x, b.y, b.w, b.h);
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(b.x + 1, b.y + 1, b.w - 2, b.h - 2);
                }

                // ── Пули врагов ──
                for (const b of state.enemyBullets) {
                    for (let t = 0; t < b.trail.length; t++) {
                        const alpha = t / b.trail.length * 0.4;
                        ctx.fillStyle = `rgba(255,80,40,${alpha})`;
                        ctx.fillRect(b.trail[t].x - 2, b.trail[t].y - 1, 4, 3);
                    }
                    ctx.fillStyle = b.isBoss ? '#ff6644' : '#ff5533';
                    ctx.shadowColor = b.isBoss ? '#ff6644' : '#ff5533';
                    ctx.shadowBlur = 12;
                    ctx.fillRect(b.x, b.y, b.w, b.h);
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#ff8866';
                    ctx.fillRect(b.x + 1, b.y + 1, b.w - 2, b.h - 2);
                }

                // ── Игрок ──
                const p = state.player;
                if (p.alive) {
                    const flash = p.invincible > 0 && Math.floor(p.invincible / 4) % 2 === 0;
                    const def = getPlayerTankDef();
                    drawTank(ctx, p.x, p.y, p.w, p.h,
                        flash ? '#ffffff' : def.color,
                        flash ? '#dddddd' : def.turretColor,
                        def.trackColor,
                        p.trackOffset || 0,
                        1,
                        flash,
                        p.barrelAngle,
                        true
                    );
                    const barW = p.w + 10;
                    const barH = 4;
                    const barX = p.x - 5;
                    const barY = p.y - 14;
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = 'rgba(0,0,0,0.6)';
                    ctx.fillRect(barX, barY, barW, barH);
                    const hpRatio = p.health / p.maxHealth;
                    const hpColor = hpRatio > 0.5 ? '#44cc44' : (hpRatio > 0.25 ? '#ccaa44' : '#cc4444');
                    ctx.fillStyle = hpColor;
                    ctx.fillRect(barX + 1, barY + 1, (barW - 2) * hpRatio, barH - 2);
                }

                // ── Монеты ──
                for (const coin of state.coins) {
                    if (coin.collected) continue;
                    const bobY = Math.sin(coin.bob) * 1.5;
                    const cx = coin.x + 6;
                    const cy = coin.y + 6 + bobY;
                    ctx.save();
                    ctx.shadowColor = 'rgba(255,200,50,0.3)';
                    ctx.shadowBlur = 10;
                    const r = 6;
                    ctx.beginPath();
                    ctx.arc(cx, cy, r, 0, Math.PI * 2);
                    ctx.fillStyle = '#f0c040';
                    ctx.fill();
                    ctx.strokeStyle = '#c09020';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(cx - 2, cy - 2, 2, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255,255,200,0.6)';
                    ctx.fill();
                    ctx.fillStyle = '#8a6a10';
                    ctx.font = '7px monospace';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('₽', cx, cy + 0.5);
                    ctx.restore();
                }

                // ── Взрывы ──
                for (const e of state.explosions) {
                    const alpha = e.life / e.maxLife;
                    const r = e.r * (1 + (1 - alpha) * 0.5);
                    ctx.globalAlpha = alpha;
                    ctx.beginPath();
                    ctx.arc(e.x, e.y, r, 0, Math.PI * 2);
                    ctx.fillStyle = e.color || '#ff8844';
                    ctx.shadowColor = e.color || '#ff8844';
                    ctx.shadowBlur = 20;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    if (alpha > 0.3) {
                        ctx.beginPath();
                        ctx.arc(e.x, e.y, r * 0.3, 0, Math.PI * 2);
                        ctx.fillStyle = 'rgba(255,255,200,0.6)';
                        ctx.fill();
                    }
                    ctx.globalAlpha = 1;
                }

                // ── Информация ──
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(200,200,200,0.3)';
                ctx.font = '10px monospace';
                ctx.textAlign = 'right';
                ctx.textBaseline = 'bottom';
                ctx.fillText('врагов: ' + state.enemies.filter(e => e.alive).length + '/' + state.maxEnemies, GAME_W - 8,
                    GAME_H - 4);
                ctx.textAlign = 'left';
                ctx.fillText('убито: ' + state.enemiesKilled + '/60', 8, GAME_H - 4);

                if (p.alive) {
                    ctx.fillStyle = 'rgba(200,200,200,0.4)';
                    ctx.font = '10px monospace';
                    ctx.textAlign = 'left';
                    ctx.textBaseline = 'top';
                    const deg = (p.barrelAngle * 180 / Math.PI).toFixed(0);
                    ctx.fillText('🔫 ' + deg + '°', 8, 8);
                }

                if (state.paused) {
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.fillRect(0, 0, GAME_W, GAME_H);
                    ctx.fillStyle = '#b0f0b0';
                    ctx.font = '24px monospace';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('⏸ ПАУЗА', GAME_W / 2, GAME_H / 2 - 10);
                    ctx.fillStyle = '#8fca8f';
                    ctx.font = '14px monospace';
                    ctx.fillText('нажмите кнопку на экране', GAME_W / 2, GAME_H / 2 + 30);
                }
            }

            // ─── ИГРОВОЙ ЦИКЛ ──────────────────────────────────────────
            function gameLoop() {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }

            // ─── КЛАВИАТУРА ─────────────────────────────────────────────
            const keys = {
                left: false,
                right: false,
                up: false,
                down: false,
                fire: false,
                barrelUp: false,
                barrelDown: false
            };

            document.addEventListener('keydown', (e) => {
                switch (e.key) {
                    case 'ArrowLeft':
                    case 'a':
                    case 'A':
                        keys.left = true;
                        e.preventDefault();
                        break;
                    case 'ArrowRight':
                    case 'd':
                    case 'D':
                        keys.right = true;
                        e.preventDefault();
                        break;
                    case 'ArrowUp':
                    case 'w':
                    case 'W':
                        keys.up = true;
                        e.preventDefault();
                        break;
                    case 'ArrowDown':
                    case 's':
                    case 'S':
                        keys.down = true;
                        e.preventDefault();
                        break;
                    case ' ':
                    case 'Space':
                        keys.fire = true;
                        e.preventDefault();
                        break;
                    case 'q':
                    case 'Q':
                        keys.barrelUp = true;
                        e.preventDefault();
                        break;
                    case 'e':
                    case 'E':
                        keys.barrelDown = true;
                        e.preventDefault();
                        break;
                    case 'p':
                    case 'P':
                        togglePause();
                        e.preventDefault();
                        break;
                    case 'Enter':
                        if (state.gameOver) { fullRestart();
                            e.preventDefault(); }
                        break;
                }
            });

            document.addEventListener('keyup', (e) => {
                switch (e.key) {
                    case 'ArrowLeft':
                    case 'a':
                    case 'A':
                        keys.left = false;
                        e.preventDefault();
                        break;
                    case 'ArrowRight':
                    case 'd':
                    case 'D':
                        keys.right = false;
                        e.preventDefault();
                        break;
                    case 'ArrowUp':
                    case 'w':
                    case 'W':
                        keys.up = false;
                        e.preventDefault();
                        break;
                    case 'ArrowDown':
                    case 's':
                    case 'S':
                        keys.down = false;
                        e.preventDefault();
                        break;
                    case ' ':
                    case 'Space':
                        keys.fire = false;
                        e.preventDefault();
                        break;
                    case 'q':
                    case 'Q':
                        keys.barrelUp = false;
                        e.preventDefault();
                        break;
                    case 'e':
                    case 'E':
                        keys.barrelDown = false;
                        e.preventDefault();
                        break;
                }
            });

            // ─── КНОПКИ УПРАВЛЕНИЯ ──────────────────────────────────────
            function setupButton(id, key, isToggle) {
                const btn = document.getElementById(id);
                if (!btn) return;
                const start = (e) => {
                    e.preventDefault();
                    if (isToggle) { keys[key] = !keys[key]; } else { keys[key] = true; }
                    if (key === 'fire' && !isToggle) playerShoot();
                };
                const end = (e) => {
                    e.preventDefault();
                    if (!isToggle) keys[key] = false;
                };
                btn.addEventListener('mousedown', start);
                btn.addEventListener('mouseup', end);
                btn.addEventListener('mouseleave', end);
                btn.addEventListener('touchstart', start, { passive: false });
                btn.addEventListener('touchend', end, { passive: false });
                btn.addEventListener('touchcancel', end, { passive: false });
            }

            setupButton('btnUp', 'up');
            setupButton('btnDown', 'down');
            setupButton('btnLeft', 'left');
            setupButton('btnRight', 'right');
            setupButton('btnBarrelUp', 'barrelUp');
            setupButton('btnBarrelDown', 'barrelDown');

            const fireBtn = document.getElementById('btnFire');
            fireBtn.addEventListener('mousedown', (e) => {
                e.preventDefault();
                keys.fire = true;
                playerShoot();
            });
            fireBtn.addEventListener('mouseup', (e) => {
                e.preventDefault();
                keys.fire = false;
            });
            fireBtn.addEventListener('mouseleave', (e) => { keys.fire = false; });
            fireBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                keys.fire = true;
                playerShoot();
            }, { passive: false });
            fireBtn.addEventListener('touchend', (e) => {
                e.preventDefault();
                keys.fire = false;
            }, { passive: false });
            fireBtn.addEventListener('touchcancel', (e) => { keys.fire = false; }, { passive: false });

            // ─── ПАУЗА (кнопки) ────────────────────────────────────────
            document.getElementById('btnPause').addEventListener('click', togglePause);
            document.getElementById('resumeBtn').addEventListener('click', resumeGame);

            // ─── РЕСТАРТ (кнопка) ──────────────────────────────────────
            document.getElementById('btnRestart').addEventListener('click', function() {
                if (state.gameOver) {
                    fullRestart();
                } else {
                    if (confirm('Начать новый бой? Текущий прогресс будет потерян.')) {
                        fullRestart();
                    }
                }
            });

            // ─── МАГАЗИН ──────────────────────────────────────────────
            function renderShop() {
                const list = document.getElementById('shopList');
                list.innerHTML = '';
                const money = state.money;
                document.getElementById('shopMoney').textContent = '💰 ' + money;

                for (const [id, def] of Object.entries(TANK_DEFS)) {
                    const owned = state.ownedTanks.includes(id);
                    const current = state.currentTankId === id;

                    const div = document.createElement('div');
                    div.className = 'shop-item';
                    if (owned) div.classList.add('owned');
                    if (current) div.classList.add('current');

                    const nameSpan = document.createElement('span');
                    nameSpan.className = 's-name';
                    nameSpan.textContent = def.name;

                    const statsSpan = document.createElement('span');
                    statsSpan.className = 's-stats';
                    statsSpan.innerHTML = `
                        <span>⚡${def.speed.toFixed(1)}</span>
                        <span>💥${def.damage}</span>
                        <span>❤️${def.health}</span>
                        <span>🎯${Math.round(60/def.fireRate)}/с</span>
                    `;

                    const priceSpan = document.createElement('span');
                    priceSpan.className = 's-price';
                    if (def.cost === 0) priceSpan.textContent = '★ СТАРТ';
                    else priceSpan.textContent = '💰 ' + def.cost;

                    const actionBtn = document.createElement('button');
                    actionBtn.className = 's-action';

                    if (current) {
                        actionBtn.textContent = '✅ ВЫБРАН';
                        actionBtn.disabled = true;
                        actionBtn.classList.add('equipped');
                    } else if (owned) {
                        actionBtn.textContent = '🔁 ВЫБРАТЬ';
                        actionBtn.classList.add('select');
                        actionBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            state.currentTankId = id;
                            const def2 = getTankDef(id);
                            state.player.health = def2.health;
                            state.player.maxHealth = def2.health;
                            state.player.invincible = 30;
                            resetGame();
                            renderShop();
                            updateHUD();
                        });
                    } else {
                        actionBtn.textContent = '💰 КУПИТЬ';
                        actionBtn.classList.add('buy');
                        if (money < def.cost) actionBtn.disabled = true;
                        actionBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            if (state.money >= def.cost) {
                                state.money -= def.cost;
                                state.ownedTanks.push(id);
                                state.currentTankId = id;
                                const def2 = getTankDef(id);
                                state.player.health = def2.health;
                                state.player.maxHealth = def2.health;
                                state.player.invincible = 30;
                                resetGame();
                                renderShop();
                                updateHUD();
                            }
                        });
                    }

                    div.appendChild(nameSpan);
                    div.appendChild(statsSpan);
                    div.appendChild(priceSpan);
                    div.appendChild(actionBtn);

                    div.addEventListener('click', () => {
                        if (owned && !current) {
                            state.currentTankId = id;
                            const def2 = getTankDef(id);
                            state.player.health = def2.health;
                            state.player.maxHealth = def2.health;
                            state.player.invincible = 30;
                            resetGame();
                            renderShop();
                            updateHUD();
                        } else if (!owned && state.money >= def.cost) {
                            state.money -= def.cost;
                            state.ownedTanks.push(id);
                            state.currentTankId = id;
                            const def2 = getTankDef(id);
                            state.player.health = def2.health;
                            state.player.maxHealth = def2.health;
                            state.player.invincible = 30;
                            resetGame();
                            renderShop();
                            updateHUD();
                        }
                    });

                    list.appendChild(div);
                }
            }

            document.getElementById('btnShop').addEventListener('click', () => {
                if (state.gameOver) return;
                state.shopOpen = !state.shopOpen;
                shopOverlay.classList.toggle('active', state.shopOpen);
                if (state.shopOpen) renderShop();
            });

            document.getElementById('shopClose').addEventListener('click', () => {
                state.shopOpen = false;
                shopOverlay.classList.remove('active');
            });

            shopOverlay.addEventListener('click', (e) => {
                if (e.target === shopOverlay) {
                    state.shopOpen = false;
                    shopOverlay.classList.remove('active');
                }
            });

            // ─── РЕСТАРТ (оверлей) ──────────────────────────────────────
            document.getElementById('restartBtn').addEventListener('click', fullRestart);

            // ─── ИНИЦИАЛИЗАЦИЯ ────────────────────────────────────────
            function init() {
                setTankFavicon();

                const def = getTankDef('t26');
                state.player.health = def.health;
                state.player.maxHealth = def.health;
                state.player.speed = def.speed;
                state.player.fireRate = def.fireRate;
                state.player.damage = def.damage;
                state.player.bulletSpeed = def.bulletSpeed;
                state.currentTankId = 't26';
                state.ownedTanks = ['t26'];
                state.money = 0;
                state.score = 0;
                state.level = 1;
                state.gameOver = false;
                state.paused = false;
                state.player.alive = true;
                state.player.invincible = 60;
                state.enemies = [];
                state.bullets = [];
                state.enemyBullets = [];
                state.coins = [];
                state.explosions = [];
                state.timeSeconds = 0;
                state.spawnInterval = 120;
                state.maxEnemies = 2;
                state.enemiesKilled = 0;
                state.boss = null;
                state.bossSpawned = false;
                state.bossDefeated = false;
                generateMap();
                updateHUD();
                renderShop();
                gameLoop();
            }

            init();

        })();
    </script>
</body>
</html>
